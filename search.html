<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Search anime on MyAniDex. Filter by genre, year, season, type, and sort options.">
<title>Search - MyAniDex</title>
<style>
  :root {
    --bg: #030305; --surface: rgba(20,20,30,0.6); --surface-solid: #12121a;
    --accent: #8b5cf6; --accent-glow: rgba(139,92,246,0.4); --accent-light: #a78bfa;
    --text: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
    --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
    --radius: 16px; --radius-sm: 10px; --transition: cubic-bezier(0.4,0,0.2,1);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { overflow-x:hidden; max-width:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; line-height:1.5; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(139,92,246,0.3); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(139,92,246,0.5); }

  .header {
    position:fixed; top:0; left:0; right:0; z-index:1000; height:64px; display:flex; align-items:center; justify-content:space-between;
    padding:0 clamp(16px,4vw,48px); background:rgba(3,3,5,0.8); backdrop-filter:blur(20px); border-bottom:1px solid rgba(139,92,246,0.1);
  }
  .header-left,.header-right { display:flex; align-items:center; gap:16px; }
  .hamburger { width:40px; height:40px; border-radius:var(--radius-sm); border:1px solid rgba(139,92,246,0.2); background:var(--surface); display:flex; flex-direction:column; justify-content:center; align-items:center; gap:5px; cursor:pointer; transition:all 0.3s; }
  .hamburger:hover { border-color:var(--accent); box-shadow:0 0 15px var(--accent-glow); }
  .hamburger span { width:20px; height:2px; background:var(--text); border-radius:2px; transition:all 0.3s; }
  .hamburger.active span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
  .hamburger.active span:nth-child(2) { opacity:0; }
  .hamburger.active span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }
  .logo { font-size:clamp(20px,3vw,28px); font-weight:800; letter-spacing:-0.5px; background:linear-gradient(135deg,var(--accent-light),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-decoration:none; display:flex; align-items:center; gap:8px; }
  .logo svg { width:32px; height:32px; fill:var(--accent); }
  .nav-desktop { display:none; }
  @media(min-width:768px){ .nav-desktop { display:flex; gap:8px; } .hamburger { display:none; } }
  .nav-desktop a { padding:8px 16px; border-radius:var(--radius-sm); color:var(--text-secondary); text-decoration:none; font-weight:500; font-size:14px; transition:all 0.3s; }
  .nav-desktop a:hover,.nav-desktop a.active { color:var(--text); background:rgba(139,92,246,0.1); }
  .search-btn { width:40px; height:40px; border-radius:50%; border:1px solid rgba(139,92,246,0.2); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text); transition:all 0.3s; }
  .search-btn:hover { background:var(--accent); border-color:var(--accent); box-shadow:0 0 20px var(--accent-glow); }
  .search-btn svg { width:18px; height:18px; }

  .sidebar-overlay { position:fixed; inset:0; z-index:999; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity 0.4s; }
  .sidebar-overlay.active { opacity:1; pointer-events:all; }
  .sidebar { position:fixed; top:0; left:0; bottom:0; width:min(320px,85vw); z-index:1001; background:linear-gradient(180deg,#0a0a12 0%,#07070d 100%); border-right:1px solid rgba(139,92,246,0.15); transform:translateX(-100%); transition:transform 0.4s; display:flex; flex-direction:column; padding:80px 24px 24px; gap:8px; }
  .sidebar.active { transform:translateX(0); }
  .sidebar a { padding:14px 16px; border-radius:var(--radius-sm); color:var(--text-secondary); text-decoration:none; font-weight:500; display:flex; align-items:center; gap:12px; transition:all 0.3s; }
  .sidebar a:hover,.sidebar a.active { background:rgba(139,92,246,0.1); color:var(--text); }
  .sidebar a svg { width:22px; height:22px; opacity:0.7; }

  .search-overlay { position:fixed; inset:0; z-index:2000; background:rgba(3,3,5,0.97); backdrop-filter:blur(30px); opacity:0; pointer-events:none; transition:opacity 0.4s; display:flex; flex-direction:column; padding:clamp(16px,4vw,48px); overflow:hidden; }
  .search-overlay.active { opacity:1; pointer-events:all; }
  .search-header { display:flex; align-items:center; gap:16px; margin-bottom:24px; flex-shrink:0; }
  .search-input-wrap { flex:1; position:relative; }
  .search-input { width:100%; padding:16px 24px 16px 52px; border-radius:var(--radius); border:1px solid rgba(139,92,246,0.2); background:var(--surface); color:var(--text); font-size:16px; outline:none; transition:all 0.3s; }
  .search-input:focus { border-color:var(--accent); box-shadow:0 0 20px rgba(139,92,246,0.15); }
  .search-input-wrap svg { position:absolute; left:18px; top:50%; transform:translateY(-50%); width:20px; height:20px; color:var(--text-muted); }
  .search-close { width:44px; height:44px; border-radius:50%; border:1px solid rgba(139,92,246,0.2); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text); transition:all 0.3s; flex-shrink:0; }
  .search-close:hover { background:var(--danger); border-color:var(--danger); }
  .search-results { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:16px; padding-bottom:24px; }

  .page-content { margin-top:64px; padding:clamp(24px,4vw,48px); max-width:1400px; margin-left:auto; margin-right:auto; }
  .page-title { font-size:clamp(24px,3vw,32px); font-weight:800; margin-bottom:24px; }

  .filter-bar {
    display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; padding:16px; border-radius:var(--radius); background:var(--surface); border:1px solid rgba(139,92,246,0.1);
  }
  .filter-chip {
    padding:8px 14px; border-radius:20px; border:1px solid rgba(139,92,246,0.2); background:var(--surface-solid); color:var(--text-secondary);
    font-size:13px; cursor:pointer; transition:all 0.3s; appearance:none;
  }
  .filter-chip:hover, .filter-chip:focus { border-color:var(--accent); color:var(--text); }

  .anime-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:20px; }
  .anime-card {
    position:relative; cursor:pointer; border-radius:var(--radius-sm); overflow:hidden; transition:transform 0.4s, box-shadow 0.4s;
  }
  .anime-card:hover { transform:translateY(-8px); box-shadow:0 20px 40px rgba(0,0,0,0.4); }
  .card-poster { position:relative; aspect-ratio:2/3; overflow:hidden; border-radius:var(--radius-sm); background:var(--surface-solid); }
  .card-poster img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s; }
  .anime-card:hover .card-poster img { transform:scale(1.08); }
  .card-overlay {
    position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
    opacity:0; transition:opacity 0.3s; display:flex; flex-direction:column; justify-content:flex-end; padding:12px;
  }
  .anime-card:hover .card-overlay { opacity:1; }
  .card-badges {
    position:absolute; top:8px; left:8px; right:8px; display:flex; justify-content:space-between; pointer-events:none;
  }
  .badge { padding:4px 8px; border-radius:6px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; }
  .badge-score { background:rgba(245,158,11,0.9); color:#000; }
  .badge-ep { background:rgba(34,197,94,0.9); color:#000; }
  .badge-hd { background:rgba(139,92,246,0.9); color:#fff; }
  .badge-type { background:rgba(255,255,255,0.15); color:var(--text); backdrop-filter:blur(4px); }
  .card-info { padding:10px 4px; }
  .card-title { font-size:13px; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-meta { font-size:11px; color:var(--text-muted); margin-top:4px; }

  .load-more { display:flex; justify-content:center; margin-top:32px; }
  .load-more button {
    padding:12px 32px; border-radius:var(--radius-sm); background:var(--accent); color:white; border:none; font-weight:700; font-size:14px;
    cursor:pointer; transition:all 0.3s; box-shadow:0 4px 20px rgba(139,92,246,0.3);
  }
  .load-more button:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(139,92,246,0.5); }
  .load-more button:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .skeleton { background:linear-gradient(90deg,#1a1a2e 25%,#252540 50%,#1a1a2e 75%); background-size:200% 100%; animation:skeleton 1.5s infinite; border-radius:var(--radius-sm); }
  @keyframes skeleton { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skeleton-card { display:flex; flex-direction:column; gap:8px; }
  .skeleton-poster { aspect-ratio:2/3; }
  .skeleton-text { height:14px; }
  .skeleton-text.short { width:60%; }

  .toast-container { position:fixed; bottom:24px; right:24px; z-index:3000; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
  .toast { padding:12px 20px; border-radius:var(--radius-sm); background:var(--surface-solid); border:1px solid rgba(139,92,246,0.2); color:var(--text); font-size:13px; font-weight:500; box-shadow:0 10px 30px rgba(0,0,0,0.5); transform:translateX(120%); transition:transform 0.4s; pointer-events:all; max-width:320px; }
  .toast.show { transform:translateX(0); }
  .toast.error { border-color:rgba(239,68,68,0.4); }

  .footer { padding:40px clamp(16px,4vw,48px); border-top:1px solid rgba(139,92,246,0.1); text-align:center; color:var(--text-muted); font-size:13px; }
  .footer-links { display:flex; justify-content:center; gap:20px; margin-bottom:16px; flex-wrap:wrap; }
  .footer-links a { color:var(--text-secondary); text-decoration:none; transition:color 0.3s; }
  .footer-links a:hover { color:var(--accent); }

  @media(max-width:480px){ .anime-grid { grid-template-columns:repeat(2,1fr); gap:12px; } .page-content { padding:16px; } }
</style>

<body>

<header class="header" id="header">
  <div class="header-left">
    <div class="hamburger" id="hamburger" role="button" tabindex="0" aria-label="Menu"><span></span><span></span><span></span></div>
    <a href="index.html" class="logo"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>MyAniDex</a>
  </div>
  <nav class="nav-desktop">
    <a href="index.html">Home</a><a href="search.html?q=trending">Trending</a><a href="schedule.html">Schedule</a><a href="donate.html">Donate</a>
  </nav>

  <a href="search.html?q=trending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Trending</a>
  <a href="schedule.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>
  <a href="donate.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Donate</a>
</aside>

<div class="search-overlay" id="searchOverlay">
  <div class="search-header">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search anime..." autocomplete="off">
    </div>
    <button class="search-close" id="searchClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>

</div>

<div class="page-content">
  <h1 class="page-title" id="pageTitle">Search Anime</h1>
  <div class="filter-bar">
    <input type="text" class="filter-chip" id="queryInput" placeholder="Search..." style="min-width:200px; outline:none; color:var(--text);">
    <select class="filter-chip" id="filterGenre"><option value="">All Genres</option></select>
    <select class="filter-chip" id="filterYear"><option value="">All Years</option></select>
    <select class="filter-chip" id="filterSeason"><option value="">All Seasons</option><option value="winter">Winter</option><option value="spring">Spring</option><option value="summer">Summer</option><option value="fall">Fall</option></select>
    <select class="filter-chip" id="filterType"><option value="">All Types</option><option value="tv">TV</option><option value="movie">Movie</option><option value="ova">OVA</option><option value="special">Special</option><option value="ona">ONA</option></select>
    <select class="filter-chip" id="filterStatus"><option value="">All Status</option><option value="airing">Airing</option><option value="complete">Completed</option><option value="upcoming">Upcoming</option></select>
    <select class="filter-chip" id="filterSort"><option value="popularity">Popular</option><option value="score">Top Rated</option><option value="start_date">Newest</option><option value="end_date">Oldest</option></select>

</footer>

<div class="toast-container" id="toastContainer"></div>

<script>
(function(){
  'use strict';
  const API_BASE = 'https://api.jikan.moe/v4';
  const CACHE_TTL = 1000*60*15;
  const $ = (sel,el=document)=>el.querySelector(sel);
  const $$ = (sel,el=document)=>[...el.querySelectorAll(sel)];
  const wait = ms=>new Promise(r=>setTimeout(r,ms));

  function showToast(msg,type='info'){
    const container=$('#toastContainer');
    const toast=document.createElement('div');
    toast.className=`toast ${type}`; toast.textContent=msg;
    container.appendChild(toast);
    requestAnimationFrame(()=>toast.classList.add('show'));
    setTimeout(()=>{toast.classList.remove('show');setTimeout(()=>toast.remove(),400);},3000);
  }

  async function fetchWithRetry(url,retries=3,timeout=10000){
    const key='cache_'+btoa(url);
    const cached=localStorage.getItem(key);
    if(cached){const{data,ts}=JSON.parse(cached);if(Date.now()-ts<CACHE_TTL)return data;}
    for(let i=0;i<retries;i++){
      try{
        const controller=new AbortController();
        const id=setTimeout(()=>controller.abort(),timeout);
        const res=await fetch(url,{signal:controller.signal});
        clearTimeout(id);
        if(!res.ok) throw new Error('HTTP '+res.status);
        const data=await res.json();
        localStorage.setItem(key,JSON.stringify({data,ts:Date.now()}));
        return data;
      }catch(e){if(i===retries-1) throw e; await wait(1000*(i+1));}
    }
  }

  function escapeHtml(str){if(!str)return'';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // Header
  window.addEventListener('scroll',()=>{$('#header').classList.toggle('scrolled',window.scrollY>20);},{passive:true});
  const hamburger=$('#hamburger');
  function toggleSidebar(){
    const active=hamburger.classList.toggle('active');
    $('#sidebar').classList.toggle('active',active);
    $('#sidebarOverlay').classList.toggle('active',active);
    $('#sidebar').setAttribute('aria-hidden',!active);
  }
  hamburger.addEventListener('click',toggleSidebar);
  $('#sidebarOverlay').addEventListener('click',toggleSidebar);
  document.addEventListener('keydown',e=>{if(e.key==='Escape' && $('#sidebar').classList.contains('active')) toggleSidebar();});

  // Search overlay
  function openSearch(){$('#searchOverlay').classList.add('active');document.body.style.overflow='hidden';setTimeout(()=>$('#searchInput').focus(),100);}
  function closeSearch(){$('#searchOverlay').classList.remove('active');document.body.style.overflow='';$('#searchInput').value='';$('#searchResults').innerHTML='';}
  $('#searchBtn').addEventListener('click',openSearch);
  $('#searchClose').addEventListener('click',closeSearch);
  document.addEventListener('keydown',e=>{if(e.key==='/' && !$('#searchOverlay').classList.contains('active')){e.preventDefault();openSearch();}if(e.key==='Escape' && $('#searchOverlay').classList.contains('active'))closeSearch();});

  let searchAbort=null;
  async function doSearchOverlay(query=''){
    $('#searchResults').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">Searching...</div>';
    try{
      let url=`${API_BASE}/anime?q=${encodeURIComponent(query)}&limit=24`;
      if(searchAbort) searchAbort.abort();
      searchAbort=new AbortController();
      const res=await fetch(url,{signal:searchAbort.signal});
      const data=await res.json();
      if(!data.data||!data.data.length){$('#searchResults').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">No results.</div>';return;}
      $('#searchResults').innerHTML=data.data.map(a=>{
        const img=a.images?.webp?.large_image_url||a.images?.jpg?.large_image_url||'';
        return `<div style="cursor:pointer;" onclick="location.href='anime.html?id=${a.mal_id}'"><div style="aspect-ratio:2/3;border-radius:10px;overflow:hidden;background:var(--surface-solid);"><img src="${escapeHtml(img)}" alt="${escapeHtml(a.title)}" loading="lazy" style="width:100%;height:100%;object-fit:cover;"></div><div style="font-size:13px;font-weight:600;margin-top:6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${escapeHtml(a.title)}</div></div>`;
      }).join('');
    }catch(e){if(e.name!=='AbortError'){$('#searchResults').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--danger);">Search failed.</div>';}}
  }
  const debounce=(fn,ms)=>{let t;return(...args)=>{clearTimeout(t);t=setTimeout(()=>fn(...args),ms);}};
  $('#searchInput').addEventListener('input',debounce(()=>doSearchOverlay($('#searchInput').value.trim()),400));

  // Populate filters
  const yearSelect = $('#filterYear');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= 1980; y--) {
    const opt = document.createElement('option'); opt.value = y; opt.textContent = y; yearSelect.appendChild(opt);
  }
  fetchWithRetry(`${API_BASE}/genres/anime`).then(data => {
    if (data && data.data) {
      data.data.forEach(g => {
        const opt = document.createElement('option'); opt.value = g.mal_id; opt.textContent = g.name; $('#filterGenre').appendChild(opt);
      });
    }
  }).catch(()=>{});

  // Grid logic
  let currentPage = 1;
  let isLoading = false;
  let currentFilters = {};

  function renderSkeleton(count=8) {
    $('#animeGrid').innerHTML = Array.from({length: count}, () => `
      <div class="skeleton-card"><div class="skeleton skeleton-poster"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>
    `).join('');
  }

  function buildCard(anime) {
    const img = anime.images?.webp?.large_image_url || anime.images?.jpg?.large_image_url || '';
    const score = anime.score ? anime.score.toFixed(1) : 'N/A';
    const ep = anime.episodes || (anime.type==='Movie' ? '1' : '?');
    const type = anime.type || 'TV';
    const year = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '');
    return `
      <div class="anime-card" data-id="${anime.mal_id}" role="link" tabindex="0">
        <div class="card-poster">
          <img src="${escapeHtml(img)}" alt="${escapeHtml(anime.title)}" loading="lazy">
          <div class="card-badges"><span class="badge badge-score">★ ${score}</span><span class="badge badge-ep">EP ${ep}</span></div>
          <div class="card-badges" style="top:auto; bottom:8px; justify-content:flex-start;"><span class="badge badge-hd">HD</span><span class="badge badge-type">${type}</span></div>
          <div class="card-overlay"><div class="btn btn-primary" style="padding:8px 16px; font-size:12px; justify-content:center; background:var(--accent); color:white; border-radius:8px; font-weight:700;">Watch Now</div></div>
        </div>
        <div class="card-info"><div class="card-title">${escapeHtml(anime.title)}</div><div class="card-meta">${year} • ${type}</div></div>
      </div>
    `;
  }

  function bindCards() {
    $$('.anime-card').forEach(card => {
      const handler = () => { const id = card.dataset.id; if (id) window.location.href = `anime.html?id=${id}`; };
      card.addEventListener('click', handler);
      card.addEventListener('keydown', e => { if (e.key === 'Enter') handler(); });
    });
  }

  async function loadGrid(page=1, append=false) {
    if (isLoading) return;
    isLoading = true;
    $('#loadMoreBtn').disabled = true;
    if (!append) renderSkeleton(12);

    const q = $('#queryInput').value.trim();
    const genre = $('#filterGenre').value;
    const year = $('#filterYear').value;
    const season = $('#filterSeason').value;
    const type = $('#filterType').value;
    const status = $('#filterStatus').value;
    const sort = $('#filterSort').value;

    let url = `${API_BASE}/anime?limit=24&page=${page}&order_by=${sort}&sort=desc`;
    if (q) url = `${API_BASE}/anime?q=${encodeURIComponent(q)}&limit=24&page=${page}&order_by=${sort}&sort=desc`;
    if (genre) url += `&genres=${genre}`;
    if (year) url += `&start_date=${year}-01-01&end_date=${year}-12-31`;
    if (season) url += `&season=${season}`;
    if (type) url += `&type=${type}`;
    if (status) url += `&status=${status}`;

    try {
      const data = await fetchWithRetry(url);
      const list = data.data || [];
      if (!append) $('#animeGrid').innerHTML = '';
      if (!list.length && page === 1) {
        $('#animeGrid').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted);">No anime found matching your criteria.</div>';
        $('#loadMoreWrap').style.display = 'none';
        isLoading = false; $('#loadMoreBtn').disabled = false; return;
      }
      const html = list.map(buildCard).join('');
      if (append) {
        const div = document.createElement('div');
        div.style.display = 'contents';
        div.innerHTML = html;
        $('#animeGrid').appendChild(div);
      } else {
        $('#animeGrid').innerHTML = html;
      }
      bindCards();
      $('#loadMoreWrap').style.display = list.length < 24 ? 'none' : 'flex';
    } catch (e) {
      if (!append) $('#animeGrid').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--danger);">Failed to load anime. <button onclick="location.reload()" style="background:transparent; border:1px solid var(--danger); color:var(--danger); padding:4px 12px; border-radius:6px; cursor:pointer; margin-left:8px;">Retry</button></div>';
      showToast('Failed to load results', 'error');
    } finally {
      isLoading = false;
      $('#loadMoreBtn').disabled = false;
    }
  }

  // Initial load from URL params
  const urlParams = new URLSearchParams(window.location.search);
  const initialQ = urlParams.get('q') || '';
  const initialStatus = urlParams.get('status') || '';
  const initialType = urlParams.get('type') || '';
  const initialSort = urlParams.get('sort') || '';
  if (initialQ) { $('#queryInput').value = initialQ; $('#pageTitle').textContent = `Results: "${initialQ}"`; }
  if (initialStatus) $('#filterStatus').value = initialStatus;
  if (initialType) $('#filterType').value = initialType;
  if (initialSort) $('#filterSort').value = initialSort;

  loadGrid(1, false);

  // Events
  $('#loadMoreBtn').addEventListener('click', () => { currentPage++; loadGrid(currentPage, true); });
  const filterEls = ['queryInput','filterGenre','filterYear','filterSeason','filterType','filterStatus','filterSort'];
  filterEls.forEach(id => {
    $(`#${id}`).addEventListener(id==='queryInput'?'input':'change', debounce(() => { currentPage=1; loadGrid(1,false); }, 400));
  });

})();
</script>
</body>
</html>
