<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Information - NamiTube</title>
  <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #050505;
      --bg-card: rgba(18, 0, 24, 0.65);
      --primary: #8b5cf6;
      --primary-glow: rgba(168, 85, 247, 0.6);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }

    /* Core Nav Block */
    .navbar {
      position: sticky; top: 0; z-index: 1000; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(139, 92, 246, 0.15); display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 2rem; height: 70px;
    }
    .nav-banner { height: 48px; object-fit: contain; filter: drop-shadow(0 0 8px var(--primary-glow)); }
    .desktop-menu { display: flex; gap: 2rem; font-weight: 500; font-size: 0.95rem; }
    .desktop-menu a { position: relative; padding: 0.25rem 0; transition: var(--transition); }
    .desktop-menu a:hover { color: var(--primary); }
    .menu-btn, .search-btn { background: none; border: none; color: var(--text-main); font-size: 1.4rem; cursor: pointer; }

    /* Info Page Large Header Backdrop */
    .backdrop-container {
      position: relative; height: 55vh; width: 100%; background-size: cover; background-position: center;
      display: flex; align-items: flex-end; border-bottom: 2px solid rgba(139, 92, 246, 0.15);
    }
    .backdrop-container::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(0deg, var(--bg-dark) 0%, rgba(5,5,5,0.7) 60%, rgba(5,5,5,0.2) 100%);
    }

    /* Primary Profile Grid */
    .detail-grid { position: relative; z-index: 10; width: 100%; max-width: 1400px; margin: -100px auto 3rem auto; padding: 0 4rem; display: grid; grid-template-columns: 280px 1fr; gap: 3rem; }
    .poster-block { display: flex; flex-direction: column; gap: 1.5rem; }
    .info-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 16px; border: 2px solid rgba(139, 92, 246, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .watchlist-btn {
      width: 100%; padding: 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: 1px solid var(--primary);
      background: rgba(139, 92, 246, 0.1); color: #fff; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .watchlist-btn:hover { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
    .watchlist-btn.active { background: #10b981; border-color: #10b981; }

    /* Metadata Block */
    .info-main { display: flex; flex-direction: column; gap: 1.5rem; padding-top: 100px; }
    .info-title { font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; line-height: 1.1; }
    .info-tagline { font-style: italic; color: var(--text-muted); font-size: 1.1rem; }
    .metadata-strip { display: flex; flex-wrap: wrap; gap: 1.5rem; font-size: 0.95rem; border-bottom: 1px solid rgba(139,92,246,0.15); padding-bottom: 1.5rem; }
    .metadata-strip span { display: flex; align-items: center; gap: 0.4rem; }
    .meta-star { color: #f59e0b; }
    .info-overview { font-size: 1.1rem; line-height: 1.7; color: #d1d5db; }
    
    /* Interactive Season Dashboard */
    .tv-seasons-block { background: rgba(18, 0, 24, 0.4); border: 1px solid rgba(139,92,246,0.15); border-radius: 16px; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .seasons-header { display: flex; justify-content: space-between; align-items: center; }
    .seasons-header select { background: rgba(5,5,5,0.8); border: 1px solid var(--primary); color: #fff; padding: 0.75rem 1.5rem; border-radius: 8px; outline: none; font-size: 1rem; }
    .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
    .episode-card {
      background: rgba(18, 0, 24, 0.6); border: 1px solid rgba(139,92,246,0.1); border-radius: 12px;
      overflow: hidden; cursor: pointer; transition: var(--transition); display: flex; flex-direction: column;
    }
    .episode-card:hover { border-color: var(--primary); box-shadow: 0 5px 15px rgba(139,92,246,0.25); transform: translateY(-3px); }
    .episode-thumbnail { position: relative; aspect-ratio: 16/10; overflow: hidden; }
    .episode-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .episode-play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transition); }
    .episode-card:hover .episode-play-overlay { opacity: 1; }
    .episode-play-overlay i { font-size: 2rem; color: #fff; filter: drop-shadow(0 0 8px var(--primary-glow)); }
    .episode-info { padding: 1rem; display: flex; flex-direction: column; gap: 0.25rem; }
    .episode-info h4 { font-size: 0.95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .episode-info p { font-size: 0.8rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Cast / Recommendation Slider */
    .slider-section { margin-top: 3rem; }
    .slider-section h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.25rem; }
    .slider-container { display: flex; gap: 1.25rem; overflow-x: auto; padding-bottom: 0.5rem; }
    .cast-card { min-width: 130px; max-width: 130px; text-align: center; display: flex; flex-direction: column; gap: 0.5rem; }
    .cast-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 50%; border: 2px solid rgba(139,92,246,0.2); }
    .cast-card h5 { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cast-card span { font-size: 0.75rem; color: var(--text-muted); }

    .footer {
      background: #040206; border-top: 1px solid rgba(139, 92, 246, 0.15);
      padding: 3rem 2rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
      margin-top: auto; text-align: center;
    }
    .footer-banner { height: 50px; object-fit: contain; }

    @media (max-width: 1024px) {
      .detail-grid { padding: 0 2rem; }
    }
    @media (max-width: 768px) {
      .navbar { padding: 0.75rem 1rem; }
      .detail-grid { grid-template-columns: 1fr; margin-top: -150px; padding: 0 1rem; gap: 1.5rem; }
      .poster-block { width: 200px; margin: 0 auto; }
      .info-main { padding-top: 0; text-align: center; }
      .metadata-strip { justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- Core Sticky Header block -->
  <header class="navbar">
    <div class="nav-left">
      <button class="menu-btn" onclick="window.history.back()" aria-label="Go Back"><i class="fa-solid fa-arrow-left"></i></button>
    </div>
    <div class="nav-center">
      <a href="index.html">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjwxClcajSZy1q1gj_1kf_9y1J7mutn4jWfqdhlBVbFjLkViz_Z3-nuIZ11W0qOd1jlFgMFYi-g_XrpIiRbQjZd-wPwg4RWWyhbR0QLw0-ZgX5DFncVPNOxrDBouMlbdz2sLvQS65JbQaLJpQReWhjceG8Rn5cxrNusoQAXieXFcX_q_LZthCYS1AsCR30/s320/NamiTube%20Original%20banner.png" alt="NamiTube Original logo banner" class="nav-banner">
      </a>
    </div>
    <div class="nav-right">
      <button class="search-btn" onclick="window.location.href='discover.html'" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
  </header>

  <!-- Large Backdrop Visual -->
  <section class="backdrop-container" id="info-backdrop"></section>

  <!-- Detailed Dashboard Content Work Grid -->
  <main class="detail-grid">
    <div class="poster-block">
      <img src="https://via.placeholder.com/342x513?text=NamiTube" alt="Poster Display" class="info-poster" id="info-poster">
      <button class="watchlist-btn" id="watchlist-toggle"><i class="fa-regular fa-bookmark"></i> Add to Watchlist</button>
      <button class="watchlist-btn" id="watch-now-btn" style="background:var(--primary); font-size:1.1rem; border:none;"><i class="fa-solid fa-play"></i> Watch Now</button>
    </div>

    <div class="info-main">
      <h1 class="info-title" id="info-title">Loading Title...</h1>
      <p class="info-tagline" id="info-tagline"></p>
      
      <div class="metadata-strip" id="info-metadata">
        <!-- Script Loaded Metadata -->
      </div>

      <p class="info-overview" id="info-overview">Fetching media overview...</p>

      <!-- TV Interactive Seasons UI (Default hidden for movies) -->
      <div class="tv-seasons-block" id="tv-seasons-container" style="display: none;">
        <div class="seasons-header">
          <h3>Episodes</h3>
          <select id="season-selector"></select>
        </div>
        <div class="episodes-grid" id="episodes-grid"></div>
      </div>

      <!-- Casting Section Carousel -->
      <div class="slider-section" id="cast-section">
        <h3>Primary Character Voices</h3>
        <div class="slider-container" id="cast-container"></div>
      </div>

      <!-- Filtered Recommended Content Carousel -->
      <div class="slider-section" id="rec-section">
        <h3>You May Also Like</h3>
        <div class="slider-container" id="rec-container"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-banner-container">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjwxClcajSZy1q1gj_1kf_9y1J7mutn4jWfqdhlBVbFjLkViz_Z3-nuIZ11W0qOd1jlFgMFYi-g_XrpIiRbQjZd-wPwg4RWWyhbR0QLw0-ZgX5DFncVPNOxrDBouMlbdz2sLvQS65JbQaLJpQReWhjceG8Rn5cxrNusoQAXieXFcX_q_LZthCYS1AsCR30/s320/NamiTube%20Original%20banner.png" alt="NamiTube Footer Logo" class="footer-banner">
    </div>
    <p class="copyright">
      &copy; 2026 NamiTube. All Rights Reserved. Powered by TMDB API.
    </p>
  </footer>

  <script>
    const TMDB_API_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
    const TMDB_BASE_URL = "https://api.themoviedb.org/3";

    // Route Parser Engine
    const params = new URLSearchParams(window.location.search);
    const mediaId = params.get('id');
    const mediaType = params.get('type') || 'movie';

    let globalItem = null;

    async function loadMediaDetails() {
      if (!mediaId) { window.location.href = "index.html"; return; }
      
      try {
        const details = await fetch(`${TMDB_BASE_URL}/${mediaType}/${mediaId}?api_key=${TMDB_API_KEY}&append_to_response=credits,recommendations`);
        const item = await details.json();
        globalItem = item;

        // Populate core design blocks
        document.getElementById('info-backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${item.backdrop_path}')`;
        document.getElementById('info-poster').src = item.poster_path ? `https://image.tmdb.org/t/p/w342${item.poster_path}` : 'https://via.placeholder.com/342x513?text=No+Poster';
        document.getElementById('info-title').textContent = item.title || item.name || 'Untitled';
        document.getElementById('info-tagline').textContent = item.tagline || "";
        document.getElementById('info-overview').textContent = item.overview || "This incredible animation project detail list is curated right here on NamiTube.";

        // Set Watch now link parameter
        const watchBtn = document.getElementById('watch-now-btn');
        if (mediaType === 'tv') {
          watchBtn.setAttribute('onclick', `window.location.href='watch.html?id=${mediaId}&type=tv&season=1&episode=1'`);
        } else {
          watchBtn.setAttribute('onclick', `window.location.href='watch.html?id=${mediaId}&type=movie'`);
        }

        // Render Metadata line block
        const releaseYear = item.release_date || item.first_air_date ? new Date(item.release_date || item.first_air_date).getFullYear() : 'N/A';
        const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
        const genresList = item.genres ? item.genres.map(g => g.name).slice(0, 3).join(', ') : 'Animation';
        const runTime = mediaType === 'movie' ? `${item.runtime || 'N/A'} mins` : `${item.number_of_seasons || 'N/A'} Seasons`;

        document.getElementById('info-metadata').innerHTML = `
          <span><i class="fa-solid fa-star meta-star"></i> ${rating}</span>
          <span><i class="fa-solid fa-clock"></i> ${runTime}</span>
          <span><i class="fa-solid fa-calendar"></i> ${releaseYear}</span>
          <span><i class="fa-solid fa-folder-open"></i> ${genresList}</span>
        `;

        // Local Storage Watchlist Toggle setup
        setupWatchlist(item);

        // Conditional implementation of Season Dashboard blocks
        if (mediaType === 'tv') {
          document.getElementById('tv-seasons-container').style.display = 'block';
          populateSeasonDropdown(item.seasons);
        }

        // Populate dynamic lists
        populateCredits(item.credits);
        populateRecommendations(item.recommendations);
        addToWatchedHistory(item);

      } catch (err) {
        console.error(err);
      }
    }

    // Season Dropdown selector logic execution
    function populateSeasonDropdown(seasons) {
      const selector = document.getElementById('season-selector');
      // Filter specials season 0 if users don't need specials, keeping it clean
      const validSeasons = seasons.filter(s => s.season_number > 0);
      
      selector.innerHTML = validSeasons.map(s => `<option value="${s.season_number}">${s.name}</option>`).join('');
      selector.addEventListener('change', (e) => loadEpisodes(e.target.value));
      
      if (validSeasons.length > 0) loadEpisodes(validSeasons[0].season_number);
    }

    async function loadEpisodes(seasonNumber) {
      const container = document.getElementById('episodes-grid');
      container.innerHTML = Array(4).fill().map(() => `<div class="episode-card skeleton" style="height: 150px;"></div>`).join('');
      
      try {
        const res = await fetch(`${TMDB_BASE_URL}/tv/${mediaId}/season/${seasonNumber}?api_key=${TMDB_API_KEY}`);
        const data = await res.json();
        
        container.innerHTML = data.episodes.map(ep => {
          const thumb = ep.still_path ? `https://image.tmdb.org/t/p/w300${ep.still_path}` : 'https://via.placeholder.com/300x180?text=NamiTube';
          return `
            <div class="episode-card" onclick="window.location.href='watch.html?id=${mediaId}&type=tv&season=${seasonNumber}&episode=${ep.episode_number}'">
              <div class="episode-thumbnail">
                <img src="${thumb}" alt="${ep.name}" loading="lazy">
                <div class="episode-play-overlay"><i class="fa-solid fa-play"></i></div>
              </div>
              <div class="episode-info">
                <h4>E${ep.episode_number} &bull; ${ep.name || 'Episode Name'}</h4>
                <p>${ep.overview || 'Watch this incredible episode on NamiTube servers.'}</p>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        container.innerHTML = '<p style="grid-column:1/-1;">Error loading season details.</p>';
      }
    }

    // Populate Dynamic Casting visual circles
    function populateCredits(credits) {
      const container = document.getElementById('cast-container');
      if (!credits || !credits.cast || credits.cast.length === 0) {
        document.getElementById('cast-section').style.display = 'none';
        return;
      }
      container.innerHTML = credits.cast.slice(0, 10).map(c => {
        const img = c.profile_path ? `https://image.tmdb.org/t/p/w185${c.profile_path}` : 'https://via.placeholder.com/185x185?text=Cast';
        return `
          <div class="cast-card">
            <img src="${img}" alt="${c.name}" loading="lazy">
            <h5>${c.name}</h5>
            <span>${c.character}</span>
          </div>
        `;
      }).join('');
    }

    // Populate TMDB Recommendation system with rigor validation on Animation genre ID 16
    function populateRecommendations(recommendations) {
      const container = document.getElementById('rec-container');
      if (!recommendations || !recommendations.results) {
        document.getElementById('rec-section').style.display = 'none';
        return;
      }
      const filtered = recommendations.results.filter(item => item.genre_ids && item.genre_ids.includes(16)).slice(0, 10);
      
      if (filtered.length === 0) {
        document.getElementById('rec-section').style.display = 'none';
        return;
      }

      container.innerHTML = filtered.map(item => {
        const title = item.title || item.name || 'Untitled';
        const poster = item.poster_path ? `https://image.tmdb.org/t/p/w185${item.poster_path}` : 'https://via.placeholder.com/185x278?text=No+Poster';
        return `
          <div class="media-card" style="min-width: 130px; max-width: 130px;" onclick="window.location.href='info.html?id=${item.id}&type=${mediaType}'">
            <img src="${poster}" alt="${title}" loading="lazy">
            <div class="card-info" style="padding:0.5rem;">
              <span class="card-title" style="font-size:0.8rem;">${title}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Storage watch engine tracking
    function setupWatchlist(item) {
      const btn = document.getElementById('watchlist-toggle');
      let watchlist = JSON.parse(localStorage.getItem('namitube_watchlist') || '[]');
      
      let isAdded = watchlist.some(x => x.id === item.id.toString());
      updateButtonState(isAdded);

      btn.addEventListener('click', () => {
        watchlist = JSON.parse(localStorage.getItem('namitube_watchlist') || '[]');
        if (isAdded) {
          watchlist = watchlist.filter(x => x.id !== item.id.toString());
        } else {
          watchlist.push({
            id: item.id.toString(),
            type: mediaType,
            title: item.title || item.name,
            poster: item.poster_path ? `https://image.tmdb.org/t/p/w185${item.poster_path}` : 'https://via.placeholder.com/185x278?text=NamiTube'
          });
        }
        localStorage.setItem('namitube_watchlist', JSON.stringify(watchlist));
        isAdded = !isAdded;
        updateButtonState(isAdded);
      });

      function updateButtonState(added) {
        if (added) {
          btn.innerHTML = `<i class="fa-solid fa-check"></i> On Watchlist`;
          btn.classList.add('active');
        } else {
          btn.innerHTML = `<i class="fa-regular fa-bookmark"></i> Add to Watchlist`;
          btn.classList.remove('active');
        }
      }
    }

    function addToWatchedHistory(item) {
      let history = JSON.parse(localStorage.getItem('namitube_watched') || '[]');
      history = history.filter(x => x.id !== item.id.toString());
      history.unshift({
        id: item.id.toString(),
        type: mediaType,
        title: item.title || item.name,
        poster: item.poster_path ? `https://image.tmdb.org/t/p/w185${item.poster_path}` : 'https://via.placeholder.com/185x278?text=NamiTube'
      });
      localStorage.setItem('namitube_watched', JSON.stringify(history.slice(0, 15)));
    }

    window.addEventListener('DOMContentLoaded', loadMediaDetails);
  </script>
</body>
</html>
