<style>
:root{
  --bg:#080810;
  --bg2:#0d0d1a;
  --bg3:#12121f;
  --surface:#1a1a2e;
  --surface2:#1e1e35;
  --border:rgba(130,80,255,.18);
  --purple:#8a2be2;
  --purple2:#a855f7;
  --purple3:#c084fc;
  --accent:#e040fb;
  --text:#f0eeff;
  --text2:#b0a8d0;
  --text3:#7068a0;
  --gold:#ffd700;
  --green:#00e676;
  --red:#ff5252;
  --radius:12px;
  --radius2:8px;
  --transition:all .3s cubic-bezier(.4,0,.2,1);
  --shadow:0 8px 32px rgba(138,43,226,.15);
  --glow:0 0 20px rgba(168,85,247,.4);
  --header-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{cursor:pointer;border:none;outline:none;font-family:inherit}

/* ===== HEADER ===== */
#header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:var(--header-h);
  background:linear-gradient(180deg,rgba(8,8,16,.98) 0%,rgba(8,8,16,.85) 100%);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(12px,3vw,32px);
  gap:12px;
}
.hdr-left,.hdr-right{display:flex;align-items:center;gap:12px;flex:1}
.hdr-right{justify-content:flex-end}
.hdr-center{flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.hdr-logo{height:40px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px rgba(168,85,247,.5))}
.icon-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:18px;
  transition:var(--transition);
}
.icon-btn:hover{background:rgba(168,85,247,.2);border-color:var(--purple2);color:var(--purple3);box-shadow:var(--glow)}
.nav-desktop{display:flex;align-items:center;gap:4px}
.nav-desktop a{
  padding:6px 14px;border-radius:20px;
  color:var(--text2);font-size:.88rem;font-weight:500;letter-spacing:.02em;
  transition:var(--transition);position:relative;
}
.nav-desktop a:hover,.nav-desktop a.active{color:var(--text);background:rgba(168,85,247,.15)}
.nav-desktop a.active::after{
  content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);
  width:20px;height:2px;border-radius:1px;background:var(--purple2);
}
@media(max-width:768px){.nav-desktop{display:none}}

/* ===== SIDEBAR ===== */
#sidebar-overlay{
  position:fixed;inset:0;z-index:1100;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#sidebar-overlay.open{opacity:1;pointer-events:all}
#sidebar{
  position:fixed;top:0;left:0;bottom:0;z-index:1200;
  width:min(280px,85vw);
  background:linear-gradient(135deg,var(--bg2),var(--surface));
  border-right:1px solid var(--border);
  transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;padding:0;overflow:hidden;
}
#sidebar.open{transform:translateX(0)}
.sidebar-header{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-logo{height:32px;width:auto;object-fit:contain}
.sidebar-close{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:16px;transition:var(--transition);
}
.sidebar-close:hover{background:rgba(255,80,80,.2);color:var(--red)}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.sidebar-nav a{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:var(--radius2);
  color:var(--text2);font-size:.95rem;font-weight:500;
  transition:var(--transition);margin-bottom:4px;
}
.sidebar-nav a:hover,.sidebar-nav a.active{
  background:rgba(168,85,247,.15);color:var(--text);
  border-left:3px solid var(--purple2);padding-left:13px;
}
.sidebar-nav a svg{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);color:var(--text3);font-size:.75rem;text-align:center}

/* ===== SEARCH OVERLAY ===== */
#search-overlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(8,8,16,.97);backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(60px,10vh,120px) 16px 32px;
  opacity:0;pointer-events:none;transition:opacity .3s;
  overflow-y:auto;
}
#search-overlay.open{opacity:1;pointer-events:all}
.search-wrap{width:100%;max-width:720px}
.search-input-row{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:50px;padding:6px 6px 6px 24px;
  box-shadow:0 0 40px rgba(168,85,247,.2);
  transition:var(--transition);
}
.search-input-row:focus-within{border-color:var(--purple2);box-shadow:0 0 50px rgba(168,85,247,.35)}
#search-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-size:clamp(1rem,2.5vw,1.3rem);
  font-family:inherit;caret-color:var(--purple2);
}
#search-input::placeholder{color:var(--text3)}
.search-close-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.07);color:var(--text2);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:var(--transition);flex-shrink:0;
}
.search-close-btn:hover{background:rgba(255,80,80,.2);color:var(--red)}
.search-filters{
  display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;
}
.filter-select{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text2);border-radius:20px;padding:6px 12px;
  font-size:.8rem;font-family:inherit;outline:none;cursor:pointer;
  transition:var(--transition);
}
.filter-select:focus,.filter-select:hover{border-color:var(--purple2);color:var(--text)}
#search-results{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:16px;margin-top:24px;
  max-height:60vh;overflow-y:auto;padding-right:4px;
}
.search-card{
  border-radius:var(--radius2);overflow:hidden;
  background:var(--surface);border:1px solid var(--border);
  cursor:pointer;transition:var(--transition);
}
.search-card:hover{transform:translateY(-4px);border-color:var(--purple2);box-shadow:var(--shadow)}
.search-card img{width:100%;aspect-ratio:2/3;object-fit:cover}
.search-card-info{padding:8px}
.search-card-title{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.search-card-sub{font-size:.7rem;color:var(--text3);margin-top:2px}

/* ===== HERO SLIDER ===== */
#hero{
  position:relative;width:100%;height:min(100vh,700px);
  min-height:500px;overflow:hidden;
  margin-top:var(--header-h);
}
.hero-track{
  display:flex;height:100%;
  transition:transform .7s cubic-bezier(.4,0,.2,1);
}
.hero-slide{
  position:relative;flex:0 0 100%;height:100%;overflow:hidden;
}
.hero-slide-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center top;
  transition:transform 8s ease;
}
.hero-slide.active .hero-slide-bg{transform:scale(1.05)}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(8,8,16,.95) 0%,rgba(8,8,16,.7) 40%,rgba(8,8,16,.2) 70%,transparent 100%),
             linear-gradient(0deg,rgba(8,8,16,1) 0%,transparent 40%);
}
.hero-content{
  position:absolute;bottom:clamp(48px,8vh,100px);left:clamp(20px,5vw,80px);
  max-width:min(600px,90vw);
}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.hero-badge{
  padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
}
.badge-score{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.badge-genre{background:rgba(168,85,247,.15);color:var(--purple3);border:1px solid rgba(168,85,247,.3)}
.hero-title{
  font-size:clamp(1.6rem,4.5vw,3.2rem);font-weight:800;line-height:1.15;
  letter-spacing:-.02em;text-shadow:0 2px 20px rgba(0,0,0,.8);
  margin-bottom:12px;
  animation:fadeUp .6s ease both;
}
.hero-desc{
  font-size:clamp(.85rem,1.5vw,1rem);color:var(--text2);line-height:1.65;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:20px;text-shadow:0 1px 8px rgba(0,0,0,.8);
  animation:fadeUp .6s .1s ease both;
}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;animation:fadeUp .6s .2s ease both}
.btn-watch{
  display:flex;align-items:center;gap:8px;
  padding:12px 24px;border-radius:50px;
  background:linear-gradient(135deg,var(--purple),var(--accent));
  color:#fff;font-size:.92rem;font-weight:700;letter-spacing:.03em;
  box-shadow:0 4px 20px rgba(138,43,226,.5);
  transition:var(--transition);
}
.btn-watch:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(138,43,226,.7)}
.btn-details{
  display:flex;align-items:center;gap:8px;
  padding:12px 24px;border-radius:50px;
  background:rgba(255,255,255,.1);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:.92rem;font-weight:600;
  transition:var(--transition);
}
.btn-details:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4)}
.hero-controls{
  position:absolute;bottom:clamp(16px,4vh,40px);right:clamp(16px,4vw,60px);
  display:flex;align-items:center;gap:12px;
}
.hero-dots{display:flex;gap:6px}
.hero-dot{
  width:8px;height:8px;border-radius:4px;
  background:rgba(255,255,255,.3);transition:all .4s;cursor:pointer;
}
.hero-dot.active{width:24px;background:var(--purple2)}
.hero-arrow{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:var(--transition);
}
.hero-arrow:hover{background:rgba(168,85,247,.4);border-color:var(--purple2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== SECTIONS ===== */
.section{padding:clamp(24px,4vh,48px) clamp(12px,3vw,32px)}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.section-title{
  font-size:clamp(1rem,2.2vw,1.3rem);font-weight:700;letter-spacing:.02em;
  display:flex;align-items:center;gap:10px;
}
.section-title::before{
  content:'';width:4px;height:20px;border-radius:2px;
  background:linear-gradient(var(--purple),var(--accent));
}
.section-more{
  font-size:.8rem;color:var(--purple3);font-weight:500;
  border:1px solid rgba(168,85,247,.3);border-radius:20px;
  padding:4px 12px;transition:var(--transition);
}
.section-more:hover{background:rgba(168,85,247,.1);color:var(--purple2)}

/* ===== SLIDER ===== */
.slider-container{position:relative}
.slider-track-wrap{overflow:hidden;border-radius:var(--radius)}
.slider-track{
  display:flex;gap:12px;
  transition:transform .4s cubic-bezier(.4,0,.2,1);
  will-change:transform;
  cursor:grab;
  user-select:none;
}
.slider-track:active{cursor:grabbing}
.slider-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:40px;height:40px;border-radius:50%;
  background:rgba(13,13,26,.95);border:1px solid var(--border);
  color:var(--text2);display:flex;align-items:center;justify-content:center;
  font-size:16px;z-index:10;transition:var(--transition);
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.slider-arrow:hover{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:var(--glow)}
.slider-arrow.prev{left:-16px}
.slider-arrow.next{right:-16px}
@media(max-width:600px){.slider-arrow{display:none}}

/* ===== ANIME CARD ===== */
.anime-card{
  flex:0 0 auto;
  width:clamp(130px,18vw,180px);
  border-radius:var(--radius2);overflow:hidden;
  background:var(--surface);border:1px solid transparent;
  cursor:pointer;transition:var(--transition);
  position:relative;
}
.anime-card:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:var(--purple2);
  box-shadow:0 12px 36px rgba(138,43,226,.35);
}
.card-poster{position:relative;aspect-ratio:2/3;overflow:hidden}
.card-poster img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.anime-card:hover .card-poster img{transform:scale(1.08)}
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(8,8,16,.95) 0%,rgba(8,8,16,.3) 50%,transparent 100%);
  opacity:0;transition:opacity .3s;
  display:flex;align-items:center;justify-content:center;
}
.anime-card:hover .card-overlay{opacity:1}
.card-play{
  width:44px;height:44px;border-radius:50%;
  background:rgba(168,85,247,.9);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;
  box-shadow:0 0 20px rgba(168,85,247,.6);
  transform:scale(.7);transition:transform .3s;
}
.anime-card:hover .card-play{transform:scale(1)}
.card-badges{
  position:absolute;top:6px;left:6px;right:6px;
  display:flex;gap:4px;flex-wrap:wrap;
}
.cbadge{
  padding:2px 6px;border-radius:4px;
  font-size:.6rem;font-weight:700;letter-spacing:.04em;
}
.cbadge-score{background:rgba(255,215,0,.85);color:#000}
.cbadge-hd{background:rgba(0,230,118,.85);color:#000}
.cbadge-ep{background:rgba(168,85,247,.85);color:#fff}
.cbadge-format{background:rgba(30,30,53,.9);color:var(--text2);border:1px solid var(--border)}
.card-info{padding:8px 10px 10px}
.card-title{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.card-meta{font-size:.68rem;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== SKELETON ===== */
.skeleton{
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:var(--radius2);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{
  flex:0 0 auto;
  width:clamp(130px,18vw,180px);
  aspect-ratio:2/3;
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:var(--radius2);
}

/* ===== FOOTER ===== */
#footer{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:clamp(24px,4vh,48px) clamp(12px,3vw,32px) 24px;
  text-align:center;
}
.footer-logo{height:36px;width:auto;margin:0 auto 20px;filter:brightness(.7)}
.footer-nav{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:16px}
.footer-nav a{color:var(--text3);font-size:.82rem;transition:color .2s}
.footer-nav a:hover{color:var(--purple3)}
.footer-disclaimer{
  font-size:.72rem;color:var(--text3);line-height:1.6;
  max-width:600px;margin:0 auto 16px;
}
.footer-copy{font-size:.72rem;color:var(--text3)}

/* ===== MISC ===== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);border-radius:var(--radius2);
  padding:10px 20px;font-size:.85rem;
  box-shadow:var(--shadow);z-index:9999;
  transition:transform .3s;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
  .hero-actions .btn-details{display:none}
  .hero-title{font-size:1.4rem}
}
</style>
</head>

<div class="toast" id="toast"></div>

<script>
// ===== GLOBALS =====
const ANILIST = 'https://graphql.anilist.co';
let heroSlides = [];
let heroCurrent = 0;
let heroTimer = null;
let heroLocked = false;
let heroDragging = false;
let heroDragX = 0;
let heroStartX = 0;

// ===== UTILS =====
async function gql(query, variables = {}, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 12000);
      const res = await fetch(ANILIST, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ query, variables }),
        signal: ctrl.signal
      });
      clearTimeout(to);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.errors) throw new Error(data.errors[0].message);
      return data.data;
    } catch (e) {
      if (i === retries - 1) throw e;
      await new Promise(r => setTimeout(r, 1000 * (i + 1)));
    }
  }
}

function cache(key, data, ttl = 300000) {
  try { localStorage.setItem(key, JSON.stringify({ data, exp: Date.now() + ttl })); } catch {}
}
function getCache(key) {
  try {
    const s = localStorage.getItem(key);
    if (!s) return null;
    const p = JSON.parse(s);
    return p.exp > Date.now() ? p.data : null;
  } catch { return null; }
}

function formatScore(s) { return s ? (s / 10).toFixed(1) : 'N/A'; }
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '...' : (s || ''); }
function stripHtml(s) { return s ? s.replace(/<[^>]+>/g, '') : ''; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== SIDEBAR =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ===== SEARCH =====
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').focus();
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

let searchDebounce = null;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => doSearch(e.target.value.trim()), 400);
});
['f-genre','f-format','f-status','f-sort'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    doSearch(document.getElementById('search-input').value.trim());
  });
});

async function doSearch(q) {
  const genre = document.getElementById('f-genre').value;
  const format = document.getElementById('f-format').value;
  const status = document.getElementById('f-status').value;
  const sort = document.getElementById('f-sort').value || 'TRENDING_DESC';
  const container = document.getElementById('search-results');
  container.innerHTML = '<div style="grid-column:1/-1;color:var(--text3);font-size:.85rem;padding:16px">Searching...</div>';
  const vars = { page:1, perPage:20, sort:[sort] };
  if (q) vars.search = q;
  if (genre) vars.genre = genre;
  if (format) vars.format = format;
  if (status) vars.status = status;
  const Q = `query($page:Int,$perPage:Int,$search:String,$genre:String,$format:MediaFormat,$status:MediaStatus,$sort:[MediaSort]){
    Page(page:$page,perPage:$perPage){
      media(type:ANIME,search:$search,genre:$genre,format:$format,status:$status,sort:$sort){
        id title{romaji english}coverImage{large}averageScore format episodes status
      }
    }
  }`;
  try {
    const data = await gql(Q, vars);
    const list = data?.Page?.media || [];
    if (!list.length) { container.innerHTML = '<div style="grid-column:1/-1;color:var(--text3);padding:24px;text-align:center">No results found</div>'; return; }
    container.innerHTML = list.map(a => `
      <div class="search-card" onclick="location.href='anime.html?id=${a.id}'">
        <img src="${a.coverImage?.large || ''}" alt="${a.title?.romaji || ''}" loading="lazy"/>
        <div class="search-card-info">
          <div class="search-card-title">${a.title?.english || a.title?.romaji || 'Unknown'}</div>
          <div class="search-card-sub">${a.format || ''} · ★ ${formatScore(a.averageScore)}</div>
        </div>
      </div>`).join('');
  } catch { container.innerHTML = '<div style="grid-column:1/-1;color:var(--red);padding:24px;text-align:center">Failed to search</div>'; }
}

// Load genres for filter
(async () => {
  const Q = `query{GenreCollection}`;
  try {
    const data = await gql(Q);
    const genres = data?.GenreCollection || [];
    const sel = document.getElementById('f-genre');
    genres.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o); });
  } catch {}
})();

// ===== HERO SLIDER =====
const HERO_QUERY = `query($page:Int,$perPage:Int){
  Page(page:$page,perPage:$perPage){
    media(type:ANIME,sort:TRENDING_DESC,status:RELEASING){
      id title{romaji english}bannerImage coverImage{extraLarge}
      genres averageScore description(asHtml:false) episodes status format
    }
  }
}`;

async function loadHero() {
  const ck = 'hero_slides';
  let slides = getCache(ck);
  if (!slides) {
    try {
      const data = await gql(HERO_QUERY, { page:1, perPage:15 });
      slides = (data?.Page?.media || []).filter(a => a.bannerImage).slice(0, 12);
      cache(ck, slides);
    } catch { slides = []; }
  }
  heroSlides = slides;
  buildHero();
}

function buildHero() {
  const track = document.getElementById('hero-track');
  const dots = document.getElementById('hero-dots');
  if (!heroSlides.length) { track.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3)">Loading...</div>'; return; }
  track.innerHTML = heroSlides.map((a, i) => `
    <div class="hero-slide${i===0?' active':''}" data-index="${i}">
      <div class="hero-slide-bg" style="background-image:url('${a.bannerImage}')"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-badges">
          ${a.averageScore ? `<span class="hero-badge badge-score">★ ${formatScore(a.averageScore)}</span>` : ''}
          ${(a.genres||[]).slice(0,3).map(g=>`<span class="hero-badge badge-genre">${g}</span>`).join('')}
        </div>
        <h1 class="hero-title">${a.title?.english || a.title?.romaji || 'Unknown'}</h1>
        <p class="hero-desc">${truncate(stripHtml(a.description),160)}</p>
        <div class="hero-actions">
          <a href="watch.html?id=${a.id}&ep=1" class="btn-watch">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><polygon points="5,3 19,12 5,21"/></svg>
            Watch Now
          </a>
          <a href="anime.html?id=${a.id}" class="btn-details">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Details
          </a>
        </div>
      </div>
    </div>`).join('');
  dots.innerHTML = heroSlides.map((_,i) => `<button class="hero-dot${i===0?' active':''}" onclick="gotoSlide(${i})"></button>`).join('');
  startHeroTimer();
  bindHeroDrag();
  document.getElementById('hero-prev').onclick = () => gotoSlide((heroCurrent - 1 + heroSlides.length) % heroSlides.length);
  document.getElementById('hero-next').onclick = () => gotoSlide((heroCurrent + 1) % heroSlides.length);
}

function gotoSlide(idx) {
  if (heroLocked || !heroSlides.length) return;
  heroLocked = true;
  const slides = document.querySelectorAll('.hero-slide');
  const dots = document.querySelectorAll('.hero-dot');
  slides[heroCurrent]?.classList.remove('active');
  dots[heroCurrent]?.classList.remove('active');
  heroCurrent = (idx + heroSlides.length) % heroSlides.length;
  slides[heroCurrent]?.classList.add('active');
  dots[heroCurrent]?.classList.add('active');
  document.getElementById('hero-track').style.transform = `translateX(-${heroCurrent * 100}%)`;
  setTimeout(() => heroLocked = false, 750);
  restartHeroTimer();
}

function startHeroTimer() {
  clearInterval(heroTimer);
  heroTimer = setInterval(() => gotoSlide(heroCurrent + 1), 6000);
}
function restartHeroTimer() { startHeroTimer(); }

function bindHeroDrag() {
  const track = document.getElementById('hero-track');
  track.addEventListener('mousedown', e => { heroDragging = true; heroStartX = e.clientX; clearInterval(heroTimer); });
  document.addEventListener('mouseup', e => {
    if (!heroDragging) return;
    heroDragging = false;
    const diff = e.clientX - heroStartX;
    if (Math.abs(diff) > 60) gotoSlide(diff < 0 ? heroCurrent + 1 : heroCurrent - 1);
    else restartHeroTimer();
  });
  track.addEventListener('touchstart', e => { heroStartX = e.touches[0].clientX; clearInterval(heroTimer); }, {passive:true});
  track.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - heroStartX;
    if (Math.abs(diff) > 50) gotoSlide(diff < 0 ? heroCurrent + 1 : heroCurrent - 1);
    else restartHeroTimer();
  }, {passive:true});
}

// ===== SECTION BUILDER =====
const SECTIONS = [
  { id:'recently-updated', title:'Recently Updated', vars:{ sort:'UPDATED_AT_DESC', status:'RELEASING' } },
  { id:'trending', title:'Trending Now', vars:{ sort:'TRENDING_DESC' } },
  { id:'top-airing', title:'Top Airing', vars:{ sort:'SCORE_DESC', status:'RELEASING' } },
  { id:'top-rated', title:'Top Rated', vars:{ sort:'SCORE_DESC', episodes_greater:1 } },
  { id:'movies', title:'Latest Movies', vars:{ sort:'TRENDING_DESC', format:'MOVIE' } },
  { id:'completed', title:'Completed', vars:{ sort:'SCORE_DESC', status:'FINISHED' } },
  { id:'upcoming', title:'Upcoming', vars:{ sort:'POPULARITY_DESC', status:'NOT_YET_RELEASED' } },
];

const SECTION_QUERY = `query($page:Int,$perPage:Int,$sort:MediaSort,$status:MediaStatus,$format:MediaFormat,$episodes_greater:Int){
  Page(page:$page,perPage:$perPage){
    media(type:ANIME,sort:[$sort],status:$status,format:$format,episodes_greater:$episodes_greater){
      id title{romaji english}coverImage{large}averageScore episodes format status
    }
  }
}`;

const sliders = {};

async function loadSection(sec) {
  const cKey = `sec_${sec.id}`;
  let list = getCache(cKey);
  if (!list) {
    try {
      const vars = { page:1, perPage:20, ...sec.vars };
      const data = await gql(SECTION_QUERY, vars);
      list = data?.Page?.media || [];
      cache(cKey, list);
    } catch { list = []; }
  }
  const container = document.getElementById(`slider-track-${sec.id}`);
  if (!container) return;
  if (!list.length) { container.innerHTML = '<div style="color:var(--text3);padding:20px;font-size:.85rem">No data available</div>'; return; }
  container.innerHTML = list.map(a => buildCard(a)).join('');
  initSlider(sec.id);
}

function buildCard(a) {
  return `<div class="anime-card" onclick="location.href='anime.html?id=${a.id}'">
    <div class="card-poster">
      <img src="${a.coverImage?.large || ''}" alt="${a.title?.romaji||''}" loading="lazy"/>
      <div class="card-overlay"><div class="card-play">&#9654;</div></div>
      <div class="card-badges">
        ${a.averageScore ? `<span class="cbadge cbadge-score">★ ${formatScore(a.averageScore)}</span>` : ''}
        <span class="cbadge cbadge-hd">HD</span>
        ${a.episodes ? `<span class="cbadge cbadge-ep">${a.episodes} EP</span>` : ''}
      </div>
    </div>
    <div class="card-info">
      <div class="card-title">${a.title?.english || a.title?.romaji || 'Unknown'}</div>
      <div class="card-meta">${a.format || 'TV'} · ${a.status || ''}</div>
    </div>
  </div>`;
}

function buildSection(sec) {
  const skeletons = Array(8).fill('<div class="skeleton-card"></div>').join('');
  return `<section class="section" id="sec-${sec.id}">
    <div class="section-header">
      <h2 class="section-title">${sec.title}</h2>
      <a href="search.html" class="section-more">See All →</a>
    </div>
    <div class="slider-container" id="slider-${sec.id}">
      <button class="slider-arrow prev" onclick="slideStep('${sec.id}',-1)">&#8592;</button>
      <div class="slider-track-wrap">
        <div class="slider-track" id="slider-track-${sec.id}">${skeletons}</div>
      </div>
      <button class="slider-arrow next" onclick="slideStep('${sec.id}',1)">&#8594;</button>
    </div>
  </section>`;
}

function initSlider(id) {
  const track = document.getElementById(`slider-track-${id}`);
  if (!track) return;
  const s = sliders[id] = { pos:0, max:0, track };
  updateSliderMax(id);

  let dragging = false, startX = 0, startPos = 0;
  track.addEventListener('mousedown', e => { dragging = true; startX = e.clientX; startPos = s.pos; track.style.transition = 'none'; });
  document.addEventListener('mouseup', e => {
    if (!dragging) return; dragging = false;
    track.style.transition = '';
    const diff = startX - e.clientX;
    s.pos = Math.max(0, Math.min(s.max, startPos + diff));
    track.style.transform = `translateX(-${s.pos}px)`;
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const diff = startX - e.clientX;
    const p = Math.max(0, Math.min(s.max, startPos + diff));
    track.style.transform = `translateX(-${p}px)`;
  });
  track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startPos = s.pos; track.style.transition = 'none'; }, {passive:true});
  track.addEventListener('touchmove', e => {
    const diff = startX - e.touches[0].clientX;
    const p = Math.max(0, Math.min(s.max, startPos + diff));
    track.style.transform = `translateX(-${p}px)`;
  }, {passive:true});
  track.addEventListener('touchend', e => {
    track.style.transition = '';
    const diff = startX - e.changedTouches[0].clientX;
    s.pos = Math.max(0, Math.min(s.max, startPos + diff));
  }, {passive:true});
}

function updateSliderMax(id) {
  const s = sliders[id];
  if (!s) return;
  const wrap = s.track.parentElement;
  if (!wrap) return;
  const scrollW = s.track.scrollWidth;
  const wrapW = wrap.clientWidth;
  s.max = Math.max(0, scrollW - wrapW);
}

function slideStep(id, dir) {
  const s = sliders[id];
  if (!s) return;
  updateSliderMax(id);
  const cardW = (sliders[id].track.querySelector('.anime-card')?.offsetWidth || 180) + 12;
  const step = cardW * 3;
  s.pos = Math.max(0, Math.min(s.max, s.pos + dir * step));
  s.track.style.transform = `translateX(-${s.pos}px)`;
}

const ro = new ResizeObserver(() => {
  Object.keys(sliders).forEach(id => updateSliderMax(id));
});
ro.observe(document.body);

// ===== INIT =====
async function init() {
  // Build section containers
  const cont = document.getElementById('sections-container');
  cont.innerHTML = SECTIONS.map(s => buildSection(s)).join('');
  // Load all
  await loadHero();
  await Promise.allSettled(SECTIONS.map(s => loadSection(s)));
}

init();
</script>
