<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeVault — Premium Anime Streaming</title>
<meta name="description" content="Stream the latest and greatest anime in HD. Trending, airing, movies and more — all free.">
<meta property="og:title" content="AnimeVault — Premium Anime Streaming">
<meta property="og:description" content="Watch anime online in HD quality. Latest episodes, trending shows, and movies.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --bg2: #0d0d12;
  --bg3: #12121a;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --purple: #8b5cf6;
  --purple2: #7c3aed;
  --purple3: #a78bfa;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --text: #f0f0f5;
  --text2: #a0a0b8;
  --text3: #606075;
  --radius: 12px;
  --radius2: 8px;
  --glow: 0 0 40px rgba(139,92,246,0.3);
  --glow2: 0 0 20px rgba(139,92,246,0.2);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  --header-h: 64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;scroll-behavior:smooth}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
ul{list-style:none}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--purple2);border-radius:3px}

/* ── HEADER ── */
#header{position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:1000;display:flex;align-items:center;padding:0 clamp(16px,4vw,40px);gap:16px;transition:background var(--transition),backdrop-filter var(--transition)}
#header.scrolled{background:rgba(6,6,8,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:12px}
.hamburger{width:40px;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:var(--radius2);transition:background var(--transition)}
.hamburger:hover{background:var(--surface)}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:1px;transition:all var(--transition)}
.logo{font-size:clamp(18px,2.5vw,24px);font-weight:900;letter-spacing:-0.5px}
.logo span{background:linear-gradient(135deg,var(--purple3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-nav{display:flex;align-items:center;gap:4px;margin:0 auto}
.header-nav a{padding:8px 16px;border-radius:var(--radius2);font-size:14px;font-weight:500;color:var(--text2);transition:all var(--transition)}
.header-nav a:hover,.header-nav a.active{color:var(--text);background:var(--surface)}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius2);transition:all var(--transition);color:var(--text2)}
.icon-btn:hover{background:var(--surface);color:var(--text)}
.icon-btn svg{width:20px;height:20px}

/* ── SIDEBAR ── */
#sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1100;opacity:0;pointer-events:none;transition:opacity var(--transition)}
#sidebar-overlay.open{opacity:1;pointer-events:all}
#sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--bg3);border-right:1px solid var(--border);z-index:1200;transform:translateX(-100%);transition:transform var(--transition);padding:24px 16px;overflow-y:auto}
#sidebar.open{transform:translateX(0)}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.sidebar-nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius);color:var(--text2);font-weight:500;transition:all var(--transition);margin-bottom:4px}
.sidebar-nav a:hover{background:var(--surface);color:var(--text)}
.sidebar-nav svg{width:18px;height:18px;flex-shrink:0}

/* ── SEARCH OVERLAY ── */
#search-overlay{position:fixed;inset:0;background:rgba(6,6,8,0.97);backdrop-filter:blur(20px);z-index:2000;opacity:0;pointer-events:none;transition:opacity var(--transition);display:flex;flex-direction:column;padding:clamp(16px,4vw,40px)}
#search-overlay.open{opacity:1;pointer-events:all}
.search-head{display:flex;align-items:center;gap:16px;margin-bottom:24px;max-width:800px;width:100%;margin-left:auto;margin-right:auto}
.search-input-wrap{flex:1;position:relative;display:flex;align-items:center}
.search-input-wrap svg{position:absolute;left:16px;width:20px;height:20px;color:var(--text3)}
#search-input{width:100%;padding:14px 16px 14px 48px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:16px;font-family:'Outfit',sans-serif;outline:none;transition:border-color var(--transition)}
#search-input:focus{border-color:var(--purple)}
#search-input::placeholder{color:var(--text3)}
.search-close{padding:12px 20px;background:var(--surface);border-radius:var(--radius);font-size:14px;font-weight:500;color:var(--text2);transition:all var(--transition)}
.search-close:hover{background:var(--surface2);color:var(--text)}
.search-filters{display:flex;gap:8px;flex-wrap:wrap;max-width:800px;width:100%;margin:0 auto 24px}
.filter-select{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text2);font-size:13px;font-family:'Outfit',sans-serif;outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--purple)}
.search-results-area{flex:1;overflow-y:auto;max-width:1200px;width:100%;margin:0 auto}
.search-suggestions{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.search-hint{color:var(--text3);font-size:14px;text-align:center;margin-top:48px}

/* ── HERO SLIDER ── */
#hero{position:relative;height:100svh;min-height:500px;overflow:hidden;margin-top:0}
.hero-slides{display:flex;height:100%;will-change:transform}
.hero-slide{min-width:100%;height:100%;position:relative;flex-shrink:0}
.hero-slide-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:transform 8s ease}
.hero-slide.active .hero-slide-bg{transform:scale(1.05)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(6,6,8,0.95) 0%,rgba(6,6,8,0.7) 40%,rgba(6,6,8,0.1) 100%),linear-gradient(to top,rgba(6,6,8,1) 0%,transparent 40%)}
.hero-content{position:absolute;bottom:clamp(80px,12vh,160px);left:clamp(20px,6vw,100px);max-width:min(540px,85vw);z-index:2}
.hero-genres{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.hero-genre-tag{padding:4px 10px;background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.4);border-radius:20px;font-size:11px;font-weight:600;color:var(--purple3);letter-spacing:0.5px;text-transform:uppercase}
.hero-title{font-size:clamp(26px,5vw,60px);font-weight:900;line-height:1.05;letter-spacing:-1px;margin-bottom:12px;opacity:0;transform:translateY(20px);transition:all 0.6s ease 0.2s}
.hero-slide.active .hero-title{opacity:1;transform:translateY(0)}
.hero-meta{display:flex;align-items:center;gap:12px;margin-bottom:14px;opacity:0;transform:translateY(15px);transition:all 0.6s ease 0.35s}
.hero-slide.active .hero-meta{opacity:1;transform:translateY(0)}
.hero-score{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:#fbbf24}
.hero-score svg{width:14px;height:14px}
.hero-dot{width:3px;height:3px;background:var(--text3);border-radius:50%}
.hero-desc{font-size:clamp(13px,1.5vw,15px);color:var(--text2);line-height:1.6;margin-bottom:20px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;opacity:0;transform:translateY(10px);transition:all 0.6s ease 0.5s}
.hero-slide.active .hero-desc{opacity:1;transform:translateY(0)}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;opacity:0;transform:translateY(10px);transition:all 0.6s ease 0.65s}
.hero-slide.active .hero-btns{opacity:1;transform:translateY(0)}
.btn-primary{display:flex;align-items:center;gap:8px;padding:12px 24px;background:var(--purple);border-radius:var(--radius);font-weight:700;font-size:14px;color:#fff;transition:all var(--transition);box-shadow:0 0 30px rgba(139,92,246,0.4)}
.btn-primary:hover{background:var(--purple2);transform:translateY(-2px);box-shadow:0 0 40px rgba(139,92,246,0.6)}
.btn-primary svg{width:18px;height:18px}
.btn-secondary{display:flex;align-items:center;gap:8px;padding:12px 24px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius);font-weight:600;font-size:14px;backdrop-filter:blur(8px);transition:all var(--transition)}
.btn-secondary:hover{background:rgba(255,255,255,0.18);transform:translateY(-2px)}
.btn-secondary svg{width:18px;height:18px}
/* Slider controls */
.hero-arrows{position:absolute;bottom:clamp(80px,12vh,160px);right:clamp(20px,5vw,80px);display:flex;gap:8px;z-index:3}
.hero-arrow{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all var(--transition)}
.hero-arrow:hover{background:var(--purple);border-color:var(--purple)}
.hero-arrow svg{width:18px;height:18px}
.hero-dots{position:absolute;bottom:clamp(32px,5vh,56px);left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:3}
.hero-dot-btn{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,0.3);transition:all var(--transition);cursor:pointer}
.hero-dot-btn.active{width:24px;background:var(--purple)}
.hero-progress{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--pink));z-index:3;transition:width 0.1s linear}

/* ── SECTIONS ── */
.section{padding:clamp(32px,5vh,56px) clamp(16px,4vw,40px)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-size:clamp(16px,2vw,20px);font-weight:800;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:3px;height:18px;background:linear-gradient(to bottom,var(--purple),var(--pink));border-radius:2px}
.section-more{font-size:13px;color:var(--purple3);font-weight:600;display:flex;align-items:center;gap:4px;transition:gap var(--transition)}
.section-more:hover{gap:8px}
.section-more svg{width:14px;height:14px}

/* ── CARD SLIDER ── */
.card-slider-wrap{position:relative}
.card-slider{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;cursor:grab}
.card-slider:active{cursor:grabbing}
.card-slider::-webkit-scrollbar{display:none}
.slider-arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(13,13,18,0.9);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;transition:all var(--transition);backdrop-filter:blur(8px)}
.card-slider-wrap:hover .slider-arrow{opacity:1}
.slider-arrow:hover{background:var(--purple);border-color:var(--purple)}
.slider-arrow.prev{left:-18px}
.slider-arrow.next{right:-18px}
.slider-arrow svg{width:16px;height:16px}

/* ── ANIME CARD ── */
.anime-card{flex-shrink:0;width:clamp(130px,16vw,180px);border-radius:var(--radius);overflow:hidden;position:relative;scroll-snap-align:start;transition:transform var(--transition);cursor:pointer}
.anime-card:hover{transform:translateY(-6px)}
.anime-card:hover .card-overlay{opacity:1}
.card-img{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--bg3)}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform var(--transition)}
.anime-card:hover .card-img img{transform:scale(1.07)}
.card-badges{position:absolute;top:6px;left:6px;display:flex;flex-direction:column;gap:4px}
.badge{padding:3px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.badge-score{background:rgba(251,191,36,0.9);color:#000}
.badge-ep{background:rgba(139,92,246,0.9);color:#fff}
.badge-hd{background:rgba(6,182,212,0.9);color:#fff}
.badge-format{background:rgba(0,0,0,0.7);color:var(--text2);border:1px solid var(--border)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,8,0.95) 0%,rgba(6,6,8,0.3) 60%,transparent 100%);opacity:0;transition:opacity var(--transition);display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.card-overlay-title{font-size:12px;font-weight:600;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-play{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;background:var(--purple);border-radius:var(--radius2);font-size:12px;font-weight:700;transition:background var(--transition)}
.card-play:hover{background:var(--purple2)}
.card-play svg{width:12px;height:12px}
.card-title{padding:8px 4px 4px;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--surface2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:skeleton-anim 1.5s infinite}
@keyframes skeleton-anim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{flex-shrink:0;width:clamp(130px,16vw,180px);border-radius:var(--radius);overflow:hidden}
.skel-img{aspect-ratio:2/3}
.skel-title{height:14px;margin:8px 4px 4px;border-radius:4px}

/* ── FOOTER ── */
footer{background:var(--bg2);border-top:1px solid var(--border);padding:clamp(32px,5vh,56px) clamp(16px,4vw,40px) clamp(16px,3vh,32px)}
.footer-inner{max-width:1200px;margin:0 auto;text-align:center}
.footer-logo{font-size:24px;font-weight:900;margin-bottom:12px}
.footer-logo span{background:linear-gradient(135deg,var(--purple3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.footer-disclaimer{font-size:12px;color:var(--text3);max-width:600px;margin:0 auto 20px;line-height:1.6}
.footer-socials{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.footer-social{width:36px;height:36px;border-radius:var(--radius2);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all var(--transition)}
.footer-social:hover{background:var(--purple);color:#fff}
.footer-social svg{width:16px;height:16px}
.footer-copy{font-size:12px;color:var(--text3)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .header-nav{display:none}
  .hero-arrows{display:none}
  .slider-arrow{display:none}
  .hero-content{left:20px;right:20px;max-width:100%}
}
@media(min-width:769px){
  .hamburger{display:none}
}
</style>
</head>

      <a href="#" class="footer-social"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.04.034.05a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg></a>
    </div>
    <p class="footer-copy">© 2025 AnimeVault. For entertainment purposes only.</p>
  </div>
</footer>

<script>
const ANILIST_API = 'https://api.anilist.co/v2';
const CACHE = {};
const CACHE_TTL = 10 * 60 * 1000;

async function gql(query, vars = {}, retries = 2) {
  const key = JSON.stringify({query, vars});
  const cached = CACHE[key];
  if (cached && Date.now() - cached.t < CACHE_TTL) return cached.d;
  for (let i = 0; i <= retries; i++) {
    try {
      const r = await fetch(ANILIST_API, {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
        body: JSON.stringify({query, variables: vars}),
        signal: AbortSignal.timeout(12000)
      });
      if (r.status === 429) { await sleep(2000 * (i + 1)); continue; }
      const j = await r.json();
      if (j.errors) throw new Error(j.errors[0].message);
      CACHE[key] = {d: j.data, t: Date.now()};
      return j.data;
    } catch(e) {
      if (i === retries) throw e;
      await sleep(1000 * (i + 1));
    }
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function truncate(str, len) {
  if (!str) return '';
  const clean = str.replace(/<[^>]+>/g, '');
  return clean.length > len ? clean.slice(0, len) + '...' : clean;
}

function formatScore(s) { return s ? (s / 10).toFixed(1) : '?'; }

function animeCardHTML(a) {
  const score = formatScore(a.averageScore);
  const eps = a.episodes || (a.nextAiringEpisode?.episode - 1) || '';
  const fmt = a.format || '';
  return `
  <div class="anime-card" onclick="location.href='anime.html?id=${a.id}'">
    <div class="card-img">
      <img src="${a.coverImage?.large || ''}" alt="${a.title?.romaji || ''}" loading="lazy">
      <div class="card-badges">
        ${a.averageScore ? `<span class="badge badge-score">★ ${score}</span>` : ''}
        ${eps ? `<span class="badge badge-ep">EP ${eps}</span>` : ''}
        <span class="badge badge-hd">HD</span>
        ${fmt ? `<span class="badge badge-format">${fmt}</span>` : ''}
      </div>
      <div class="card-overlay">
        <div class="card-overlay-title">${a.title?.romaji || ''}</div>
        <div class="card-play">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Watch Now
        </div>
      </div>
    </div>
    <div class="card-title">${a.title?.romaji || a.title?.english || ''}</div>
  </div>`;
}

function skeletonCards(n) {
  return Array.from({length: n}, () => `
  <div class="skel-card skeleton">
    <div class="skel-img skeleton"></div>
    <div class="skel-title skeleton"></div>
  </div>`).join('');
}

// ── HERO SLIDER ──
let heroSlides = [], heroIdx = 0, heroTimer = null, heroDragging = false, heroStart = 0, heroProg = 0, heroProgTimer = null;

async function initHero() {
  const data = await gql(`query{Page(perPage:15){media(type:ANIME,sort:TRENDING_DESC,isAdult:false,status_in:[RELEASING,FINISHED]){id title{romaji english}description bannerImage coverImage{extraLarge large}averageScore genres episodes format nextAiringEpisode{episode}}}}`)
    .catch(() => null);
  const list = (data?.Page?.media || []).filter(a => a.bannerImage);
  if (!list.length) { document.getElementById('hero').style.display = 'none'; return; }
  heroSlides = list.slice(0, 12);
  renderHeroSlides();
}

function renderHeroSlides() {
  const container = document.getElementById('hero-slides');
  const dots = document.getElementById('hero-dots');
  container.innerHTML = heroSlides.map((a, i) => {
    const score = formatScore(a.averageScore);
    const genres = (a.genres || []).slice(0, 3);
    const desc = truncate(a.description, 180);
    return `
    <div class="hero-slide${i===0?' active':''}" data-idx="${i}">
      <div class="hero-slide-bg" style="background-image:url('${a.bannerImage}')"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-genres">${genres.map(g=>`<span class="hero-genre-tag">${g}</span>`).join('')}</div>
        <h1 class="hero-title">${a.title?.romaji || a.title?.english || ''}</h1>
        <div class="hero-meta">
          <span class="hero-score"><svg viewBox="0 0 24 24" fill="#fbbf24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${score}</span>
          ${a.format ? `<span class="hero-dot"></span><span style="font-size:13px;color:var(--text2)">${a.format}</span>` : ''}
          ${a.episodes ? `<span class="hero-dot"></span><span style="font-size:13px;color:var(--text2)">${a.episodes} eps</span>` : ''}
        </div>
        ${desc ? `<p class="hero-desc">${desc}</p>` : ''}
        <div class="hero-btns">
          <a href="watch.html?id=${a.id}&ep=1" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Watch Now
          </a>
          <a href="anime.html?id=${a.id}" class="btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Details
          </a>
        </div>
      </div>
    </div>`;
  }).join('');
  dots.innerHTML = heroSlides.map((_,i)=>`<div class="hero-dot-btn${i===0?' active':''}" data-idx="${i}"></div>`).join('');
  dots.querySelectorAll('.hero-dot-btn').forEach(d => d.addEventListener('click', () => heroGo(+d.dataset.idx)));
  document.getElementById('hero-prev').onclick = () => heroGo((heroIdx - 1 + heroSlides.length) % heroSlides.length);
  document.getElementById('hero-next').onclick = () => heroGo((heroIdx + 1) % heroSlides.length);
  setupHeroDrag();
  heroAutoPlay();
}

function heroGo(idx) {
  const slides = document.querySelectorAll('.hero-slide');
  const dots = document.querySelectorAll('.hero-dot-btn');
  slides[heroIdx]?.classList.remove('active');
  dots[heroIdx]?.classList.remove('active');
  heroIdx = idx;
  slides[heroIdx]?.classList.add('active');
  dots[heroIdx]?.classList.add('active');
  heroResetProgress();
}

function heroAutoPlay() {
  clearInterval(heroTimer);
  heroTimer = setInterval(() => heroGo((heroIdx + 1) % heroSlides.length), 6000);
}

function heroResetProgress() {
  const bar = document.getElementById('hero-progress');
  bar.style.transition = 'none';
  bar.style.width = '0';
  clearInterval(heroProgTimer);
  requestAnimationFrame(() => {
    bar.style.transition = 'width 6s linear';
    bar.style.width = '100%';
  });
  heroAutoPlay();
}

function setupHeroDrag() {
  const hero = document.getElementById('hero');
  let sx = 0;
  hero.addEventListener('mousedown', e => { sx = e.clientX; heroDragging = false; });
  hero.addEventListener('mousemove', e => { if (Math.abs(e.clientX - sx) > 5) heroDragging = true; });
  hero.addEventListener('mouseup', e => {
    const dx = e.clientX - sx;
    if (Math.abs(dx) > 60) heroGo(dx < 0 ? (heroIdx+1)%heroSlides.length : (heroIdx-1+heroSlides.length)%heroSlides.length);
  });
  hero.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, {passive: true});
  hero.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 60) heroGo(dx < 0 ? (heroIdx+1)%heroSlides.length : (heroIdx-1+heroSlides.length)%heroSlides.length);
  }, {passive: true});
}

// ── CARD SLIDERS ──
function createSection(title, linkHref, id) {
  return `
  <section class="section">
    <div class="section-head">
      <h2 class="section-title">${title}</h2>
      <a href="${linkHref}" class="section-more">View All <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></a>
    </div>
    <div class="card-slider-wrap">
      <button class="slider-arrow prev" data-slider="${id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="card-slider" id="slider-${id}">${skeletonCards(8)}</div>
      <button class="slider-arrow next" data-slider="${id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
  </section>`;
}

function initSliderDrag(el) {
  let isDown = false, startX, scrollLeft;
  el.addEventListener('mousedown', e => { isDown = true; el.classList.add('dragging'); startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; });
  document.addEventListener('mouseup', () => { isDown = false; el.classList.remove('dragging'); });
  el.addEventListener('mousemove', e => { if (!isDown) return; e.preventDefault(); const x = e.pageX - el.offsetLeft; el.scrollLeft = scrollLeft - (x - startX); });
  el.addEventListener('wheel', e => { e.preventDefault(); el.scrollLeft += e.deltaY * 2; }, {passive: false});
}

function setupSliderArrows(id) {
  document.querySelectorAll(`.slider-arrow[data-slider="${id}"]`).forEach(btn => {
    btn.addEventListener('click', () => {
      const slider = document.getElementById(`slider-${id}`);
      const amt = slider.clientWidth * 0.7;
      slider.scrollBy({left: btn.classList.contains('prev') ? -amt : amt, behavior: 'smooth'});
    });
  });
}

async function fillSlider(id, query, vars = {}) {
  const data = await gql(query, vars).catch(() => null);
  const list = data?.Page?.media || [];
  const el = document.getElementById(`slider-${id}`);
  if (!el) return;
  el.innerHTML = list.length ? list.map(animeCardHTML).join('') : '<p style="color:var(--text3);padding:20px">No results</p>';
  if (list.length) { initSliderDrag(el); setupSliderArrows(id); }
}

// FIX: sort values must be arrays for AniList's [MediaSort] type
const SECTIONS = [
  {title: 'Trending Now', id: 'trending', link: 'search.html?sort=TRENDING_DESC', vars: {sort:['TRENDING_DESC'], status: 'RELEASING'}},
  {title: 'Top Airing', id: 'airing', link: 'search.html?status=RELEASING&sort=POPULARITY_DESC', vars: {sort:['POPULARITY_DESC'], status:'RELEASING'}},
  {title: 'Recently Updated', id: 'recent', link: 'search.html?sort=START_DATE_DESC&status=RELEASING', vars: {sort:['START_DATE_DESC'], status:'RELEASING'}},
  {title: 'Top Rated', id: 'top', link: 'search.html?sort=SCORE_DESC', vars: {sort:['SCORE_DESC']}},
  {title: 'Latest Movies', id: 'movies', link: 'search.html?format=MOVIE&sort=START_DATE_DESC', vars: {sort:['START_DATE_DESC'], format:'MOVIE'}},
  {title: 'Completed', id: 'completed', link: 'search.html?status=FINISHED&sort=POPULARITY_DESC', vars: {sort:['POPULARITY_DESC'], status:'FINISHED'}},
  {title: 'Upcoming', id: 'upcoming', link: 'search.html?status=NOT_YET_RELEASED&sort=POPULARITY_DESC', vars: {sort:['POPULARITY_DESC'], status:'NOT_YET_RELEASED'}},
];

const MEDIA_LIST_QUERY = `query($sort:[MediaSort],$status:MediaStatus,$format:MediaFormat,$perPage:Int){Page(perPage:$perPage){media(type:ANIME,sort:$sort,status:$status,format:$format,isAdult:false){id title{romaji english}coverImage{large}averageScore episodes format nextAiringEpisode{episode}}}}`;

// Load sections sequentially with a small stagger to avoid rate-limiting
async function initSections() {
  const container = document.getElementById('sections-container');
  container.innerHTML = SECTIONS.map(s => createSection(s.title, s.link, s.id)).join('');
  for (const s of SECTIONS) {
    const vars = {...s.vars, perPage: 20};
    fillSlider(s.id, MEDIA_LIST_QUERY, vars);
    await sleep(150); // 150ms stagger between API calls
  }
}

// ── SEARCH ──
let searchDebounce = null;
function openSearch() { document.getElementById('search-overlay').classList.add('open'); document.getElementById('search-input').focus(); }
function closeSearch() { document.getElementById('search-overlay').classList.remove('open'); }
document.getElementById('search-btn').onclick = openSearch;
document.getElementById('search-close').onclick = closeSearch;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

async function populateGenres() {
  const data = await gql(`query{GenreCollection}`).catch(() => null);
  const sel = document.getElementById('sf-genre');
  (data?.GenreCollection || []).forEach(g => {
    const o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o);
  });
}
populateGenres();

const now = new Date();
const yrSel = document.getElementById('sf-year');
for (let y = now.getFullYear() + 1; y >= 1990; y--) {
  const o = document.createElement('option'); o.value = y; o.textContent = y; yrSel.appendChild(o);
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  const genre = document.getElementById('sf-genre').value;
  const format = document.getElementById('sf-format').value;
  const status = document.getElementById('sf-status').value;
  const year = document.getElementById('sf-year').value;
  const sort = document.getElementById('sf-sort').value;
  const hint = document.getElementById('search-hint');
  const results = document.getElementById('search-results');

  if (!q && !genre && !format && !status && !year) {
    results.innerHTML = '';
    hint.style.display = '';
    return;
  }
  hint.style.display = 'none';
  results.innerHTML = skeletonCards(12);
  // FIX: sort as array
  const vars = {sort: [sort], perPage: 24, isAdult: false};
  if (q) vars.search = q;
  if (genre) vars.genre = genre;
  if (format) vars.format = format;
  if (status) vars.status = status;
  if (year) vars.seasonYear = +year;
  const SEARCH_Q = `query($search:String,$sort:[MediaSort],$genre:String,$format:MediaFormat,$status:MediaStatus,$seasonYear:Int,$perPage:Int,$isAdult:Boolean){Page(perPage:$perPage){media(type:ANIME,search:$search,sort:$sort,genre:$genre,format:$format,status:$status,seasonYear:$seasonYear,isAdult:$isAdult){id title{romaji english}coverImage{large}averageScore episodes format nextAiringEpisode{episode}}}}`;
  const data = await gql(SEARCH_Q, vars).catch(() => null);
  const list = data?.Page?.media || [];
  results.innerHTML = list.length ? list.map(animeCardHTML).join('') : '<p class="search-hint">No results found.</p>';
}

document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(doSearch, 400);
});
['sf-genre','sf-format','sf-status','sf-year','sf-sort'].forEach(id => document.getElementById(id).addEventListener('change', doSearch));

// ── HEADER SCROLL ──
window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
}, {passive: true});

// ── SIDEBAR ──
document.getElementById('hamburger-btn').onclick = () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
};
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
document.getElementById('sidebar-close').onclick = closeSidebar;
document.getElementById('sidebar-overlay').onclick = closeSidebar;

// ── INIT ──
initHero();
initSections();
heroResetProgress();
</script>
</body>
</html>
