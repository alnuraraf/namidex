<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="AniZone - Premium Anime Streaming Platform. Watch the latest anime in HD quality.">
  <title>AniZone - Premium Anime Streaming</title>
  <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="header-center">
      <a href="index.html" class="logo">
        <span class="logo-icon">A</span>
        AniZone
      </a>
    </div>
    <div class="header-right">
      <button class="header-btn search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
      <button class="header-btn profile-btn" aria-label="Profile">
        <div class="profile-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
      </button>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div class="nav-overlay"></div>
  <nav class="nav-menu">
    <a href="index.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      Home
    </a>
    <a href="index.html#trending">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
      Trending
    </a>
    <a href="schedule.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
      Schedule
    </a>
    <a href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      Profile
    </a>
  </nav>

  <!-- Search Overlay -->
  <div class="search-overlay">
    <div class="search-header">
      <div class="search-input-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="search-input" placeholder="Search anime..." autocomplete="off">
      </div>
      <button class="search-close" aria-label="Close search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="search-body"></div>
  </div>

  <!-- Auth Modal -->
  <div class="auth-overlay">
    <div class="auth-modal">
      <button class="auth-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account</p>
      <form class="auth-form">
        <div class="auth-input-group">
          <input type="text" name="username" class="auth-input" placeholder="Username" autocomplete="username" required>
        </div>
        <div class="auth-input-group">
          <input type="password" name="password" class="auth-input" placeholder="Password" autocomplete="current-password" required>
        </div>
        <div class="auth-input-group confirm-password-group" style="display:none;">
          <input type="password" name="confirmPassword" class="auth-input" placeholder="Confirm Password" autocomplete="new-password">
        </div>
        <p class="auth-error"></p>
        <button type="submit" class="auth-btn">Sign In</button>
      </form>
      <p class="auth-switch">Don't have an account? <a>Sign up</a></p>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Hero Section -->
    <section class="hero-section">
      <div class="hero-slider" id="hero-slider"></div>
      <button class="hero-nav prev" aria-label="Previous slide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <button class="hero-nav next" aria-label="Next slide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
      <div class="hero-dots"></div>
    </section>

    <!-- Widgets -->
    <section class="section" id="section-recently-updated"></section>
    <section class="section" id="section-trending"></section>
    <section class="section" id="section-top-airing"></section>
    <section class="section" id="section-top-rated"></section>
    <section class="section" id="section-latest-movies"></section>
    <section class="section" id="section-completed"></section>
    <section class="section" id="section-upcoming"></section>
  </main>

  <!-- Footer -->
  <footer class="footer"></footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/slider.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
  <script>
  (async function() {
    // Load hero slides
    try {
      const trending = await API.getTrending(12);
      const heroSlides = trending.slice(0, 10).map(anime => ({
        mal_id: anime.mal_id,
        title: anime.title_english || anime.title,
        image: anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url,
        score: anime.score,
        type: anime.type,
        episodes: anime.episodes,
        year: anime.year,
        synopsis: anime.synopsis
      }));

      if (heroSlides.length > 0) {
        new HeroSlider('#hero-slider', heroSlides);
      }
    } catch (err) {
      console.error('Hero slider failed:', err);
    }

    // Widget loaders with skeletons
    const widgets = [
      { id: 'section-recently-updated', title: 'Recently Updated', icon: 'clock', fn: API.getRecentlyUpdated },
      { id: 'section-trending', title: 'Trending Now', icon: 'trending', fn: API.getTrending },
      { id: 'section-top-airing', title: 'Top Airing', icon: 'tv', fn: API.getTopAiring },
      { id: 'section-top-rated', title: 'Top Rated', icon: 'award', fn: API.getTopRated },
      { id: 'section-latest-movies', title: 'Latest Movies', icon: 'film', fn: API.getLatestMovies },
      { id: 'section-completed', title: 'Completed', icon: 'check', fn: API.getCompleted },
      { id: 'section-upcoming', title: 'Upcoming', icon: 'schedule', fn: API.getUpcoming }
    ];

    // Show skeletons first
    widgets.forEach(w => {
      const container = document.getElementById(w.id);
      if (container) {
        container.innerHTML = `<div class="section-header"><h2 class="section-title">${ICONS[w.icon]} ${w.title}</h2></div><div class="slider-container"><div class="slider-track">${createSkeletonCards(8)}</div></div>`;
      }
    });

    // Load data
    const results = await Promise.allSettled(widgets.map(w => w.fn(16)));

    results.forEach((result, i) => {
      const w = widgets[i];
      if (result.status === 'fulfilled' && result.value.length > 0) {
        renderWidgetSection(w.id, w.title, w.icon, result.value);
      } else {
        const container = document.getElementById(w.id);
        if (container) container.style.display = 'none';
      }
    });
  })();
  </script>
</body>
</html>
