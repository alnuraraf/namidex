<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlnurAnime - Premium Anime Streaming</title>
  <meta name="description" content="Cinematic anime streaming platform powered by AniList GraphQL." />
  <meta property="og:title" content="AlnurAnime - Premium Anime Streaming" />
  <meta property="og:description" content="Watch trending, top rated, airing and upcoming anime." />
  <meta property="og:type" content="website" />
  <style>
    :root{
      --bg:#07070b;--bg2:#0d0d16;--glass:rgba(255,255,255,.08);--line:rgba(255,255,255,.12);
      --txt:#f5f5ff;--muted:#b8b8cc;--acc:#8a5cff;--acc2:#b886ff;--ok:#43d9a3;--warn:#ffcc66;
      --r:18px;--shadow:0 20px 60px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:radial-gradient(1200px 600px at 20% -10%,#241042 0,#0a0a11 50%,#07070b 100%);color:var(--txt);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow-x:hidden;max-width:100%}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1440px;margin:auto;padding:0 clamp(14px,2.5vw,28px)}
    .glass{background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .top{position:sticky;top:0;z-index:50}
    .topbar{height:68px;display:grid;grid-template-columns:80px 1fr 80px;align-items:center}
    .btn{border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--txt);border-radius:12px;padding:10px 12px;cursor:pointer}
    .logo{text-align:center;font-weight:800;letter-spacing:.5px}
    .logo span{color:var(--acc2)}
    .nav{display:flex;gap:18px;justify-content:center;padding:10px 0 16px;flex-wrap:wrap}
    .nav a{color:var(--muted)} .nav a:hover{color:#fff}
    .drawer,.searchOverlay{position:fixed;inset:0;z-index:80;display:none}
    .drawer.show,.searchOverlay.show{display:block}
    .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px)}
    .panel{position:absolute;left:0;top:0;height:100%;width:min(86vw,360px);padding:18px}
    .panel a{display:block;padding:14px;border-radius:12px;color:#fff}
    .panel a:hover{background:rgba(255,255,255,.08)}
    .hero{margin-top:14px;border-radius:24px;overflow:hidden;position:relative;min-height:clamp(380px,60vw,620px)}
    .heroTrack{display:flex;height:100%;transition:transform .55s ease}
    .slide{min-width:100%;position:relative;display:grid;align-items:end}
    .slide img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(1.1)}
    .ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,6,10,.88),rgba(6,6,10,.4) 45%,rgba(6,6,10,.72))}
    .content{position:relative;padding:clamp(16px,4vw,44px);max-width:min(720px,100%)}
    .title{font-size:clamp(1.4rem,3vw,3rem);font-weight:800;margin:0 0 10px}
    .meta{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 10px}
    .chip{font-size:.78rem;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid var(--line)}
    .desc{color:#ddd;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .cta{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
    .primary{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none}
    .dots{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:8px;z-index:3}
    .dot{width:9px;height:9px;border-radius:50%;border:none;background:rgba(255,255,255,.45);cursor:pointer}
    .dot.on{background:#fff}
    .heroArrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3}
    .heroArrow.l{left:10px}.heroArrow.r{right:10px}
    section{margin-top:28px}
    h2{font-size:clamp(1.1rem,2vw,1.5rem);margin:0 0 12px}
    .row{position:relative}
    .track{display:flex;gap:14px;overflow:auto;scrollbar-width:none;padding-bottom:4px}
    .track::-webkit-scrollbar{display:none}
    .card{min-width:clamp(138px,16vw,190px);border-radius:16px;overflow:hidden;position:relative;background:#111}
    .card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
    .grad{position:absolute;inset:auto 0 0 0;height:46%;background:linear-gradient(to top,rgba(0,0,0,.9),transparent)}
    .card .t{position:absolute;left:10px;right:10px;bottom:8px;font-size:.88rem;font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .badges{position:absolute;top:8px;left:8px;display:flex;gap:6px;flex-wrap:wrap}
    .b{font-size:.66rem;padding:4px 7px;border-radius:999px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.22)}
    .arrow{position:absolute;top:40%;transform:translateY(-50%);z-index:2}
    .arrow.l{left:-4px}.arrow.r{right:-4px}
    .sk{height:280px;border-radius:16px;background:linear-gradient(90deg,#1a1a26,#2a2a38,#1a1a26);background-size:200% 100%;animation:s 1.2s infinite}
    @keyframes s{to{background-position:-200% 0}}
    .footer{margin-top:46px;padding:26px;border-top:1px solid var(--line);color:var(--muted);font-size:.9rem}
    .searchOverlay .searchBox{position:relative;z-index:2;max-width:980px;margin:8vh auto 0;padding:18px}
    .searchInput{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--line);background:#0f0f18;color:#fff}
    .suggest{margin-top:12px;max-height:62vh;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
    .sItem{display:flex;gap:10px;padding:8px;border-radius:12px;background:rgba(255,255,255,.05)}
    .sItem img{width:52px;height:70px;object-fit:cover;border-radius:8px}
    @media (max-width:860px){.nav{display:none}.topbar{grid-template-columns:64px 1fr 64px}}
  </style>
</head>
<body>
  <header class="top glass">
    <div class="wrap topbar">
      <button class="btn" id="menuBtn">☰</button>
      <div class="logo">Alnur<span>Anime</span></div>
      <button class="btn" id="searchBtn">⌕</button>
    </div>
    <nav class="wrap nav">
      <a href="index.html">Home</a><a href="search.html">Trending</a><a href="schedule.html">Schedule</a><a href="donate.html">Donate</a>
    </nav>
  </header>

  <aside class="drawer" id="drawer"><div class="backdrop"></div><div class="panel glass">
    <a href="index.html">Home</a><a href="search.html">Trending</a><a href="schedule.html">Schedule</a><a href="donate.html">Donate</a>
  </div></aside>

  <div class="searchOverlay" id="searchOverlay"><div class="backdrop"></div><div class="searchBox glass">
    <input id="searchInput" class="searchInput" placeholder="Search anime..." />
    <div class="suggest" id="suggest"></div>
  </div></div>

  <main class="wrap">
    <section class="hero glass" id="hero">
      <div class="heroTrack" id="heroTrack"></div>
      <button class="btn heroArrow l" id="heroPrev">‹</button><button class="btn heroArrow r" id="heroNext">›</button>
      <div class="dots" id="heroDots"></div>
    </section>
    <div id="sections"></div>
  </main>

  <footer class="wrap footer">
    <div>© 2026 AlnurAnime. Credits: AniList GraphQL.</div>
    <div>This site does not store any files on its server. All contents are provided by non-affiliated third parties.</div>
  </footer>

<script>
(() => {
  const API='https://graphql.anilist.co', cacheTTL=1000*60*8, ctrls=new Set();
  const qs=(s,p=document)=>p.querySelector(s), qsa=(s,p=document)=>[...p.querySelectorAll(s)];
  const debounce=(fn,ms=280)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}};
  const safe=(v,d='-')=>(v??d);
  const strip=html=>(html||'').replace(/<[^>]+>/g,'').trim();
  addEventListener('beforeunload',()=>ctrls.forEach(c=>c.abort()),{once:true});

  async function gql(query,variables={},key=''){
    const k=key||query+JSON.stringify(variables), c=localStorage.getItem('aln:'+k);
    if(c){try{const j=JSON.parse(c);if(Date.now()-j.t<cacheTTL)return j.d}catch{}}
    let attempt=0,lastErr;
    while(attempt<3){
      const ctrl=new AbortController(); ctrls.add(ctrl);
      const t=setTimeout(()=>ctrl.abort(),9000);
      try{
        const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({query,variables}),signal:ctrl.signal});
        if(!r.ok) throw Error('HTTP '+r.status);
        const j=await r.json();
        if(j.errors) throw Error(j.errors[0]?.message||'GraphQL error');
        localStorage.setItem('aln:'+k,JSON.stringify({t:Date.now(),d:j.data}));
        clearTimeout(t); ctrls.delete(ctrl); return j.data;
      }catch(e){lastErr=e;await new Promise(r=>setTimeout(r,250*(attempt+1)));attempt++;clearTimeout(t);ctrls.delete(ctrl);}
    }
    throw lastErr;
  }

  const drawer=qs('#drawer'), searchOverlay=qs('#searchOverlay');
  qs('#menuBtn').onclick=()=>drawer.classList.add('show');
  qs('#searchBtn').onclick=()=>searchOverlay.classList.add('show');
  qsa('.backdrop').forEach(b=>b.onclick=()=>{drawer.classList.remove('show');searchOverlay.classList.remove('show')});
  addEventListener('keydown',e=>{if(e.key==='Escape'){drawer.classList.remove('show');searchOverlay.classList.remove('show')}});

  const sliderRegistry=new WeakMap();
  function initRowSlider(row){
    if(sliderRegistry.has(row)) return;
    const track=qs('.track',row), l=qs('.arrow.l',row), r=qs('.arrow.r',row);
    const step=()=>Math.max(220,track.clientWidth*.86);
    l.onclick=()=>track.scrollBy({left:-step(),behavior:'smooth'});
    r.onclick=()=>track.scrollBy({left: step(),behavior:'smooth'});
    track.addEventListener('wheel',e=>{if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){e.preventDefault();track.scrollLeft+=e.deltaY}},{passive:false});
    let d=false,sx=0,sl=0;
    track.addEventListener('pointerdown',e=>{d=true;sx=e.clientX;sl=track.scrollLeft;track.setPointerCapture(e.pointerId)});
    track.addEventListener('pointermove',e=>{if(!d)return;track.scrollLeft=sl-(e.clientX-sx)});
    addEventListener('pointerup',()=>d=false);
    const ro=new ResizeObserver(()=>{});ro.observe(track);
    sliderRegistry.set(row,{ro});
  }

  function card(m){
    const title=safe(m.title?.english||m.title?.romaji||m.title?.native,'Unknown');
    const ep=m.nextAiringEpisode?.episode?('EP '+m.nextAiringEpisode.episode):safe(m.episodes,'?')+' EP';
    return `<a class="card glass" href="anime.html?id=${m.id}">
      <img loading="lazy" src="${m.coverImage?.large||''}" alt="${title}">
      <div class="badges"><span class="b">${safe(m.averageScore,'--')}%</span><span class="b">${ep}</span><span class="b">HD</span><span class="b">${safe(m.format,'TV')}</span></div>
      <div class="grad"></div><div class="t">${title}</div>
    </a>`;
  }

  async function buildHero(){
    const q=`query($page:Int,$perPage:Int){Page(page:$page,perPage:$perPage){media(type:ANIME,sort:TRENDING_DESC){id title{english romaji native}bannerImage coverImage{extraLarge}averageScore genres description(asHtml:false)}}}`;
    let data; try{data=await gql(q,{page:1,perPage:12},'hero')}catch{return qs('#heroTrack').innerHTML='<div class="content">Failed to load hero.</div>'}
    const arr=(data.Page.media||[]).filter(x=>x.bannerImage).slice(0,10);
    const track=qs('#heroTrack'), dots=qs('#heroDots'); let i=0,lock=false,timer;
    track.innerHTML=arr.map(m=>`<article class="slide">
      <img loading="lazy" src="${m.bannerImage}" alt=""><div class="ov"></div>
      <div class="content"><h1 class="title">${safe(m.title.english||m.title.romaji||m.title.native)}</h1>
      <div class="meta">${(m.genres||[]).slice(0,4).map(g=>`<span class="chip">${g}</span>`).join('')}<span class="chip">${safe(m.averageScore,'--')}%</span></div>
      <p class="desc">${strip(m.description)}</p>
      <div class="cta"><a class="btn primary" href="watch.html?id=${m.id}&ep=1&lang=sub">Watch</a><a class="btn" href="anime.html?id=${m.id}">Details</a></div></div>
    </article>`).join('');
    dots.innerHTML=arr.map((_,x)=>`<button class="dot ${x===0?'on':''}" data-i="${x}"></button>`).join('');
    const go=n=>{if(lock)return;lock=true;i=(n+arr.length)%arr.length;track.style.transform=`translateX(-${i*100}%)`;qsa('.dot',dots).forEach((d,x)=>d.classList.toggle('on',x===i));setTimeout(()=>lock=false,450)};
    qs('#heroPrev').onclick=()=>go(i-1);qs('#heroNext').onclick=()=>go(i+1);dots.onclick=e=>{const b=e.target.closest('.dot');if(b)go(+b.dataset.i)};
    timer=setInterval(()=>go(i+1),5400); qs('#hero').addEventListener('mouseenter',()=>clearInterval(timer)); qs('#hero').addEventListener('mouseleave',()=>timer=setInterval(()=>go(i+1),5400));
  }

  async function buildSections(){
    const target=qs('#sections');
    const defs=[
      ['Recently Updated','UPDATED_AT_DESC',null],
      ['Trending Now','TRENDING_DESC',null],
      ['Top Airing','POPULARITY_DESC','RELEASING'],
      ['Top Rated','SCORE_DESC',null],
      ['Latest Movies','START_DATE_DESC',null,'MOVIE'],
      ['Completed','POPULARITY_DESC','FINISHED'],
      ['Upcoming','START_DATE', 'NOT_YET_RELEASED']
    ];
    target.innerHTML=defs.map(([t])=>`<section><h2>${t}</h2><div class="row"><button class="btn arrow l">‹</button><div class="track">${'<div class="sk"></div>'.repeat(8)}</div><button class="btn arrow r">›</button></div></section>`).join('');
    const jobs=defs.map(([_,sort,status,format])=>gql(
      `query($sort:[MediaSort],$status:MediaStatus,$format:MediaFormat){Page(page:1,perPage:14){media(type:ANIME,sort:$sort,status:$status,format:$format){id title{english romaji native}coverImage{large}averageScore episodes nextAiringEpisode{episode}format}}}`,
      {sort:[sort],status,format}
    ));
    const res=await Promise.allSettled(jobs);
    qsa('section',target).forEach((sec,idx)=>{
      const tr=qs('.track',sec); tr.innerHTML='';
      const ok=res[idx].status==='fulfilled' ? res[idx].value.Page.media : [];
      tr.innerHTML=ok.length?ok.map(card).join(''):'<div class="chip">No data available.</div>';
      initRowSlider(qs('.row',sec));
    });
  }

  const doSearch=debounce(async v=>{
    const box=qs('#suggest'); if(!v.trim()){box.innerHTML='';return}
    const q=`query($search:String){Page(page:1,perPage:18){media(type:ANIME,search:$search){id title{romaji english}coverImage{medium}format averageScore}}}`;
    try{
      const d=await gql(q,{search:v},'s:'+v.toLowerCase()); const arr=d.Page.media||[];
      box.innerHTML=arr.map(m=>`<a class="sItem" href="anime.html?id=${m.id}"><img loading="lazy" src="${m.coverImage?.medium||''}" alt="">
        <div><div><b>${safe(m.title.english||m.title.romaji)}</b></div><div style="color:#bbb;font-size:.85rem">${safe(m.format)} • ${safe(m.averageScore,'--')}%</div></div></a>`).join('');
    }catch{box.innerHTML='<div class="chip">Search unavailable.</div>'}
  },300);
  qs('#searchInput').addEventListener('input',e=>doSearch(e.target.value));

  (async()=>{await buildHero();await buildSections()})();
})();
</script>
</body>
</html>
