<style>
:root {
  --bg: #0a0a0f;
  --bg-elevated: #12121a;
  --bg-card: #16161f;
  --bg-glass: rgba(22,22,31,0.85);
  --primary: #a855f7;
  --primary-light: #c084fc;
  --primary-dark: #7c3aed;
  --accent: #d946ef;
  --text: #f1f1f4;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --border: rgba(168,85,247,0.15);
  --border-glow: rgba(168,85,247,0.3);
  --success: #22c55e;
  --warning: #f59e0b;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 40px rgba(168,85,247,0.15);
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  --header-h: 64px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100%; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px);
  transition: var(--transition);
}
.header.scrolled { background: rgba(10,10,15,0.98); box-shadow: 0 4px 30px rgba(0,0,0,0.5); }

.header-left { display: flex; align-items: center; gap: 16px; }
.hamburger {
  width: 40px; height: 40px; border: none; background: transparent;
  cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
  border-radius: var(--radius-sm); transition: var(--transition);
}
.hamburger span { display: block; width: 22px; height: 2.5px; background: var(--text); border-radius: 2px; transition: var(--transition); }
.hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
.hamburger:hover { background: rgba(168,85,247,0.1); }

.logo-banner { height: 36px; width: auto; object-fit: contain; transition: var(--transition); }
.logo-banner:hover { filter: drop-shadow(0 0 8px var(--primary-light)); }

.desktop-nav { display: none; gap: 28px; }
.desktop-nav a {
  color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500;
  position: relative; transition: var(--transition); letter-spacing: 0.02em;
}
.desktop-nav a::after {
  content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 1px; transition: var(--transition);
}
.desktop-nav a:hover, .desktop-nav a.active { color: var(--text); }
.desktop-nav a:hover::after, .desktop-nav a.active::after { width: 100%; }

.header-right { display: flex; align-items: center; gap: 12px; }
.search-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
  background: rgba(168,85,247,0.08); color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: var(--transition);
}
.search-btn:hover { background: rgba(168,85,247,0.2); border-color: var(--primary-light); box-shadow: 0 0 15px rgba(168,85,247,0.2); }
.search-btn svg { width: 18px; height: 18px; }

/* Mobile Sidebar */
.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: min(280px, 80vw);
  background: var(--bg-glass); backdrop-filter: blur(30px); border-right: 1px solid var(--border);
  z-index: 1001; transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; padding: 80px 24px 24px;
}
.sidebar.active { transform: translateX(0); }
.sidebar a {
  display: flex; align-items: center; gap: 14px; padding: 14px 16px; color: var(--text-secondary);
  text-decoration: none; font-size: 1rem; font-weight: 500; border-radius: var(--radius-sm);
  transition: var(--transition); margin-bottom: 4px;
}
.sidebar a:hover, .sidebar a.active { background: rgba(168,85,247,0.12); color: var(--text); }
.sidebar a svg { width: 20px; height: 20px; opacity: 0.7; }
.sidebar a:hover svg, .sidebar a.active svg { opacity: 1; color: var(--primary-light); }

/* Search Overlay */
.search-overlay {
  position: fixed; inset: 0; background: rgba(10,10,15,0.97); backdrop-filter: blur(20px);
  z-index: 1002; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  display: flex; flex-direction: column; padding: var(--header-h) clamp(16px, 4vw, 48px) 24px;
}
.search-overlay.active { opacity: 1; pointer-events: all; }
.search-input-wrap {
  display: flex; align-items: center; gap: 12px; padding: 16px 20px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 20px; transition: var(--transition);
}
.search-input-wrap:focus-within { border-color: var(--primary-light); box-shadow: var(--shadow-glow); }
.search-input-wrap svg { width: 22px; height: 22px; color: var(--text-muted); flex-shrink: 0; }
.search-input {
  flex: 1; background: transparent; border: none; color: var(--text); font-size: 1.1rem;
  outline: none; font-family: inherit;
}
.search-input::placeholder { color: var(--text-muted); }
.search-close {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0;
}
.search-close:hover { background: rgba(239,68,68,0.15); color: #ef4444; border-color: rgba(239,68,68,0.3); }
.search-filters {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
}
.search-filters select {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
  padding: 8px 14px; border-radius: var(--radius-sm); font-size: 0.85rem; cursor: pointer;
  outline: none; transition: var(--transition);
}
.search-filters select:focus { border-color: var(--primary-light); }
.search-results { flex: 1; overflow-y: auto; }
.search-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px; padding-bottom: 40px;
}
@media (min-width: 768px) { .search-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }
@media (min-width: 1200px) { .search-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }

/* Hero Slider */
.hero-section { margin-top: var(--header-h); position: relative; height: clamp(420px, 70vh, 720px); overflow: hidden; }
.hero-slider { position: relative; width: 100%; height: 100%; }
.hero-slide {
  position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease-in-out;
  display: flex; align-items: flex-end;
}
.hero-slide.active { opacity: 1; z-index: 2; }
.hero-slide-bg {
  position: absolute; inset: 0; background-size: cover; background-position: center top;
  transition: transform 8s ease-out;
}
.hero-slide.active .hero-slide-bg { transform: scale(1.05); }
.hero-slide::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, var(--bg) 0%, rgba(10,10,15,0.85) 35%, rgba(10,10,15,0.4) 70%, rgba(10,10,15,0.2) 100%);
}
.hero-content {
  position: relative; z-index: 3; padding: clamp(24px, 5vw, 60px); max-width: 800px;
  transform: translateY(20px); opacity: 0; transition: all 0.6s ease-out 0.2s;
}
.hero-slide.active .hero-content { transform: translateY(0); opacity: 1; }
.hero-genres { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.hero-genre {
  background: rgba(168,85,247,0.2); border: 1px solid var(--border-glow); color: var(--primary-light);
  padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
}
.hero-title {
  font-size: clamp(1.8rem, 5vw, 3.2rem); font-weight: 800; line-height: 1.1;
  margin-bottom: 12px; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  background: linear-gradient(135deg, #fff 0%, #e9d5ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-meta { display: flex; gap: 16px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.hero-score {
  display: flex; align-items: center; gap: 4px; color: var(--warning); font-weight: 700; font-size: 0.95rem;
}
.hero-score svg { width: 16px; height: 16px; }
.hero-format { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; }
.hero-status { color: var(--success); font-size: 0.85rem; font-weight: 600; }
.hero-desc {
  color: var(--text-secondary); font-size: clamp(0.9rem, 1.5vw, 1.05rem);
  line-height: 1.6; margin-bottom: 24px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white;
  border: none; border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 600;
  cursor: pointer; text-decoration: none; transition: var(--transition); box-shadow: 0 4px 20px rgba(168,85,247,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(168,85,247,0.4); }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
  background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 600; cursor: pointer;
  text-decoration: none; transition: var(--transition); backdrop-filter: blur(10px);
}
.btn-secondary:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }

.hero-nav {
  position: absolute; bottom: 24px; right: clamp(24px, 5vw, 60px); z-index: 4;
  display: flex; gap: 10px;
}
.hero-nav-btn {
  width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.3); color: white; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: var(--transition); backdrop-filter: blur(10px);
}
.hero-nav-btn:hover { background: rgba(168,85,247,0.3); border-color: var(--primary-light); }
.hero-nav-btn svg { width: 18px; height: 18px; }
.hero-dots {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 4;
  display: flex; gap: 8px;
}
.hero-dot {
  width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); border: none;
  cursor: pointer; transition: var(--transition); padding: 0;
}
.hero-dot.active { width: 24px; border-radius: 4px; background: var(--primary-light); }

/* Widgets */
.section { padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 48px); }
.section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.section-title {
  font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: 700; display: flex; align-items: center; gap: 10px;
}
.section-title::before {
  content: ''; width: 4px; height: 24px; background: linear-gradient(180deg, var(--primary), var(--accent));
  border-radius: 2px;
}
.section-nav { display: flex; gap: 8px; }
.section-nav-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: var(--transition);
}
.section-nav-btn:hover { background: var(--primary-dark); color: white; border-color: var(--primary); }
.section-nav-btn svg { width: 16px; height: 16px; }

/* Slider */
.slider-wrap { position: relative; overflow: hidden; }
.slider-track {
  display: flex; gap: 16px; overflow-x: auto; scroll-behavior: smooth;
  scrollbar-width: none; -ms-overflow-style: none; padding: 4px 4px 16px;
  scroll-snap-type: x mandatory;
}
.slider-track::-webkit-scrollbar { display: none; }

/* Card */
.anime-card {
  flex: 0 0 auto; width: clamp(140px, 18vw, 190px); scroll-snap-align: start;
  position: relative; border-radius: var(--radius-sm); overflow: hidden;
  background: var(--bg-card); cursor: pointer; transition: var(--transition);
  text-decoration: none; display: block;
}
.anime-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-glow); }
.anime-card:hover .card-img { transform: scale(1.08); }
.anime-card:hover .card-overlay { opacity: 1; }
.card-img-wrap { position: relative; aspect-ratio: 3/4.2; overflow: hidden; border-radius: var(--radius-sm); }
.card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
.card-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center; opacity: 0;
  transition: opacity 0.3s;
}
.card-play { width: 48px; height: 48px; border-radius: 50%; background: rgba(168,85,247,0.9); display: flex; align-items: center; justify-content: center; }
.card-play svg { width: 20px; height: 20px; color: white; }
.card-badges {
  position: absolute; top: 8px; left: 8px; right: 8px; display: flex; justify-content: space-between; pointer-events: none;
}
.card-badge {
  font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.03em;
}
.badge-score { background: rgba(0,0,0,0.7); color: var(--warning); backdrop-filter: blur(4px); }
.badge-ep { background: var(--primary-dark); color: white; }
.badge-hd { background: var(--success); color: white; }
.badge-format { background: rgba(0,0,0,0.6); color: var(--text-secondary); backdrop-filter: blur(4px); }
.card-info { padding: 10px 12px 12px; }
.card-title {
  font-size: 0.85rem; font-weight: 600; color: var(--text); line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta { margin-top: 6px; font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 8px; }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, #1f1f2e 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-card { width: clamp(140px, 18vw, 190px); flex: 0 0 auto; }
.skeleton-img { aspect-ratio: 3/4.2; border-radius: var(--radius-sm); }
.skeleton-text { height: 16px; margin-top: 10px; border-radius: 4px; }
.skeleton-text.short { width: 60%; }

/* Footer */
.footer {
  border-top: 1px solid var(--border); padding: 40px clamp(16px, 4vw, 48px);
  background: var(--bg-elevated); margin-top: 40px;
}
.footer-inner { max-width: 1200px; margin: 0 auto; text-align: center; }
.footer-logo { height: 32px; margin-bottom: 16px; opacity: 0.8; }
.footer-text { color: var(--text-muted); font-size: 0.85rem; line-height: 1.7; max-width: 600px; margin: 0 auto 20px; }
.footer-social { display: flex; justify-content: center; gap: 16px; margin-bottom: 20px; }
.footer-social a {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; color: var(--text-muted);
  transition: var(--transition); text-decoration: none;
}
.footer-social a:hover { border-color: var(--primary); color: var(--primary-light); background: rgba(168,85,247,0.1); }
.footer-copy { color: var(--text-muted); font-size: 0.8rem; }

/* Responsive */
@media (min-width: 768px) {
  .desktop-nav { display: flex; }
  .hamburger { display: none; }
  .search-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}
@media (min-width: 1200px) {
  .search-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>

<script>
(function() {
  'use strict';
  const API = 'https://graphql.anilist.co';
  const CACHE_TTL = 1000 * 60 * 15;
  const MAX_RETRIES = 3;
  const TIMEOUT = 8000;

  // Utilities
  const $ = (s, c=document) => c.querySelector(s);
  const $$ = (s, c=document) => Array.from(c.querySelectorAll(s));
  const wait = ms => new Promise(r => setTimeout(r, ms));

  function cacheGet(key) {
    try {
      const item = JSON.parse(localStorage.getItem('nt_'+key));
      if (item && Date.now() - item.t < CACHE_TTL) return item.d;
    } catch(e) {}
    return null;
  }
  function cacheSet(key, data) {
    try { localStorage.setItem('nt_'+key, JSON.stringify({t:Date.now(),d:data})); } catch(e) {}
  }

  async function gql(query, variables={}, retries=MAX_RETRIES) {
    const cacheKey = query.trim().slice(0,60)+JSON.stringify(variables);
    const cached = cacheGet(cacheKey);
    if (cached) return cached;
    for (let i=0; i<retries; i++) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT);
      try {
        const res = await fetch(API, {
          method: 'POST', headers: {'Content-Type':'application/json','Accept':'application/json'},
          body: JSON.stringify({query, variables}), signal: controller.signal
        });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const json = await res.json();
        if (json.errors) throw new Error(json.errors[0].message);
        cacheSet(cacheKey, json.data);
        return json.data;
      } catch(e) {
        clearTimeout(timer);
        if (i === retries-1) { console.error('GraphQL failed:', e.message); return null; }
        await wait(1000 * (i+1));
      }
    }
    return null;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || ''; return d.innerHTML;
  }

  function cardHTML(anime) {
    const a = anime || {};
    const img = a.coverImage?.large || a.coverImage?.medium || '';
    const title = a.title?.english || a.title?.romaji || a.title?.native || 'Unknown';
    const score = a.averageScore ? (a.averageScore/10).toFixed(1) : '';
    const ep = a.nextAiringEpisode?.episode || a.episodes || '';
    const fmt = a.format || '';
    const year = a.seasonYear || (a.startDate?.year) || '';
    const status = a.status || '';
    return `<a href="anime.html?id=${a.id}" class="anime-card" aria-label="${esc(title)}">
      <div class="card-img-wrap">
        <img src="${esc(img)}" alt="${esc(title)}" class="card-img" loading="lazy">
        <div class="card-overlay"><div class="card-play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div>
        <div class="card-badges">
          ${score ? `<span class="card-badge badge-score">★ ${score}</span>` : ''}
          ${ep ? `<span class="card-badge badge-ep">EP ${ep}</span>` : ''}
          <span class="card-badge badge-hd">HD</span>
        </div>
        <div class="card-badges" style="top:auto;bottom:8px;right:8px;left:auto;">
          ${fmt ? `<span class="card-badge badge-format">${esc(fmt.replace(/_/g,' '))}</span>` : ''}
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${esc(title)}</div>
        <div class="card-meta">${year ? esc(year) : ''}${status ? ' · '+esc(status.replace(/_/g,' ')) : ''}</div>
      </div>
    </a>`;
  }

  function skeletonCards(count=12) {
    return Array(count).fill(0).map(() => `<div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>`).join('');
  }

  // Header scroll
  const header = $('#header');
  let lastScroll = 0;
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    header.classList.toggle('scrolled', y > 20);
    lastScroll = y;
  }, {passive:true});

  // Sidebar
  const hamburger = $('#hamburger');
  const sidebar = $('#sidebar');
  const sidebarOverlay = $('#sidebarOverlay');
  function toggleSidebar() {
    const active = sidebar.classList.toggle('active');
    hamburger.classList.toggle('active', active);
    sidebarOverlay.classList.toggle('active', active);
    document.body.style.overflow = active ? 'hidden' : '';
  }
  hamburger.addEventListener('click', toggleSidebar);
  sidebarOverlay.addEventListener('click', toggleSidebar);

  // Search Overlay
  const searchBtn = $('#searchBtn');
  const searchOverlay = $('#searchOverlay');
  const searchClose = $('#searchClose');
  const searchInput = $('#searchInput');
  const searchGrid = $('#searchGrid');
  let searchDebounce;
  function openSearch() {
    searchOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    setTimeout(() => searchInput.focus(), 100);
  }
  function closeSearch() {
    searchOverlay.classList.remove('active');
    document.body.style.overflow = '';
    searchInput.value = '';
    searchGrid.innerHTML = '';
  }
  searchBtn.addEventListener('click', openSearch);
  searchClose.addEventListener('click', closeSearch);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

  // Populate year filter
  const sfYear = $('#sfYear');
  const curYear = new Date().getFullYear();
  for (let y=curYear+1; y>=1980; y--) {
    const o = document.createElement('option'); o.value=y; o.textContent=y; sfYear.appendChild(o);
  }

  // Populate genre filter
  async function loadGenres() {
    const data = await gql(`query{GenreCollection tags{name}}`);
    if (!data) return;
    const sel = $('#sfGenre');
    (data.GenreCollection||[]).forEach(g => {
      const o=document.createElement('option'); o.value=g; o.textContent=g; sel.appendChild(o);
    });
  }
  loadGenres();

  // Search
  async function doSearch() {
    const q = searchInput.value.trim();
    const genre = $('#sfGenre').value;
    const season = $('#sfSeason').value;
    const year = $('#sfYear').value;
    const format = $('#sfFormat').value;
    const status = $('#sfStatus').value;
    const sort = $('#sfSort').value;
    if (!q && !genre && !season && !year && !format && !status) { searchGrid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">Start typing or select filters to search</p>'; return; }

    searchGrid.innerHTML = skeletonCards(12);
    const vars = { search: q || undefined, page: 1, perPage: 24 };
    if (genre) vars.genre = genre;
    if (season) vars.season = season;
    if (year) vars.seasonYear = parseInt(year);
    if (format) vars.format = format;
    if (status) vars.status = status;
    if (sort) vars.sort = sort;

    const data = await gql(`
      query($search:String,$page:Int,$perPage:Int,$genre:String,$season:MediaSeason,$seasonYear:Int,$format:MediaFormat,$status:MediaStatus,$sort:[MediaSort]){
        Page(page:$page,perPage:$perPage){
          media(search:$search,type:ANIME,genre:$genre,season:$season,seasonYear:$seasonYear,format:$format,status:$status,sort:$sort){
            id title{english romaji native} coverImage{large medium} averageScore format episodes status seasonYear nextAiringEpisode{episode}
          }
        }
      }`, vars);
    if (!data || !data.Page || !data.Page.media || !data.Page.media.length) {
      searchGrid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">No results found</p>'; return;
    }
    searchGrid.innerHTML = data.Page.media.map(cardHTML).join('');
  }
  searchInput.addEventListener('input', () => { clearTimeout(searchDebounce); searchDebounce = setTimeout(doSearch, 400); });
  $$('.search-filters select').forEach(s => s.addEventListener('change', doSearch));

  // Hero Slider
  const heroSlider = $('#heroSlider');
  const heroDots = $('#heroDots');
  let heroSlides = [];
  let heroIndex = 0;
  let heroTimer;
  let heroDragging = false;
  let heroStartX = 0;

  async function loadHero() {
    const data = await gql(`
      query{Page(page:1,perPage:12){media(type:ANIME,sort:TRENDING_DESC,status_in:[RELEASING,FINISHED]){
        id title{english romaji} bannerImage coverImage{large} genres averageScore format status description seasonYear
        nextAiringEpisode{episode timeUntilAiring}
      }}}`);
    if (!data || !data.Page || !data.Page.media) return;
    heroSlides = data.Page.media.filter(m => m.bannerImage || m.coverImage?.large).slice(0, 10);
    if (!heroSlides.length) return;
    renderHero();
    startHero();
  }

  function renderHero() {
    heroSlider.innerHTML = heroSlides.map((s,i) => {
      const title = s.title?.english || s.title?.romaji || 'Unknown';
      const bg = s.bannerImage || s.coverImage?.large || '';
      const score = s.averageScore ? (s.averageScore/10).toFixed(1) : '';
      const genres = (s.genres||[]).slice(0,3);
      const desc = (s.description||'').replace(/<[^>]+>/g,'').slice(0,200);
      return `<div class="hero-slide ${i===0?'active':''}" data-index="${i}">
        <div class="hero-slide-bg" style="background-image:url('${esc(bg)}')"></div>
        <div class="hero-content">
          <div class="hero-genres">${genres.map(g=>`<span class="hero-genre">${esc(g)}</span>`).join('')}</div>
          <h1 class="hero-title">${esc(title)}</h1>
          <div class="hero-meta">
            ${score?`<span class="hero-score"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>${score}</span>`:''}
            <span class="hero-format">${esc((s.format||'').replace(/_/g,' '))}</span>
            <span class="hero-status">${esc((s.status||'').replace(/_/g,' '))}</span>
          </div>
          <p class="hero-desc">${esc(desc)}${desc.length>=200?'...':''}</p>
          <div class="hero-btns">
            <a href="watch.html?id=${s.id}&ep=1" class="btn-primary"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Watch Now</a>
            <a href="anime.html?id=${s.id}" class="btn-secondary">Details</a>
          </div>
        </div>
      </div>`;
    }).join('');
    heroDots.innerHTML = heroSlides.map((_,i) => `<button class="hero-dot ${i===0?'active':''}" data-index="${i}" aria-label="Slide ${i+1}"></button>`).join('');
    $$('.hero-dot').forEach(d => d.addEventListener('click', () => goHero(parseInt(d.dataset.index))));
  }

  function goHero(idx) {
    if (idx < 0) idx = heroSlides.length - 1;
    if (idx >= heroSlides.length) idx = 0;
    heroIndex = idx;
    $$('.hero-slide').forEach((s,i) => s.classList.toggle('active', i===idx));
    $$('.hero-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  }
  function nextHero() { goHero(heroIndex+1); }
  function prevHero() { goHero(heroIndex-1); }
  function startHero() { clearInterval(heroTimer); heroTimer = setInterval(nextHero, 6000); }
  $('#heroNext').addEventListener('click', () => { nextHero(); startHero(); });
  $('#heroPrev').addEventListener('click', () => { prevHero(); startHero(); });

  // Hero touch/drag
  heroSlider.addEventListener('touchstart', e => { heroDragging=true; heroStartX=e.touches[0].clientX; }, {passive:true});
  heroSlider.addEventListener('touchend', e => {
    if (!heroDragging) return; heroDragging=false;
    const diff = heroStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) { diff>0 ? nextHero() : prevHero(); startHero(); }
  }, {passive:true});
  heroSlider.addEventListener('mousedown', e => { heroDragging=true; heroStartX=e.clientX; });
  heroSlider.addEventListener('mouseup', e => {
    if (!heroDragging) return; heroDragging=false;
    const diff = heroStartX - e.clientX;
    if (Math.abs(diff) > 50) { diff>0 ? nextHero() : prevHero(); startHero(); }
  });

  // Widgets
  const widgetQueries = {
    recent: { sort: 'UPDATED_AT_DESC', status_in: ['RELEASING','FINISHED'] },
    trending: { sort: 'TRENDING_DESC', status_in: ['RELEASING','FINISHED'] },
    airing: { sort: 'POPULARITY_DESC', status: 'RELEASING' },
    rated: { sort: 'SCORE_DESC', status_in: ['RELEASING','FINISHED'] },
    movies: { sort: 'START_DATE_DESC', format: 'MOVIE' },
    completed: { sort: 'POPULARITY_DESC', status: 'FINISHED' },
    upcoming: { sort: 'POPULARITY_DESC', status: 'NOT_YET_RELEASED' }
  };

  async function loadWidget(key, filter) {
    const el = $('#slider-'+key);
    el.innerHTML = skeletonCards(12);
    const vars = { page: 1, perPage: 18, ...filter };
    const conds = Object.keys(filter).map(k => {
      if (k === 'sort') return `sort: $sort`;
      if (k === 'status_in') return `status_in: $status_in`;
      return `${k}: $${k}`;
    }).join(',');
    const query = `
      query($page:Int,$perPage:Int${filter.sort?', $sort:[MediaSort]':''}${filter.status?', $status:MediaStatus':''}${filter.status_in?', $status_in:[MediaStatus]':''}${filter.format?', $format:MediaFormat':''}){
        Page(page:$page,perPage:$perPage){
          media(type:ANIME,${conds}){
            id title{english romaji native} coverImage{large medium} averageScore format episodes status seasonYear nextAiringEpisode{episode}
          }
        }
      }`;
    const data = await gql(query, vars);
    if (!data || !data.Page || !data.Page.media) { el.innerHTML = '<p style="color:var(--text-muted);padding:20px;">Failed to load</p>'; return; }
    el.innerHTML = data.Page.media.map(cardHTML).join('');
  }

  // Slider engine
  function initSlider(key) {
    const track = $('#slider-'+key);
    if (!track) return;
    const btns = $$(`[data-slider="${key}"]`);
    const cardW = () => track.querySelector('.anime-card, .skeleton-card')?.offsetWidth + 16 || 200;
    btns.forEach(b => {
      b.addEventListener('click', () => {
        const dir = b.dataset.dir === 'next' ? 1 : -1;
        track.scrollBy({ left: dir * cardW() * 4, behavior: 'smooth' });
      });
    });
    // Drag scroll
    let down=false, startX, scrollLeft;
    track.addEventListener('mousedown', e => { down=true; track.style.cursor='grabbing'; startX=e.pageX-track.offsetLeft; scrollLeft=track.scrollLeft; });
    track.addEventListener('mouseleave', () => { down=false; track.style.cursor=''; });
    track.addEventListener('mouseup', () => { down=false; track.style.cursor=''; });
    track.addEventListener('mousemove', e => { if(!down)return; e.preventDefault(); track.scrollLeft=scrollLeft-(e.pageX-track.offsetLeft-startX)*1.5; });
    // Wheel horizontal
    track.addEventListener('wheel', e => { if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) { e.preventDefault(); track.scrollLeft += e.deltaY; } }, {passive:false});
  }

  // Load all
  async function init() {
    loadHero();
    const promises = Object.entries(widgetQueries).map(([k,f]) => loadWidget(k,f));
    await Promise.allSettled(promises);
    Object.keys(widgetQueries).forEach(initSlider);
  }

  // ResizeObserver for slider reinit
  let ro;
  if (window.ResizeObserver) {
    ro = new ResizeObserver(() => {
      Object.keys(widgetQueries).forEach(initSlider);
    });
    ro.observe(document.body);
  }
  window.addEventListener('orientationchange', () => setTimeout(() => Object.keys(widgetQueries).forEach(initSlider), 300));

  init();
})();
</script>
