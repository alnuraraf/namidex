<style>
:root {
  --bg: #0a0a0f; --bg-elevated: #12121a; --bg-card: #16161f; --bg-glass: rgba(22,22,31,0.85);
  --primary: #a855f7; --primary-light: #c084fc; --primary-dark: #7c3aed; --accent: #d946ef;
  --text: #f1f1f4; --text-secondary: #a1a1aa; --text-muted: #71717a;
  --border: rgba(168,85,247,0.15); --border-glow: rgba(168,85,247,0.3);
  --success: #22c55e; --warning: #f59e0b; --radius: 14px; --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4); --shadow-glow: 0 0 40px rgba(168,85,247,0.15);
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1); --header-h: 64px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100%; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 4px; }

.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(10,10,15,0.92); backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border); z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px); transition: var(--transition);
}
.header.scrolled { background: rgba(10,10,15,0.98); box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
.header-left { display: flex; align-items: center; gap: 16px; }
.hamburger {
  width: 40px; height: 40px; border: none; background: transparent; cursor: pointer;
  display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
  border-radius: var(--radius-sm); transition: var(--transition);
}
.hamburger span { display: block; width: 22px; height: 2.5px; background: var(--text); border-radius: 2px; transition: var(--transition); }
.hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
.logo-banner { height: 36px; width: auto; object-fit: contain; transition: var(--transition); }
.logo-banner:hover { filter: drop-shadow(0 0 8px var(--primary-light)); }
.desktop-nav { display: none; gap: 28px; }
.desktop-nav a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; position: relative; transition: var(--transition); }
.desktop-nav a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 1px; transition: var(--transition); }
.desktop-nav a:hover, .desktop-nav a.active { color: var(--text); }
.desktop-nav a:hover::after, .desktop-nav a.active::after { width: 100%; }
.header-right { display: flex; align-items: center; gap: 12px; }
.search-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
  background: rgba(168,85,247,0.08); color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: var(--transition);
}
.search-btn:hover { background: rgba(168,85,247,0.2); border-color: var(--primary-light); box-shadow: 0 0 15px rgba(168,85,247,0.2); }
.search-btn svg { width: 18px; height: 18px; }

.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: min(280px, 80vw);
  background: var(--bg-glass); backdrop-filter: blur(30px); border-right: 1px solid var(--border);
  z-index: 1001; transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; padding: 80px 24px 24px;
}
.sidebar.active { transform: translateX(0); }
.sidebar a { display: flex; align-items: center; gap: 14px; padding: 14px 16px; color: var(--text-secondary); text-decoration: none; font-size: 1rem; font-weight: 500; border-radius: var(--radius-sm); transition: var(--transition); margin-bottom: 4px; }
.sidebar a:hover, .sidebar a.active { background: rgba(168,85,247,0.12); color: var(--text); }
.sidebar a svg { width: 20px; height: 20px; opacity: 0.7; }
.sidebar a:hover svg, .sidebar a.active svg { opacity: 1; color: var(--primary-light); }

/* Banner */
.anime-banner {
  margin-top: var(--header-h); position: relative; height: clamp(280px, 45vh, 500px); overflow: hidden;
}
.anime-banner-img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top;
}
.anime-banner::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(10,10,15,0.3) 0%, var(--bg) 100%);
}

/* Info Section */
.anime-info-wrap {
  position: relative; z-index: 2; padding: 0 clamp(16px, 4vw, 48px); margin-top: -80px;
}
.anime-info {
  display: grid; grid-template-columns: auto 1fr; gap: clamp(20px, 3vw, 40px); align-items: start;
  max-width: 1200px; margin: 0 auto;
}
.anime-poster {
  width: clamp(140px, 22vw, 220px); border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow-glow); border: 1px solid var(--border); flex-shrink: 0;
}
.anime-poster img { width: 100%; height: auto; display: block; }
.anime-details { padding-top: 80px; }
.anime-title {
  font-size: clamp(1.6rem, 4vw, 2.6rem); font-weight: 800; line-height: 1.15; margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, #e9d5ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.anime-alt-title { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 14px; }
.anime-meta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; align-items: center; }
.anime-meta-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 20px;
  font-size: 0.8rem; font-weight: 600; background: var(--bg-card); border: 1px solid var(--border);
}
.anime-meta-badge.score { color: var(--warning); }
.anime-meta-badge.popular { color: var(--primary-light); }
.anime-meta-badge.status { color: var(--success); }
.anime-meta-badge.fav { color: var(--accent); }
.anime-genres { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.anime-genre {
  padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 500;
  background: rgba(168,85,247,0.12); border: 1px solid var(--border-glow); color: var(--primary-light);
  text-decoration: none; transition: var(--transition);
}
.anime-genre:hover { background: rgba(168,85,247,0.25); }
.anime-desc {
  color: var(--text-secondary); font-size: clamp(0.9rem, 1.5vw, 1.05rem); line-height: 1.7; margin-bottom: 24px;
  max-width: 700px;
}
.anime-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white;
  border: none; border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 600;
  cursor: pointer; text-decoration: none; transition: var(--transition); box-shadow: 0 4px 20px rgba(168,85,247,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(168,85,247,0.4); }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
  background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 600; cursor: pointer;
  text-decoration: none; transition: var(--transition); backdrop-filter: blur(10px);
}
.btn-secondary:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }

/* Tabs */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 12px 20px; background: transparent; border: none; color: var(--text-muted);
  font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap;
  position: relative; transition: var(--transition); font-family: inherit;
}
.tab-btn.active { color: var(--text); }
.tab-btn.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 1px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Info Grid */
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
.info-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px; transition: var(--transition);
}
.info-card:hover { border-color: var(--border-glow); }
.info-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.info-value { font-size: 0.95rem; color: var(--text); font-weight: 500; }

/* Characters */
.char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 14px; }
.char-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  overflow: hidden; text-align: center; transition: var(--transition); cursor: pointer;
}
.char-card:hover { transform: translateY(-4px); border-color: var(--border-glow); }
.char-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
.char-name { padding: 8px; font-size: 0.8rem; font-weight: 600; color: var(--text); }
.char-role { padding: 0 8px 10px; font-size: 0.75rem; color: var(--text-muted); }

/* Episodes */
.ep-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.ep-card {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  text-decoration: none; color: var(--text); transition: var(--transition); cursor: pointer;
}
.ep-card:hover { border-color: var(--primary); background: rgba(168,85,247,0.08); }
.ep-num {
  width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
}
.ep-info { flex: 1; min-width: 0; }
.ep-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ep-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

/* Relations / Recommendations */
.rel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.rel-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  overflow: hidden; text-decoration: none; color: var(--text); transition: var(--transition); display: block;
}
.rel-card:hover { border-color: var(--border-glow); transform: translateY(-4px); }
.rel-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
.rel-info { padding: 10px 12px; }
.rel-title { font-size: 0.85rem; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.rel-type { font-size: 0.75rem; color: var(--primary-light); margin-top: 4px; }

/* Trailer */
.trailer-wrap {
  position: relative; padding-bottom: 56.25%; border-radius: var(--radius); overflow: hidden;
  border: 1px solid var(--border); background: var(--bg-card);
}
.trailer-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

/* Staff */
.staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.staff-card {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: var(--transition);
}
.staff-card:hover { border-color: var(--border-glow); }
.staff-card img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.staff-name { font-size: 0.85rem; font-weight: 600; }
.staff-role { font-size: 0.75rem; color: var(--text-muted); }

/* Studios */
.studio-tag {
  display: inline-block; padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 500; margin: 4px; transition: var(--transition);
}
.studio-tag:hover { border-color: var(--primary-light); color: var(--primary-light); }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, #1f1f2e 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Section */
.section { padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 48px); max-width: 1200px; margin: 0 auto; }
.section-title { font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.section-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(180deg, var(--primary), var(--accent)); border-radius: 2px; }

/* Footer */
.footer { border-top: 1px solid var(--border); padding: 40px clamp(16px, 4vw, 48px); background: var(--bg-elevated); margin-top: 40px; }
.footer-inner { max-width: 1200px; margin: 0 auto; text-align: center; }
.footer-logo { height: 32px; margin-bottom: 16px; opacity: 0.8; }
.footer-text { color: var(--text-muted); font-size: 0.85rem; line-height: 1.7; max-width: 600px; margin: 0 auto 20px; }
.footer-social { display: flex; justify-content: center; gap: 16px; margin-bottom: 20px; }
.footer-social a { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: var(--transition); text-decoration: none; }
.footer-social a:hover { border-color: var(--primary); color: var(--primary-light); background: rgba(168,85,247,0.1); }
.footer-copy { color: var(--text-muted); font-size: 0.8rem; }

@media (min-width: 768px) { .desktop-nav { display: flex; } .hamburger { display: none; } }
@media (max-width: 640px) {
  .anime-info { grid-template-columns: 1fr; }
  .anime-poster { width: 160px; margin: 0 auto; }
  .anime-details { padding-top: 20px; text-align: center; }
  .anime-meta-row, .anime-genres, .anime-actions { justify-content: center; }
}
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>

<script>
(function() {
  'use strict';
  const API = 'https://graphql.anilist.co';
  const CACHE_TTL = 1000 * 60 * 15;
  const MAX_RETRIES = 3;
  const TIMEOUT = 8000;
  const $ = (s, c=document) => c.querySelector(s);
  const $$ = (s, c=document) => Array.from(c.querySelectorAll(s));
  const wait = ms => new Promise(r => setTimeout(r, ms));
  const params = new URLSearchParams(location.search);
  const animeId = parseInt(params.get('id')) || 1;

  function cacheGet(key) {
    try { const item = JSON.parse(localStorage.getItem('nt_'+key)); if (item && Date.now()-item.t < CACHE_TTL) return item.d; } catch(e){}
    return null;
  }
  function cacheSet(key, data) {
    try { localStorage.setItem('nt_'+key, JSON.stringify({t:Date.now(),d:data})); } catch(e){}
  }
  async function gql(query, variables={}, retries=MAX_RETRIES) {
    const cacheKey = query.trim().slice(0,60)+JSON.stringify(variables);
    const cached = cacheGet(cacheKey); if (cached) return cached;
    for (let i=0; i<retries; i++) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT);
      try {
        const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body: JSON.stringify({query,variables}), signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const json = await res.json();
        if (json.errors) throw new Error(json.errors[0].message);
        cacheSet(cacheKey, json.data); return json.data;
      } catch(e) { clearTimeout(timer); if (i===retries-1) { console.error('GraphQL failed:', e.message); return null; } await wait(1000*(i+1)); }
    }
    return null;
  }
  function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

  // Header scroll
  const header=$('#header');
  window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY>20), {passive:true});

  // Sidebar
  const hamburger=$('#hamburger'), sidebar=$('#sidebar'), sidebarOverlay=$('#sidebarOverlay');
  function toggleSidebar() { const active=sidebar.classList.toggle('active'); hamburger.classList.toggle('active',active); sidebarOverlay.classList.toggle('active',active); document.body.style.overflow=active?'hidden':''; }
  hamburger.addEventListener('click', toggleSidebar); sidebarOverlay.addEventListener('click', toggleSidebar);

  // Tabs
  $$('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.tab-btn').forEach(b => b.classList.remove('active'));
      $$('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      $('#tab-'+btn.dataset.tab).classList.add('active');
    });
  });

  async function loadAnime() {
    const data = await gql(`
      query($id:Int){
        Media(id:$id,type:ANIME){
          id title{english romaji native} bannerImage coverImage{large extraLarge}
          description genres tags{name} averageScore popularity favourites
          status season seasonYear format episodes duration startDate{year month day} endDate{year month day}
          studios{edges{isMain node{name id}}}
          staff{edges{role node{name{full} image{medium} id}}}
          characters{edges{role node{name{full} image{medium} id}}}
          relations{edges{relationType node{id type title{english romaji} coverImage{medium} format status}}}
          recommendations{nodes{rating mediaRecommendation{id title{english romaji} coverImage{medium} format status averageScore}}}
          trailer{id site} streamingEpisodes{title thumbnail url}
          nextAiringEpisode{episode timeUntilAiring}
          rankings{id rank type context year season}
          source hashtag
        }
      }`, {id: animeId});
    if (!data || !data.Media) { $('#animeDetails').innerHTML = '<p style="color:var(--text-muted);">Failed to load anime details.</p>'; return; }
    render(data.Media);
  }

  function render(m) {
    const title = m.title?.english || m.title?.romaji || m.title?.native || 'Unknown';
    const alt = m.title?.romaji && m.title?.romaji !== title ? m.title.romaji : (m.title?.native || '');
    const banner = m.bannerImage || m.coverImage?.extraLarge || m.coverImage?.large || '';
    const poster = m.coverImage?.large || m.coverImage?.medium || '';
    const score = m.averageScore ? (m.averageScore/10).toFixed(1) : null;
    const desc = (m.description||'').replace(/<[^>]+>/g,'');

    // Banner
    $('#animeBanner').innerHTML = `<img src="${esc(banner)}" alt="${esc(title)}" class="anime-banner-img" loading="eager">`;

    // Poster
    $('#animePoster').innerHTML = `<img src="${esc(poster)}" alt="${esc(title)}" loading="eager">`;

    // Details
    $('#animeDetails').innerHTML = `
      <h1 class="anime-title">${esc(title)}</h1>
      ${alt?`<p class="anime-alt-title">${esc(alt)}</p>`:''}
      <div class="anime-meta-row">
        ${score?`<span class="anime-meta-badge score"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> ${score}</span>`:''}
        ${m.popularity?`<span class="anime-meta-badge popular">♥ ${m.popularity.toLocaleString()}</span>`:''}
        ${m.favourites?`<span class="anime-meta-badge fav">★ ${m.favourites.toLocaleString()}</span>`:''}
        <span class="anime-meta-badge status">${esc((m.status||'').replace(/_/g,' '))}</span>
        ${m.format?`<span class="anime-meta-badge">${esc(m.format.replace(/_/g,' '))}</span>`:''}
        ${m.seasonYear?`<span class="anime-meta-badge">${esc(m.seasonYear)}</span>`:''}
        ${m.episodes?`<span class="anime-meta-badge">${m.episodes} EP</span>`:''}
        ${m.duration?`<span class="anime-meta-badge">${m.duration} min</span>`:''}
      </div>
      <div class="anime-genres">
        ${(m.genres||[]).map(g=>`<a href="search.html?genre=${encodeURIComponent(g)}" class="anime-genre">${esc(g)}</a>`).join('')}
      </div>
      <p class="anime-desc">${esc(desc)}</p>
      <div class="anime-actions">
        <a href="watch.html?id=${m.id}&ep=1" class="btn-primary"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Watch Now</a>
        <a href="watch.html?id=${m.id}&ep=1&lang=dub" class="btn-secondary">Watch Dub</a>
      </div>
    `;

    // Synopsis tab
    $('#synopsis').textContent = desc || 'No synopsis available.';

    // Info grid
    const infoItems = [
      {label:'Type', value: m.format?.replace(/_/g,' ') || 'Unknown'},
      {label:'Status', value: m.status?.replace(/_/g,' ') || 'Unknown'},
      {label:'Season', value: m.season && m.seasonYear ? `${m.season} ${m.seasonYear}` : 'Unknown'},
      {label:'Episodes', value: m.episodes ? `${m.episodes} (${m.duration||'?'} min each)` : 'Unknown'},
      {label:'Start Date', value: m.startDate?.year ? `${m.startDate.year}-${m.startDate.month||'?'}-${m.startDate.day||'?'}` : 'Unknown'},
      {label:'End Date', value: m.endDate?.year ? `${m.endDate.year}-${m.endDate.month||'?'}-${m.endDate.day||'?'}` : 'Unknown'},
      {label:'Source', value: m.source?.replace(/_/g,' ') || 'Unknown'},
      {label:'Average Score', value: score ? `${score} / 10` : 'N/A'},
      {label:'Popularity', value: m.popularity ? m.popularity.toLocaleString() : 'N/A'},
      {label:'Favorites', value: m.favourites ? m.favourites.toLocaleString() : 'N/A'},
    ];
    if (m.rankings && m.rankings.length) {
      const top = m.rankings.filter(r => r.type === 'RATED').slice(0,2);
      top.forEach(r => infoItems.push({label: r.context || 'Ranking', value: `#${r.rank}`}));
    }
    $('#infoGrid').innerHTML = infoItems.map(i=>`<div class="info-card"><div class="info-label">${esc(i.label)}</div><div class="info-value">${esc(i.value)}</div></div>`).join('');

    // Trailer
    if (m.trailer && m.trailer.site === 'youtube' && m.trailer.id) {
      $('#trailerSection').style.display = 'block';
      $('#trailerWrap').innerHTML = `<iframe src="https://www.youtube.com/embed/${esc(m.trailer.id)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
    }

    // Episodes
    const epCount = m.episodes || 12;
    const epList = $('#epList');
    epList.innerHTML = '';
    for (let i=1; i<=epCount; i++) {
      const ep = (m.streamingEpisodes||[])[i-1];
      const epTitle = ep?.title || `Episode ${i}`;
      const epThumb = ep?.thumbnail || poster;
      const epUrl = ep?.url || '';
      const card = document.createElement('a');
      card.className = 'ep-card';
      card.href = `watch.html?id=${m.id}&ep=${i}`;
      card.innerHTML = `<div class="ep-num">${i}</div><div class="ep-info"><div class="ep-title">${esc(epTitle)}</div>${epUrl?'<div class="ep-date">Click to watch</div>':''}</div>`;
      epList.appendChild(card);
    }

    // Characters
    const chars = (m.characters?.edges||[]).slice(0, 24);
    $('#charGrid').innerHTML = chars.length ? chars.map(c => {
      const name = c.node?.name?.full || 'Unknown';
      const img = c.node?.image?.medium || '';
      return `<div class="char-card"><img src="${esc(img)}" alt="${esc(name)}" loading="lazy"><div class="char-name">${esc(name)}</div><div class="char-role">${esc(c.role||'')}</div></div>`;
    }).join('') : '<p style="color:var(--text-muted);">No character data available.</p>';

    // Studios
    const studios = (m.studios?.edges||[]).filter(s => s.isMain).map(s => s.node?.name).filter(Boolean);
    $('#studioList').innerHTML = studios.length ? studios.map(s => `<span class="studio-tag">${esc(s)}</span>`).join('') : '<p style="color:var(--text-muted);">No studio data.</p>';

    // Staff
    const staff = (m.staff?.edges||[]).slice(0, 20);
    $('#staffGrid').innerHTML = staff.length ? staff.map(s => {
      const name = s.node?.name?.full || 'Unknown';
      const img = s.node?.image?.medium || '';
      return `<div class="staff-card"><img src="${esc(img)}" alt="${esc(name)}" loading="lazy"><div><div class="staff-name">${esc(name)}</div><div class="staff-role">${esc(s.role||'')}</div></div></div>`;
    }).join('') : '<p style="color:var(--text-muted);">No staff data.</p>';

    // Relations
    const rels = (m.relations?.edges||[]).filter(r => r.node?.type === 'ANIME').slice(0, 12);
    $('#relGrid').innerHTML = rels.length ? rels.map(r => {
      const node = r.node;
      const t = node.title?.english || node.title?.romaji || 'Unknown';
      const img = node.coverImage?.medium || '';
      return `<a href="anime.html?id=${node.id}" class="rel-card"><img src="${esc(img)}" alt="${esc(t)}" loading="lazy"><div class="rel-info"><div class="rel-title">${esc(t)}</div><div class="rel-type">${esc((r.relationType||'').replace(/_/g,' '))} · ${esc((node.format||'').replace(/_/g,' '))}</div></div></a>`;
    }).join('') : '<p style="color:var(--text-muted);">No relations.</p>';

    // Recommendations
    const recs = (m.recommendations?.nodes||[]).filter(r => r.mediaRecommendation).sort((a,b) => (b.rating||0)-(a.rating||0)).slice(0, 12);
    $('#recGrid').innerHTML = recs.length ? recs.map(r => {
      const node = r.mediaRecommendation;
      const t = node.title?.english || node.title?.romaji || 'Unknown';
      const img = node.coverImage?.medium || '';
      return `<a href="anime.html?id=${node.id}" class="rel-card"><img src="${esc(img)}" alt="${esc(t)}" loading="lazy"><div class="rel-info"><div class="rel-title">${esc(t)}</div><div class="rel-type">${node.averageScore ? 'Score: '+(node.averageScore/10).toFixed(1) : ''} · ${esc((node.status||'').replace(/_/g,' '))}</div></div></a>`;
    }).join('') : '<p style="color:var(--text-muted);">No recommendations.</p>';
  }

  loadAnime();
})();
</script>
</body>
