<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Details — AnimeVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060608;--bg2:#0d0d12;--bg3:#12121a;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--purple:#8b5cf6;--purple2:#7c3aed;--purple3:#a78bfa;--pink:#ec4899;--cyan:#06b6d4;--text:#f0f0f5;--text2:#a0a0b8;--text3:#606075;--radius:12px;--radius2:8px;--transition:0.3s cubic-bezier(0.4,0,0.2,1);--header-h:64px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--purple2);border-radius:3px}

#header{position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:1000;display:flex;align-items:center;padding:0 clamp(16px,4vw,40px);gap:16px;background:rgba(6,6,8,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.hamburger{width:40px;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:var(--radius2);transition:background var(--transition)}
.hamburger:hover{background:var(--surface)}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:1px}
.logo{font-size:clamp(18px,2.5vw,24px);font-weight:900}
.logo span{background:linear-gradient(135deg,var(--purple3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-nav{display:flex;align-items:center;gap:4px;margin:0 auto}
.header-nav a{padding:8px 16px;border-radius:var(--radius2);font-size:14px;font-weight:500;color:var(--text2);transition:all var(--transition)}
.header-nav a:hover{color:var(--text);background:var(--surface)}
.header-right{margin-left:auto;display:flex;gap:8px}
.icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius2);transition:all var(--transition);color:var(--text2)}
.icon-btn:hover{background:var(--surface);color:var(--text)}
.icon-btn svg{width:20px;height:20px}

#sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1100;opacity:0;pointer-events:none;transition:opacity var(--transition)}
#sidebar-overlay.open{opacity:1;pointer-events:all}
#sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--bg3);border-right:1px solid var(--border);z-index:1200;transform:translateX(-100%);transition:transform var(--transition);padding:24px 16px;overflow-y:auto}
#sidebar.open{transform:translateX(0)}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.sidebar-nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius);color:var(--text2);font-weight:500;transition:all var(--transition);margin-bottom:4px}
.sidebar-nav a:hover{background:var(--surface);color:var(--text)}
.sidebar-nav svg{width:18px;height:18px;flex-shrink:0}

/* ── BANNER ── */
.anime-banner{position:relative;height:clamp(300px,50vw,520px);overflow:hidden;margin-top:var(--header-h)}
.banner-img{width:100%;height:100%;object-fit:cover;object-position:center top}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,6,8,0.2) 0%,rgba(6,6,8,0.8) 60%,rgba(6,6,8,1) 100%)}

/* ── DETAILS LAYOUT ── */
.details-main{position:relative;margin-top:-120px;padding:0 clamp(16px,4vw,60px) 60px;max-width:1400px;margin-left:auto;margin-right:auto}
.details-grid{display:grid;grid-template-columns:220px 1fr;gap:clamp(24px,4vw,48px)}
@media(max-width:768px){.details-grid{grid-template-columns:1fr}.poster-col{display:flex;align-items:flex-start;gap:16px}}

.poster-col{}
.poster-wrap{position:relative;border-radius:var(--radius);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 0 1px var(--border);width:220px}
@media(max-width:768px){.poster-wrap{width:120px;flex-shrink:0}}
.poster-wrap img{width:100%;aspect-ratio:2/3;object-fit:cover}
.watch-btn-main{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--purple);border-radius:var(--radius);font-weight:700;font-size:14px;margin-top:12px;transition:all var(--transition);box-shadow:0 0 30px rgba(139,92,246,0.3);width:220px}
.watch-btn-main:hover{background:var(--purple2);transform:translateY(-2px)}
.watch-btn-main svg{width:16px;height:16px}
@media(max-width:768px){.watch-btn-main{width:100%;margin-top:8px}}

.info-col{}
.anime-title-main{font-size:clamp(22px,4vw,42px);font-weight:900;line-height:1.1;letter-spacing:-0.5px;margin-bottom:8px}
.anime-title-sub{font-size:clamp(13px,2vw,16px);color:var(--text3);font-weight:400;margin-bottom:16px}
.meta-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.meta-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--border)}
.meta-badge.gold{color:#fbbf24;border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.1)}
.meta-badge.green{color:#4ade80;border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.1)}
.meta-badge.purple{color:var(--purple3);border-color:rgba(139,92,246,0.3);background:rgba(139,92,246,0.1)}
.meta-badge svg{width:14px;height:14px}

.synopsis-block{margin-bottom:24px}
.block-title{font-size:13px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.synopsis-text{font-size:15px;line-height:1.7;color:var(--text2)}
.synopsis-text.collapsed{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.read-more{color:var(--purple3);font-size:13px;font-weight:600;margin-top:6px;cursor:pointer;display:inline-block}
.read-more:hover{color:var(--purple)}

.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.tag{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text2);transition:all var(--transition)}
.tag:hover{border-color:var(--purple);color:var(--purple3)}

.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.info-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:12px}
.info-item-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.info-item-val{font-size:14px;font-weight:600;color:var(--text)}

/* ── TABS ── */
.details-tabs{margin-top:40px;padding:0 clamp(16px,4vw,60px);max-width:1400px;margin-left:auto;margin-right:auto}
.tabs-nav{display:flex;gap:4px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;margin-bottom:28px}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-btn{padding:12px 20px;font-size:14px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;transition:all var(--transition);white-space:nowrap;flex-shrink:0}
.tab-btn.active{color:var(--purple3);border-bottom-color:var(--purple)}
.tab-btn:hover{color:var(--text2)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* ── CHARACTERS / STAFF ── */
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.char-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;align-items:center;gap:12px;padding:10px;transition:border-color var(--transition)}
.char-card:hover{border-color:var(--purple)}
.char-img{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0}
.char-info{}
.char-name{font-size:13px;font-weight:600;line-height:1.3}
.char-role{font-size:11px;color:var(--text3)}

/* ── EPISODES ── */
.episode-list{display:grid;gap:8px}
.ep-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);transition:all var(--transition);cursor:pointer}
.ep-item:hover{background:var(--surface2);border-color:var(--purple)}
.ep-num{width:36px;height:36px;border-radius:var(--radius2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--purple3);flex-shrink:0}
.ep-info{flex:1}
.ep-title{font-size:14px;font-weight:600}
.ep-meta{font-size:12px;color:var(--text3);margin-top:2px}
.ep-play{color:var(--text3);transition:color var(--transition)}
.ep-item:hover .ep-play{color:var(--purple3)}
.ep-play svg{width:18px;height:18px}

/* ── RELATIONS / RECS ── */
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.rel-card{border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform var(--transition)}
.rel-card:hover{transform:translateY(-4px)}
.rel-img{aspect-ratio:2/3;object-fit:cover;width:100%}
.rel-body{padding:8px 4px}
.rel-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.rel-type{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}

/* ── TRAILER ── */
.trailer-wrap{position:relative;padding-top:56.25%;border-radius:var(--radius);overflow:hidden;background:var(--bg3);border:1px solid var(--border)}
.trailer-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

/* ── RANKING ── */
.rank-list{display:grid;gap:8px}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2)}
.rank-num{font-size:18px;font-weight:900;color:var(--purple3);width:32px;text-align:right;flex-shrink:0}
.rank-label{font-size:13px;color:var(--text2);flex:1}
.rank-type{font-size:11px;color:var(--text3)}

/* ── LOADING ── */
.page-loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

section.section{padding:clamp(24px,4vh,40px) clamp(16px,4vw,60px)}

@media(max-width:768px){.header-nav{display:none}.watch-btn-main{width:auto}}
@media(min-width:769px){.hamburger{display:none}}
</style>
</head>
<body>

<header id="header">
  <div style="display:flex;align-items:center;gap:12px">
    <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
    <a href="index.html" class="logo">Anime<span>Vault</span></a>
  </div>
  <nav class="header-nav">
    <a href="index.html">Home</a>
    <a href="search.html?sort=TRENDING_DESC">Trending</a>
    <a href="schedule.html">Schedule</a>
    <a href="donate.html">Donate</a>
  </nav>
  <div class="header-right">
    <a href="search.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></a>
  </div>
</header>

<div id="sidebar-overlay"></div>
<aside id="sidebar">
  <div class="sidebar-head">
    <a href="index.html" class="logo">Anime<span>Vault</span></a>
    <button class="icon-btn" id="sidebar-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  </div>
  <nav class="sidebar-nav">
    <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</a>
    <a href="search.html?sort=TRENDING_DESC"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Trending</a>
    <a href="schedule.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>
    <a href="donate.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Donate</a>
  </nav>
</aside>

<div id="page-root">
  <div class="page-loading" id="page-loading">
    <div class="spinner"></div>
    <p style="color:var(--text3);font-size:14px">Loading anime details...</p>
  </div>
</div>

<footer style="background:var(--bg2);border-top:1px solid var(--border);padding:32px clamp(16px,4vw,40px);text-align:center;margin-top:60px">
  <p style="font-size:12px;color:var(--text3);max-width:600px;margin:0 auto 8px;line-height:1.6">This site does not store any files on its server. All contents are provided by non-affiliated third parties.</p>
  <p style="font-size:12px;color:var(--text3)">© 2025 AnimeVault. For entertainment purposes only.</p>
</footer>

<script>
const ANILIST_API = 'https://api.anilist.co/v2';
const CACHE = {};
const CACHE_TTL = 10 * 60 * 1000;
async function gql(query, vars={}, retries=2) {
  const key = JSON.stringify({query,vars});
  const cached = CACHE[key];
  if (cached && Date.now()-cached.t < CACHE_TTL) return cached.d;
  for (let i=0;i<=retries;i++) {
    try {
      const r = await fetch(ANILIST_API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({query,variables:vars}),signal:AbortSignal.timeout(12000)});
      if (r.status===429){await sleep(2000*(i+1));continue;}
      const j = await r.json();
      if (j.errors) throw new Error(j.errors[0].message);
      CACHE[key]={d:j.data,t:Date.now()};return j.data;
    } catch(e){if(i===retries)throw e;await sleep(1000*(i+1));}
  }
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function truncate(str,len){if(!str)return'';const c=str.replace(/<[^>]+>/g,'');return c.length>len?c.slice(0,len)+'...':c;}
function safe(s){return s||'—'}

const params = new URLSearchParams(location.search);
const animeId = parseInt(params.get('id'));
if (!animeId) location.href = 'index.html';

const DETAILS_QUERY = `
query($id:Int){
  Media(id:$id,type:ANIME){
    id title{romaji english native}
    description bannerImage coverImage{extraLarge large}
    averageScore meanScore popularity favourites
    format status episodes duration season seasonYear
    startDate{year month day} endDate{year month day}
    genres tags{name rank}
    studios{nodes{id name isAnimationStudio}}
    trailer{id site}
    rankings{rank type format season year allTime context}
    nextAiringEpisode{episode airingAt}
    relations{edges{relationType(version:2) node{id title{romaji}coverImage{large}format type}}}
    recommendations(perPage:12){nodes{mediaRecommendation{id title{romaji}coverImage{large}averageScore}}}
    characters(perPage:24,sort:[ROLE,RELEVANCE]){edges{role node{id name{full}image{medium}}voiceActors(language:JAPANESE){name{full}image{medium}}}}}
    staff(perPage:16){edges{role node{id name{full}image{medium}}}}}
}`;

async function loadAnime() {
  const data = await gql(DETAILS_QUERY, {id: animeId}).catch(e => {
    document.getElementById('page-root').innerHTML = `<div class="page-loading"><p style="color:var(--text3)">Failed to load. <a href="javascript:location.reload()" style="color:var(--purple3)">Retry</a></p></div>`;
    return null;
  });
  if (!data) return;
  const a = data.Media;
  if (!a) return;

  const eps = a.episodes || (a.nextAiringEpisode ? a.nextAiringEpisode.episode - 1 : null);
  const statusColor = {RELEASING:'green',FINISHED:'green',NOT_YET_RELEASED:'purple',CANCELLED:'',HIATUS:''}[a.status] || '';
  const statusLabel = {RELEASING:'Airing',FINISHED:'Finished',NOT_YET_RELEASED:'Upcoming',CANCELLED:'Cancelled',HIATUS:'Hiatus'}[a.status] || a.status || '—';
  const startDate = a.startDate?.year ? `${a.startDate.year}` : '—';
  const season = a.season ? `${a.season.charAt(0)+a.season.slice(1).toLowerCase()} ${a.seasonYear||''}` : '—';

  let nextEpInfo = '';
  if (a.nextAiringEpisode) {
    const secs = a.nextAiringEpisode.airingAt - Math.floor(Date.now()/1000);
    const d = Math.floor(secs/86400), h = Math.floor((secs%86400)/3600);
    nextEpInfo = `<div class="meta-badge purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Ep ${a.nextAiringEpisode.episode} in ${d}d ${h}h</div>`;
  }

  const tags = (a.tags||[]).slice(0,20).map(t=>`<span class="tag" title="Rank: ${t.rank}%">${t.name}</span>`).join('');
  const studios = (a.studios?.nodes||[]).filter(s=>s.isAnimationStudio).map(s=>s.name).join(', ') || '—';
  const allStudios = (a.studios?.nodes||[]).map(s=>s.name).join(', ') || '—';

  // Build episode list (if known count)
  let episodeHTML = '';
  if (eps && eps > 0) {
    const epItems = Array.from({length: Math.min(eps, 100)}, (_,i) => `
    <div class="ep-item" onclick="location.href='watch.html?id=${a.id}&ep=${i+1}'">
      <div class="ep-num">${i+1}</div>
      <div class="ep-info">
        <div class="ep-title">Episode ${i+1}</div>
        <div class="ep-meta">${a.duration ? a.duration + ' min' : ''}</div>
      </div>
      <div class="ep-play"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
    </div>`).join('');
    episodeHTML = `<div class="episode-list">${epItems}</div>${eps>100?`<p style="color:var(--text3);font-size:13px;margin-top:12px;text-align:center">Showing first 100 of ${eps} episodes</p>`:''}`;
  } else {
    episodeHTML = '<p style="color:var(--text3);font-size:14px">Episode data unavailable.</p>';
  }

  // Characters
  const charHTML = (a.characters?.edges||[]).map(e => {
    const ch = e.node;
    const va = e.voiceActors?.[0];
    return `
    <div class="char-card">
      <img class="char-img" src="${ch.image?.medium||''}" alt="${ch.name?.full||''}" loading="lazy" onerror="this.src='https://via.placeholder.com/48x48/12121a/606075?text=?'">
      <div class="char-info">
        <div class="char-name">${ch.name?.full||''}</div>
        <div class="char-role">${e.role||''}</div>
        ${va?`<div class="char-role" style="margin-top:3px;color:var(--text3)">CV: ${va.name?.full||''}</div>`:''}
      </div>
    </div>`;
  }).join('');

  // Staff
  const staffHTML = (a.staff?.edges||[]).map(e => `
  <div class="char-card">
    <img class="char-img" src="${e.node?.image?.medium||''}" alt="${e.node?.name?.full||''}" loading="lazy" onerror="this.src='https://via.placeholder.com/48x48/12121a/606075?text=?'">
    <div class="char-info">
      <div class="char-name">${e.node?.name?.full||''}</div>
      <div class="char-role">${e.role||''}</div>
    </div>
  </div>`).join('');

  // Relations
  const relHTML = (a.relations?.edges||[]).filter(e=>e.node?.type==='ANIME').map(e=>`
  <div class="rel-card" onclick="location.href='anime.html?id=${e.node.id}'">
    <img class="rel-img" src="${e.node.coverImage?.large||''}" alt="${e.node.title?.romaji||''}" loading="lazy">
    <div class="rel-body">
      <div class="rel-type">${e.relationType?.replace(/_/g,' ')||''}</div>
      <div class="rel-title">${e.node.title?.romaji||''}</div>
    </div>
  </div>`).join('');

  // Recommendations
  const recHTML = (a.recommendations?.nodes||[]).filter(n=>n.mediaRecommendation).map(n=>{
    const m = n.mediaRecommendation;
    return `<div class="rel-card" onclick="location.href='anime.html?id=${m.id}'">
      <img class="rel-img" src="${m.coverImage?.large||''}" alt="${m.title?.romaji||''}" loading="lazy">
      <div class="rel-body">
        <div class="rel-type">${m.averageScore?'★ '+(m.averageScore/10).toFixed(1):''}</div>
        <div class="rel-title">${m.title?.romaji||''}</div>
      </div>
    </div>`;
  }).join('');

  // Rankings
  const rankHTML = (a.rankings||[]).slice(0,6).map(r=>`
  <div class="rank-item">
    <div class="rank-num">#${r.rank}</div>
    <div class="rank-label">${r.context}</div>
    <div class="rank-type">${r.allTime?'All Time':r.season||''} ${r.year||''}</div>
  </div>`).join('');

  // Trailer
  const trailerHTML = a.trailer?.site === 'youtube'
    ? `<div class="trailer-wrap"><iframe src="https://www.youtube-nocookie.com/embed/${a.trailer.id}?rel=0" allowfullscreen loading="lazy"></iframe></div>`
    : '<p style="color:var(--text3)">No trailer available.</p>';

  const html = `
  <div class="anime-banner">
    <img class="banner-img" src="${a.bannerImage || a.coverImage?.extraLarge || ''}" alt="${a.title?.romaji||''}" loading="lazy">
    <div class="banner-overlay"></div>
  </div>
  <div class="details-main">
    <div class="details-grid">
      <div class="poster-col">
        <div>
          <div class="poster-wrap">
            <img src="${a.coverImage?.extraLarge||a.coverImage?.large||''}" alt="${a.title?.romaji||''}">
          </div>
          <a href="watch.html?id=${a.id}&ep=1" class="watch-btn-main">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Watch Now
          </a>
        </div>
      </div>
      <div class="info-col">
        <h1 class="anime-title-main">${a.title?.romaji||''}</h1>
        ${a.title?.english && a.title.english !== a.title.romaji ? `<p class="anime-title-sub">${a.title.english}</p>` : ''}
        <div class="meta-row">
          ${a.averageScore ? `<div class="meta-badge gold"><svg viewBox="0 0 24 24" fill="#fbbf24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${(a.averageScore/10).toFixed(1)}</div>` : ''}
          ${a.status ? `<div class="meta-badge ${statusColor}">${statusLabel}</div>` : ''}
          ${a.format ? `<div class="meta-badge">${a.format}</div>` : ''}
          ${eps ? `<div class="meta-badge">${eps} Episodes</div>` : ''}
          ${nextEpInfo}
        </div>
        ${a.description ? `
        <div class="synopsis-block">
          <div class="block-title">Synopsis</div>
          <p class="synopsis-text collapsed" id="synopsis-text">${a.description.replace(/<[^>]+>/g,'')}</p>
          <span class="read-more" id="read-more-btn">Read more</span>
        </div>` : ''}
        ${a.genres?.length ? `
        <div style="margin-bottom:20px">
          <div class="block-title">Genres</div>
          <div class="tags-row">${a.genres.map(g=>`<a href="search.html?genre=${encodeURIComponent(g)}" class="tag">${g}</a>`).join('')}</div>
        </div>` : ''}
        ${tags ? `
        <div style="margin-bottom:20px">
          <div class="block-title">Tags</div>
          <div class="tags-row">${tags}</div>
        </div>` : ''}
        <div class="info-grid">
          <div class="info-item"><div class="info-item-label">Format</div><div class="info-item-val">${safe(a.format)}</div></div>
          <div class="info-item"><div class="info-item-label">Status</div><div class="info-item-val">${statusLabel}</div></div>
          <div class="info-item"><div class="info-item-label">Episodes</div><div class="info-item-val">${safe(eps)}</div></div>
          <div class="info-item"><div class="info-item-label">Duration</div><div class="info-item-val">${a.duration ? a.duration + ' min' : '—'}</div></div>
          <div class="info-item"><div class="info-item-label">Season</div><div class="info-item-val">${season}</div></div>
          <div class="info-item"><div class="info-item-label">Year</div><div class="info-item-val">${startDate}</div></div>
          <div class="info-item"><div class="info-item-label">Studio</div><div class="info-item-val" title="${allStudios}">${studios.length > 30 ? studios.slice(0,30)+'…' : studios}</div></div>
          <div class="info-item"><div class="info-item-label">Popularity</div><div class="info-item-val">${a.popularity ? a.popularity.toLocaleString() : '—'}</div></div>
          <div class="info-item"><div class="info-item-label">Favourites</div><div class="info-item-val">${a.favourites ? a.favourites.toLocaleString() : '—'}</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="details-tabs">
    <div class="tabs-nav">
      <button class="tab-btn active" data-tab="episodes">Episodes</button>
      <button class="tab-btn" data-tab="characters">Characters</button>
      <button class="tab-btn" data-tab="staff">Staff</button>
      <button class="tab-btn" data-tab="relations">Relations</button>
      <button class="tab-btn" data-tab="recommendations">Recommendations</button>
      ${rankHTML ? '<button class="tab-btn" data-tab="rankings">Rankings</button>' : ''}
      <button class="tab-btn" data-tab="trailer">Trailer</button>
    </div>
    <div class="tab-panel active" id="tab-episodes">${episodeHTML}</div>
    <div class="tab-panel" id="tab-characters"><div class="char-grid">${charHTML||'<p style="color:var(--text3)">No character data.</p>'}</div></div>
    <div class="tab-panel" id="tab-staff"><div class="char-grid">${staffHTML||'<p style="color:var(--text3)">No staff data.</p>'}</div></div>
    <div class="tab-panel" id="tab-relations"><div class="rel-grid">${relHTML||'<p style="color:var(--text3)">No related anime.</p>'}</div></div>
    <div class="tab-panel" id="tab-recommendations"><div class="rel-grid">${recHTML||'<p style="color:var(--text3)">No recommendations.</p>'}</div></div>
    ${rankHTML ? `<div class="tab-panel" id="tab-rankings"><div class="rank-list">${rankHTML}</div></div>` : ''}
    <div class="tab-panel" id="tab-trailer">${trailerHTML}</div>
  </div>`;

  document.getElementById('page-loading').remove();
  document.getElementById('page-root').innerHTML = html;
  document.title = `${a.title?.romaji||'Anime'} — AnimeVault`;

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      const panel = document.getElementById('tab-'+btn.dataset.tab);
      if (panel) panel.classList.add('active');
    });
  });

  // Read more
  const readMoreBtn = document.getElementById('read-more-btn');
  const synopsisText = document.getElementById('synopsis-text');
  if (readMoreBtn && synopsisText) {
    readMoreBtn.addEventListener('click', () => {
      synopsisText.classList.toggle('collapsed');
      readMoreBtn.textContent = synopsisText.classList.contains('collapsed') ? 'Read more' : 'Read less';
    });
  }
}

// Sidebar
document.getElementById('hamburger-btn').onclick = () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
};
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}
document.getElementById('sidebar-close').onclick = closeSidebar;
document.getElementById('sidebar-overlay').onclick = closeSidebar;

loadAnime();
</script>
</body>
</html>
