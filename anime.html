<style>
:root{
  --bg:#080810;--bg2:#0d0d1a;--surface:#1a1a2e;--surface2:#1e1e35;
  --border:rgba(130,80,255,.18);--purple:#8a2be2;--purple2:#a855f7;--purple3:#c084fc;
  --accent:#e040fb;--text:#f0eeff;--text2:#b0a8d0;--text3:#7068a0;
  --gold:#ffd700;--green:#00e676;--red:#ff5252;
  --radius:12px;--radius2:8px;--transition:all .3s cubic-bezier(.4,0,.2,1);
  --shadow:0 8px 32px rgba(138,43,226,.15);--glow:0 0 20px rgba(168,85,247,.4);
  --header-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{cursor:pointer;border:none;outline:none;font-family:inherit}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--header-h);
  background:linear-gradient(180deg,rgba(8,8,16,.98),rgba(8,8,16,.85));
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 clamp(12px,3vw,32px);gap:12px}
.hdr-left,.hdr-right{display:flex;align-items:center;gap:12px;flex:1}
.hdr-right{justify-content:flex-end}
.hdr-center{flex:0 0 auto}
.hdr-logo{height:40px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px rgba(168,85,247,.5))}
.icon-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:18px;transition:var(--transition)}
.icon-btn:hover{background:rgba(168,85,247,.2);border-color:var(--purple2);color:var(--purple3);box-shadow:var(--glow)}
.nav-desktop{display:flex;align-items:center;gap:4px}
.nav-desktop a{padding:6px 14px;border-radius:20px;color:var(--text2);font-size:.88rem;font-weight:500;transition:var(--transition)}
.nav-desktop a:hover{color:var(--text);background:rgba(168,85,247,.15)}
@media(max-width:768px){.nav-desktop{display:none}}

/* SIDEBAR */
#sidebar-overlay{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s}
#sidebar-overlay.open{opacity:1;pointer-events:all}
#sidebar{position:fixed;top:0;left:0;bottom:0;z-index:1200;width:min(280px,85vw);
  background:linear-gradient(135deg,var(--bg2),var(--surface));border-right:1px solid var(--border);
  transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#sidebar.open{transform:translateX(0)}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-logo{height:32px;width:auto;object-fit:contain}
.sidebar-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;color:var(--text2);transition:var(--transition)}
.sidebar-close:hover{background:rgba(255,80,80,.2);color:var(--red)}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.sidebar-nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius2);color:var(--text2);font-size:.95rem;font-weight:500;transition:var(--transition);margin-bottom:4px}
.sidebar-nav a:hover{background:rgba(168,85,247,.15);color:var(--text);border-left:3px solid var(--purple2);padding-left:13px}
.sidebar-nav a svg{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);color:var(--text3);font-size:.75rem;text-align:center}

/* SEARCH OVERLAY */
#search-overlay{position:fixed;inset:0;z-index:2000;background:rgba(8,8,16,.97);backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;padding:clamp(60px,10vh,120px) 16px 32px;
  opacity:0;pointer-events:none;transition:opacity .3s;overflow-y:auto}
#search-overlay.open{opacity:1;pointer-events:all}
.search-wrap{width:100%;max-width:720px}
.search-input-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);
  border-radius:50px;padding:6px 6px 6px 24px;box-shadow:0 0 40px rgba(168,85,247,.2);transition:var(--transition)}
.search-input-row:focus-within{border-color:var(--purple2);box-shadow:0 0 50px rgba(168,85,247,.35)}
#search-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:clamp(1rem,2.5vw,1.3rem);font-family:inherit;caret-color:var(--purple2)}
#search-input::placeholder{color:var(--text3)}
.search-close-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.07);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:18px;transition:var(--transition);flex-shrink:0}
.search-close-btn:hover{background:rgba(255,80,80,.2);color:var(--red)}
#search-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;margin-top:24px;max-height:65vh;overflow-y:auto;padding-right:4px}
.search-card{border-radius:var(--radius2);overflow:hidden;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.search-card:hover{transform:translateY(-4px);border-color:var(--purple2);box-shadow:var(--shadow)}
.search-card img{width:100%;aspect-ratio:2/3;object-fit:cover}
.search-card-info{padding:8px}
.search-card-title{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-card-sub{font-size:.7rem;color:var(--text3);margin-top:2px}

/* BANNER */
#detail-banner{position:relative;width:100%;height:min(60vh,520px);min-height:380px;margin-top:var(--header-h);overflow:hidden}
.banner-bg{position:absolute;inset:0;background-size:cover;background-position:center 20%;filter:brightness(.55)}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,8,16,.98) 0%,rgba(8,8,16,.7) 45%,transparent 100%),linear-gradient(0deg,rgba(8,8,16,1) 0%,transparent 35%)}
.banner-content{position:absolute;bottom:0;left:0;right:0;padding:clamp(20px,4vw,60px);display:flex;gap:clamp(16px,3vw,40px);align-items:flex-end}
.banner-poster{flex-shrink:0;width:clamp(120px,18vw,200px);aspect-ratio:2/3;border-radius:var(--radius);object-fit:cover;
  border:2px solid rgba(168,85,247,.4);box-shadow:0 8px 40px rgba(0,0,0,.7)}
.banner-info{flex:1;min-width:0}
.banner-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.bbadge{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.bbadge-score{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.bbadge-format{background:rgba(168,85,247,.15);color:var(--purple3);border:1px solid rgba(168,85,247,.3)}
.bbadge-status{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.banner-title{font-size:clamp(1.5rem,4vw,3rem);font-weight:800;line-height:1.15;letter-spacing:-.02em;margin-bottom:8px;text-shadow:0 2px 20px rgba(0,0,0,.8)}
.banner-title-en{font-size:clamp(.85rem,1.5vw,1rem);color:var(--text2);margin-bottom:14px}
.banner-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-watch{display:flex;align-items:center;gap:8px;padding:12px 28px;border-radius:50px;
  background:linear-gradient(135deg,var(--purple),var(--accent));color:#fff;font-size:.92rem;font-weight:700;
  box-shadow:0 4px 20px rgba(138,43,226,.5);transition:var(--transition)}
.btn-watch:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(138,43,226,.7)}
.btn-outline{display:flex;align-items:center;gap:8px;padding:12px 24px;border-radius:50px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:.92rem;font-weight:600;transition:var(--transition)}
.btn-outline:hover{background:rgba(255,255,255,.15)}
@media(max-width:600px){.banner-poster{display:none}}

/* DETAIL BODY */
#detail-body{padding:clamp(24px,4vw,48px) clamp(12px,3vw,40px);display:grid;grid-template-columns:1fr min(320px,35%);gap:clamp(20px,4vw,48px)}
@media(max-width:900px){#detail-body{grid-template-columns:1fr}}
.detail-main{}
.detail-sidebar{}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:4px;height:18px;border-radius:2px;background:linear-gradient(var(--purple),var(--accent))}

/* SYNOPSIS */
.synopsis-text{color:var(--text2);line-height:1.75;font-size:.92rem}
.synopsis-text.clamp{display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.synopsis-more{margin-top:8px;color:var(--purple3);font-size:.82rem;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.synopsis-more:hover{color:var(--purple2)}

/* GENRE TAGS */
.tags-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.genre-tag{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:500;
  background:rgba(168,85,247,.1);color:var(--purple3);border:1px solid rgba(168,85,247,.25);
  cursor:pointer;transition:var(--transition)}
.genre-tag:hover{background:rgba(168,85,247,.25);color:var(--text)}

/* CHARACTERS */
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.char-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;display:flex;gap:8px;align-items:center;padding:8px;transition:var(--transition)}
.char-card:hover{border-color:var(--purple2);background:var(--surface2)}
.char-img{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid rgba(168,85,247,.3)}
.char-info{min-width:0}
.char-name{font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char-role{font-size:.65rem;color:var(--text3)}

/* STAFF */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:28px}
.staff-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;display:flex;gap:8px;align-items:center;padding:8px;transition:var(--transition)}
.staff-card:hover{border-color:var(--purple2)}
.staff-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0}
.staff-info{min-width:0}
.staff-name{font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.staff-role{font-size:.65rem;color:var(--text3)}

/* RELATIONS / RECOMMENDATIONS */
.rec-slider{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.rec-slider::-webkit-scrollbar{display:none}
.rec-card{flex:0 0 130px;border-radius:var(--radius2);overflow:hidden;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.rec-card:hover{transform:translateY(-4px);border-color:var(--purple2);box-shadow:var(--shadow)}
.rec-card img{width:100%;aspect-ratio:2/3;object-fit:cover}
.rec-card-info{padding:6px 8px}
.rec-card-title{font-size:.72rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-card-sub{font-size:.62rem;color:var(--text3);margin-top:2px}

/* SIDEBAR INFO BOX */
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(168,85,247,.08)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:.75rem;color:var(--text3);font-weight:500;flex-shrink:0;margin-right:12px}
.info-value{font-size:.78rem;color:var(--text);font-weight:600;text-align:right}

/* TRAILER */
.trailer-wrap{position:relative;aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:#000;margin-bottom:24px}
.trailer-wrap iframe{position:absolute;inset:0;width:100%;height:100%}

/* EPISODES */
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:8px;max-height:280px;overflow-y:auto;padding:4px}
.ep-btn{padding:8px 4px;border-radius:var(--radius2);background:var(--surface);border:1px solid var(--border);
  color:var(--text2);font-size:.8rem;font-weight:600;text-align:center;cursor:pointer;transition:var(--transition)}
.ep-btn:hover{background:rgba(168,85,247,.2);border-color:var(--purple2);color:var(--text)}
.ep-btn.active{background:linear-gradient(135deg,var(--purple),var(--accent));border-color:transparent;color:#fff}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius2)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* FOOTER */
#footer{background:var(--bg2);border-top:1px solid var(--border);padding:clamp(24px,4vh,48px) clamp(12px,3vw,32px) 24px;text-align:center}
.footer-logo{height:36px;width:auto;margin:0 auto 20px;filter:brightness(.7)}
.footer-nav{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:16px}
.footer-nav a{color:var(--text3);font-size:.82rem;transition:color .2s}
.footer-nav a:hover{color:var(--purple3)}
.footer-disclaimer{font-size:.72rem;color:var(--text3);line-height:1.6;max-width:600px;margin:0 auto 16px}
.footer-copy{font-size:.72rem;color:var(--text3)}
</style>
</head>

<script>
const ANILIST='https://graphql.anilist.co';
const params=new URLSearchParams(location.search);
const animeId=parseInt(params.get('id'));

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('open')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open')}
function openSearch(){document.getElementById('search-overlay').classList.add('open');document.getElementById('search-input').focus()}
function closeSearch(){document.getElementById('search-overlay').classList.remove('open');document.getElementById('search-input').value='';document.getElementById('search-results').innerHTML=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch()});

let searchDebounce=null;
document.getElementById('search-input').addEventListener('input',e=>{
  clearTimeout(searchDebounce);
  searchDebounce=setTimeout(()=>doSearch(e.target.value.trim()),400);
});
async function doSearch(q){
  if(!q){document.getElementById('search-results').innerHTML='';return}
  const container=document.getElementById('search-results');
  container.innerHTML='<div style="color:var(--text3);padding:16px;font-size:.85rem">Searching...</div>';
  const Q=`query($s:String){Page(perPage:12){media(type:ANIME,search:$s,sort:TRENDING_DESC){id title{romaji english}coverImage{large}averageScore format}}}`;
  try{
    const r=await fetch(ANILIST,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:Q,variables:{s:q}})});
    const d=await r.json();
    const list=d?.data?.Page?.media||[];
    container.innerHTML=list.map(a=>`<div class="search-card" onclick="location.href='anime.html?id=${a.id}'">
      <img src="${a.coverImage?.large||''}" loading="lazy" alt="${a.title?.romaji||''}"/>
      <div class="search-card-info"><div class="search-card-title">${a.title?.english||a.title?.romaji||'Unknown'}</div>
      <div class="search-card-sub">${a.format||''} · ★ ${a.averageScore?(a.averageScore/10).toFixed(1):'N/A'}</div></div></div>`).join('');
  }catch{container.innerHTML='<div style="color:var(--red);padding:16px;font-size:.85rem">Search failed</div>'}
}

const DETAIL_QUERY=`query($id:Int){Media(id:$id,type:ANIME){
  id title{romaji english native}bannerImage coverImage{extraLarge large}
  description(asHtml:false)genres tags{name}averageScore popularity favourites episodes
  format status season seasonYear startDate{year month day}endDate{year month day}
  duration source studios{nodes{name isMain}}rankings{rank type allTime season year}
  trailer{id site}nextAiringEpisode{episode airingAt}
  characters(sort:ROLE,perPage:16){edges{role node{name{full}image{medium}}}}
  staff(perPage:10){edges{role node{name{full}image{medium}}}}
  recommendations(perPage:12){nodes{mediaRecommendation{id title{romaji english}coverImage{large}format averageScore}}}
  relations{edges{relationType node{id title{romaji}coverImage{large}format status averageScore}}}
}}`;

function formatScore(s){return s?(s/10).toFixed(1):'N/A'}
function stripHtml(s){return s?s.replace(/<[^>]+>/g,''):''}

async function loadDetail(){
  if(!animeId){document.getElementById('detail-main').innerHTML='<div style="color:var(--red);padding:40px;text-align:center">Invalid anime ID.</div>';return}
  try{
    const r=await fetch(ANILIST,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:DETAIL_QUERY,variables:{id:animeId}})});
    const d=await r.json();
    const a=d?.data?.Media;
    if(!a)throw new Error('Not found');
    renderDetail(a);
  }catch(e){
    document.getElementById('detail-main').innerHTML=`<div style="color:var(--red);padding:40px;text-align:center">Failed to load: ${e.message}</div>`;
  }
}

function renderDetail(a){
  document.title=`${a.title?.english||a.title?.romaji||'Anime'} – NamiTube`;
  // Banner
  if(a.bannerImage)document.getElementById('banner-bg').style.backgroundImage=`url('${a.bannerImage}')`;
  const poster=document.getElementById('banner-poster');
  poster.src=a.coverImage?.extraLarge||a.coverImage?.large||'';
  poster.alt=a.title?.romaji||'';
  document.getElementById('banner-title').textContent=a.title?.english||a.title?.romaji||'Unknown';
  if(a.title?.english&&a.title?.romaji&&a.title.english!==a.title.romaji)
    document.getElementById('banner-title-en').textContent=a.title.romaji;
  const badges=document.getElementById('banner-badges');
  badges.innerHTML=`
    ${a.averageScore?`<span class="bbadge bbadge-score">★ ${formatScore(a.averageScore)}</span>`:''}
    ${a.format?`<span class="bbadge bbadge-format">${a.format}</span>`:''}
    ${a.status?`<span class="bbadge bbadge-status">${a.status.replace(/_/g,' ')}</span>`:''}
    ${a.seasonYear?`<span class="bbadge" style="background:rgba(255,255,255,.08);color:var(--text2);border:1px solid rgba(255,255,255,.12)">${a.season||''} ${a.seasonYear}</span>`:''}`;
  document.getElementById('banner-actions').innerHTML=`
    <a href="watch.html?id=${a.id}&ep=1" class="btn-watch">
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><polygon points="5,3 19,12 5,21"/></svg>Watch Now
    </a>
    ${a.trailer?.site==='youtube'?`<a href="https://youtu.be/${a.trailer.id}" target="_blank" class="btn-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polygon points="5,3 19,12 5,21"/></svg>Trailer
    </a>`:''}`;

  // Episodes
  const epCount=a.episodes||a.nextAiringEpisode?.episode-1||0;
  let epHtml='';
  if(epCount>0){
    const eps=Array.from({length:epCount},(_,i)=>i+1);
    epHtml=`<h2 class="section-title" style="margin-bottom:16px">Episodes</h2>
    <div class="ep-grid">${eps.map(ep=>`<button class="ep-btn" onclick="location.href='watch.html?id=${a.id}&ep=${ep}'">${ep}</button>`).join('')}</div>
    <div style="margin-bottom:28px"></div>`;
  }

  // Synopsis
  const desc=stripHtml(a.description||'');
  const synId='syn-'+Date.now();
  let synHtml='';
  if(desc){
    synHtml=`<h2 class="section-title">Synopsis</h2>
    <p class="synopsis-text clamp" id="${synId}">${desc}</p>
    <button class="synopsis-more" onclick="toggleSyn('${synId}',this)">Read more ▼</button>
    <div style="margin-bottom:24px"></div>`;
  }

  // Genres & Tags
  const genreHtml=`<h2 class="section-title">Genres & Tags</h2>
  <div class="tags-row">
    ${(a.genres||[]).map(g=>`<span class="genre-tag" onclick="location.href='search.html?genre=${encodeURIComponent(g)}'">${g}</span>`).join('')}
    ${(a.tags||[]).slice(0,10).map(t=>`<span class="genre-tag" style="opacity:.7">${t.name}</span>`).join('')}
  </div>`;

  // Characters
  const chars=a.characters?.edges||[];
  let charHtml='';
  if(chars.length){
    charHtml=`<h2 class="section-title">Characters</h2>
    <div class="chars-grid">${chars.map(c=>`<div class="char-card">
      <img class="char-img" src="${c.node?.image?.medium||''}" alt="${c.node?.name?.full||''}" loading="lazy"/>
      <div class="char-info"><div class="char-name">${c.node?.name?.full||''}</div><div class="char-role">${c.role||''}</div></div>
    </div>`).join('')}</div>`;
  }

  // Staff
  const staff=a.staff?.edges||[];
  let staffHtml='';
  if(staff.length){
    staffHtml=`<h2 class="section-title">Staff</h2>
    <div class="staff-grid">${staff.map(s=>`<div class="staff-card">
      <img class="staff-img" src="${s.node?.image?.medium||''}" alt="${s.node?.name?.full||''}" loading="lazy"/>
      <div class="staff-info"><div class="staff-name">${s.node?.name?.full||''}</div><div class="staff-role">${s.role||''}</div></div>
    </div>`).join('')}</div>`;
  }

  // Relations
  const rels=a.relations?.edges||[];
  let relHtml='';
  if(rels.length){
    relHtml=`<h2 class="section-title">Related</h2>
    <div class="rec-slider" style="margin-bottom:28px">${rels.map(r=>`<div class="rec-card" onclick="location.href='anime.html?id=${r.node?.id}'">
      <img src="${r.node?.coverImage?.large||''}" alt="${r.node?.title?.romaji||''}" loading="lazy"/>
      <div class="rec-card-info"><div class="rec-card-title">${r.node?.title?.romaji||''}</div>
      <div class="rec-card-sub">${r.relationType?.replace(/_/g,' ')||''}</div></div>
    </div>`).join('')}</div>`;
  }

  // Recommendations
  const recs=(a.recommendations?.nodes||[]).filter(r=>r.mediaRecommendation);
  let recHtml='';
  if(recs.length){
    recHtml=`<h2 class="section-title">Recommendations</h2>
    <div class="rec-slider" style="margin-bottom:28px">${recs.map(r=>`<div class="rec-card" onclick="location.href='anime.html?id=${r.mediaRecommendation.id}'">
      <img src="${r.mediaRecommendation.coverImage?.large||''}" alt="${r.mediaRecommendation.title?.romaji||''}" loading="lazy"/>
      <div class="rec-card-info"><div class="rec-card-title">${r.mediaRecommendation.title?.english||r.mediaRecommendation.title?.romaji||''}</div>
      <div class="rec-card-sub">★ ${formatScore(r.mediaRecommendation.averageScore)}</div></div>
    </div>`).join('')}</div>`;
  }

  document.getElementById('detail-main').innerHTML=epHtml+synHtml+genreHtml+charHtml+staffHtml+relHtml+recHtml;

  // Trailer
  let trailerHtml='';
  if(a.trailer?.site==='youtube'){
    trailerHtml=`<h3 style="font-size:.88rem;font-weight:600;color:var(--text2);margin-bottom:8px">Trailer</h3>
    <div class="trailer-wrap" style="margin-bottom:20px">
      <iframe src="https://www.youtube.com/embed/${a.trailer.id}" frameborder="0" allowfullscreen loading="lazy"></iframe>
    </div>`;
  }

  // Sidebar info
  const studios=(a.studios?.nodes||[]).filter(s=>s.isMain).map(s=>s.name).join(', ')||'N/A';
  const sd=a.startDate;const ed=a.endDate;
  const startStr=sd?.year?`${sd.year}-${String(sd.month||1).padStart(2,'0')}-${String(sd.day||1).padStart(2,'0')}`:'TBA';
  const endStr=ed?.year?`${ed.year}-${String(ed.month||1).padStart(2,'0')}-${String(ed.day||1).padStart(2,'0')}`:(a.status==='RELEASING'?'Ongoing':'TBA');
  const rankHtml=(a.rankings||[]).slice(0,3).map(r=>`<div class="info-row"><span class="info-label">#${r.rank} ${r.type?.replace(/_/g,' ')}</span><span class="info-value">${r.allTime?'All Time':r.year||''}</span></div>`).join('');
  const nextEp=a.nextAiringEpisode;
  const nextStr=nextEp?`EP ${nextEp.episode} – ${new Date(nextEp.airingAt*1000).toLocaleDateString()}`:'N/A';

  document.getElementById('detail-sidebar').innerHTML=`${trailerHtml}
    <div class="info-box">
      <div class="info-row"><span class="info-label">Score</span><span class="info-value" style="color:var(--gold)">★ ${formatScore(a.averageScore)}</span></div>
      <div class="info-row"><span class="info-label">Popularity</span><span class="info-value">#${a.popularity||'N/A'}</span></div>
      <div class="info-row"><span class="info-label">Favourites</span><span class="info-value">${(a.favourites||0).toLocaleString()}</span></div>
      <div class="info-row"><span class="info-label">Format</span><span class="info-value">${a.format||'N/A'}</span></div>
      <div class="info-row"><span class="info-label">Episodes</span><span class="info-value">${a.episodes||'?'}</span></div>
      <div class="info-row"><span class="info-label">Duration</span><span class="info-value">${a.duration?a.duration+' min':'N/A'}</span></div>
      <div class="info-row"><span class="info-label">Status</span><span class="info-value">${a.status?.replace(/_/g,' ')||'N/A'}</span></div>
      <div class="info-row"><span class="info-label">Season</span><span class="info-value">${a.season||''} ${a.seasonYear||''}</span></div>
      <div class="info-row"><span class="info-label">Aired</span><span class="info-value">${startStr}</span></div>
      <div class="info-row"><span class="info-label">Ended</span><span class="info-value">${endStr}</span></div>
      <div class="info-row"><span class="info-label">Studio</span><span class="info-value">${studios}</span></div>
      <div class="info-row"><span class="info-label">Source</span><span class="info-value">${a.source?.replace(/_/g,' ')||'N/A'}</span></div>
      ${nextEp?`<div class="info-row"><span class="info-label">Next EP</span><span class="info-value">${nextStr}</span></div>`:''}
      ${rankHtml}
    </div>`;
}

function toggleSyn(id,btn){
  const el=document.getElementById(id);
  if(el.classList.toggle('clamp')){btn.textContent='Read more ▼'}else{btn.textContent='Read less ▲'}
}

loadDetail();
</script>
</body>
</html>
