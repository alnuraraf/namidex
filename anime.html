<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniVerse — Premium Anime Streaming</title>
<meta name="description" content="Watch anime online in HD. Stream thousands of anime episodes free on AniVerse.">
<meta property="og:title" content="AniVerse — Premium Anime Streaming">
<meta property="og:description" content="Watch anime online in HD. Stream thousands of anime episodes free.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%;background:#060608;color:#e8e8f0;font-family:'Nunito',sans-serif;scroll-behavior:smooth}
:root{
  --bg:#060608;--bg2:#0d0d15;--bg3:#13131f;
  --purple:#8b5cf6;--purple2:#6d28d9;--purple3:#a78bfa;
  --pink:#ec4899;--cyan:#06b6d4;
  --text:#e8e8f0;--text2:#9ca3af;--text3:#6b7280;
  --card:#111120;--card2:#1a1a2e;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(139,92,246,0.1);
  --border:rgba(139,92,246,0.2);--border2:rgba(255,255,255,0.06);
  --glow:0 0 40px rgba(139,92,246,0.3);
  --radius:12px;--radius2:8px;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);
}
::selection{background:var(--purple);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--purple2);border-radius:3px}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 clamp(16px,4vw,40px);height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:background var(--transition),backdrop-filter var(--transition)}
.header.scrolled{background:rgba(6,6,8,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2)}
.header-left{display:flex;align-items:center;gap:12px}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;border:none;background:none;z-index:1001}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:var(--transition)}
.logo{font-family:'Rajdhani',sans-serif;font-size:clamp(20px,3vw,26px);font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,var(--purple3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;white-space:nowrap}
.nav{display:flex;align-items:center;gap:4px}
.nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;padding:8px 14px;border-radius:var(--radius2);transition:var(--transition);letter-spacing:0.5px;text-transform:uppercase}
.nav a:hover,.nav a.active{color:#fff;background:var(--glass2)}
.header-right{display:flex;align-items:center;gap:8px}
.btn-icon{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:var(--transition);flex-shrink:0}
.btn-icon:hover{border-color:var(--purple);color:#fff;background:var(--glass2)}
.btn-icon svg{width:18px;height:18px}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:998;opacity:0;pointer-events:none;transition:opacity var(--transition)}
.sidebar-overlay.active{opacity:1;pointer-events:all}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);z-index:999;transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);padding:80px 20px 40px;display:flex;flex-direction:column;gap:8px}
.sidebar.active{transform:translateX(0)}
.sidebar a{color:var(--text2);text-decoration:none;font-size:15px;font-weight:600;padding:12px 16px;border-radius:var(--radius2);transition:var(--transition);display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:0.5px}
.sidebar a:hover{color:#fff;background:var(--glass2)}
.sidebar a svg{width:18px;height:18px;flex-shrink:0}

/* SEARCH OVERLAY */
.search-overlay{position:fixed;inset:0;z-index:2000;background:rgba(6,6,8,0.96);backdrop-filter:blur(20px);opacity:0;pointer-events:none;transition:opacity 0.25s;display:flex;flex-direction:column;padding:80px clamp(16px,5vw,60px) 40px;overflow:hidden}
.search-overlay.active{opacity:1;pointer-events:all}
.search-wrap{max-width:760px;width:100%;margin:0 auto}
.search-bar{display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;margin-bottom:24px}
.search-bar svg{width:20px;height:20px;color:var(--purple3);flex-shrink:0}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:18px;font-family:'Nunito',sans-serif;font-weight:600;min-width:0}
.search-bar input::placeholder{color:var(--text3)}
.search-close{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;border-radius:6px;transition:var(--transition)}
.search-close:hover{color:#fff}
.search-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.filter-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;padding:7px 12px;border-radius:var(--radius2);cursor:pointer;outline:none;transition:var(--transition)}
.filter-select:hover,.filter-select:focus{border-color:var(--purple);color:#fff}
.filter-select option{background:var(--bg2)}
.search-results{overflow-y:auto;flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;padding-right:4px;max-height:calc(100vh - 260px)}
.search-results::-webkit-scrollbar{width:4px}
.search-label{color:var(--text3);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;grid-column:1/-1}

/* HERO SLIDER */
.hero{position:relative;height:clamp(500px,85vh,820px);overflow:hidden;margin-top:0}
.hero-slides{display:flex;height:100%;transition:transform 0.7s cubic-bezier(0.4,0,0.2,1)}
.hero-slide{min-width:100%;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transform:scale(1.05);transition:transform 8s linear}
.hero-slide.active .hero-bg{transform:scale(1)}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,6,8,0.95) 0%,rgba(6,6,8,0.6) 50%,rgba(6,6,8,0.2) 100%),linear-gradient(0deg,rgba(6,6,8,1) 0%,transparent 40%)}
.hero-content{position:absolute;bottom:clamp(80px,12vh,140px);left:clamp(20px,6vw,80px);max-width:clamp(300px,45%,580px);z-index:2}
.hero-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.badge-score{background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.4);color:var(--purple3)}
.badge-type{background:rgba(6,182,212,0.15);border:1px solid rgba(6,182,212,0.3);color:var(--cyan)}
.badge-genre{background:var(--glass);border:1px solid var(--border2);color:var(--text2)}
.hero-title{font-family:'Rajdhani',sans-serif;font-size:clamp(28px,5vw,62px);font-weight:700;line-height:1.1;margin-bottom:12px;letter-spacing:1px}
.hero-synopsis{color:var(--text2);font-size:clamp(13px,1.5vw,15px);line-height:1.7;margin-bottom:24px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-actions{display:flex;flex-wrap:wrap;gap:12px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border:none;padding:12px 24px;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:var(--transition);white-space:nowrap}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(139,92,246,0.4)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:var(--transition);backdrop-filter:blur(10px);white-space:nowrap}
.btn-secondary:hover{background:var(--glass2);border-color:var(--purple);transform:translateY(-2px)}
.btn-primary svg,.btn-secondary svg{width:16px;height:16px;flex-shrink:0}
.hero-nav{position:absolute;bottom:clamp(30px,5vh,50px);left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:10}
.hero-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:var(--transition)}
.hero-dot.active{width:24px;border-radius:3px;background:var(--purple3)}
.hero-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:44px;height:44px;border-radius:50%;background:var(--glass);border:1px solid var(--border);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);backdrop-filter:blur(10px)}
.hero-arrow:hover{background:var(--glass2);border-color:var(--purple);box-shadow:var(--glow)}
.hero-prev{left:clamp(12px,3vw,30px)}
.hero-next{right:clamp(12px,3vw,30px)}
.hero-arrow svg{width:20px;height:20px}

/* SECTIONS */
.section{padding:clamp(30px,5vw,60px) clamp(16px,4vw,40px);overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
.section-title{font-family:'Rajdhani',sans-serif;font-size:clamp(18px,2.5vw,24px);font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:4px;height:22px;background:linear-gradient(180deg,var(--purple),var(--pink));border-radius:2px;flex-shrink:0}
.section-link{color:var(--purple3);font-size:13px;font-weight:700;text-decoration:none;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;transition:var(--transition)}
.section-link:hover{color:var(--pink)}

/* SLIDER ENGINE */
.slider-container{position:relative}
.slider-track{display:flex;gap:12px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:4px;cursor:grab;user-select:none}
.slider-track::-webkit-scrollbar{display:none}
.slider-track.grabbing{cursor:grabbing}
.slider-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:36px;height:36px;border-radius:50%;background:rgba(13,13,21,0.9);border:1px solid var(--border);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);backdrop-filter:blur(10px);flex-shrink:0}
.slider-arrow:hover{background:var(--glass2);border-color:var(--purple)}
.slider-arrow svg{width:16px;height:16px}
.slider-prev{left:-12px}
.slider-next{right:-12px}
.slider-arrow.hidden{opacity:0;pointer-events:none}

/* ANIME CARD */
.anime-card{flex:0 0 auto;width:clamp(130px,16vw,170px);border-radius:var(--radius);overflow:hidden;background:var(--card);cursor:pointer;transition:var(--transition);position:relative;text-decoration:none;display:block}
.anime-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 16px 40px rgba(0,0,0,0.5),0 0 20px rgba(139,92,246,0.15)}
.anime-card-img{position:relative;aspect-ratio:2/3;overflow:hidden}
.anime-card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s;background:var(--bg3)}
.anime-card:hover .anime-card-img img{transform:scale(1.08)}
.anime-card-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,6,8,0.9) 0%,transparent 50%)}
.card-badges{position:absolute;top:6px;left:6px;right:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
.card-badge{font-size:9px;font-weight:700;padding:3px 6px;border-radius:4px;letter-spacing:0.5px}
.cb-score{background:rgba(139,92,246,0.85);color:#fff}
.cb-ep{background:rgba(0,0,0,0.7);color:var(--text2);border:1px solid var(--border2)}
.cb-hd{background:rgba(6,182,212,0.8);color:#fff}
.card-type{position:absolute;bottom:42px;left:8px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(139,92,246,0.7);color:#fff;letter-spacing:0.5px}
.anime-card-info{padding:8px;background:linear-gradient(0deg,var(--card) 60%,transparent)}
.anime-card-title{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.anime-card-sub{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--card2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{flex:0 0 auto;width:clamp(130px,16vw,170px);aspect-ratio:2/3;border-radius:var(--radius)}
.skeleton-hero{width:100%;height:100%}
.skeleton-slide{width:100%;height:100%;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 2s infinite}

/* FOOTER */
footer{background:var(--bg2);border-top:1px solid var(--border2);padding:clamp(24px,4vw,40px) clamp(16px,4vw,40px);text-align:center}
.footer-inner{max-width:800px;margin:0 auto}
.footer-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,var(--purple3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.footer-disclaimer{font-size:12px;color:var(--text3);line-height:1.7;margin-bottom:16px;max-width:600px;margin-left:auto;margin-right:auto}
.footer-social{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.social-btn{width:36px;height:36px;border-radius:50%;background:var(--glass);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text2);transition:var(--transition);text-decoration:none}
.social-btn:hover{border-color:var(--purple);color:var(--purple3)}
.social-btn svg{width:16px;height:16px}
.footer-copy{font-size:12px;color:var(--text3)}

/* RESPONSIVE */
@media(max-width:768px){
  .hamburger{display:flex}
  .nav{display:none}
  .hero-content{max-width:80%;left:20px;right:20px}
  .slider-prev{left:-6px}.slider-next{right:-6px}
}
@media(max-width:480px){
  .hero-content{max-width:calc(100% - 40px)}
  .hero-arrow{width:36px;height:36px}
  .hero-synopsis{-webkit-line-clamp:2}
}

/* ANIMATIONS */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in-up{animation:fadeInUp 0.5s forwards}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header" id="header">
  <div class="header-left">
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="logo">ANI<span style="color:var(--pink)">VERSE</span></a>

<!-- SIDEBAR -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">

    Home
  </a>
  <a href="search.html?sort=bypopularity">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>

  </a>
  <a href="schedule.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Schedule
  </a>
  <a href="donate.html">

    Donate
  </a>
</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-wrap">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search anime..." autocomplete="off">
      <button class="search-close" id="searchClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="search-filters">
      <select class="filter-select" id="filterGenre">
        <option value="">All Genres</option>
        <option value="1">Action</option><option value="2">Adventure</option>
        <option value="4">Comedy</option><option value="8">Drama</option>
        <option value="10">Fantasy</option><option value="14">Horror</option>
        <option value="7">Mystery</option><option value="22">Romance</option>
        <option value="24">Sci-Fi</option><option value="36">Slice of Life</option>
        <option value="30">Sports</option><option value="37">Supernatural</option>
        <option value="41">Thriller</option>
      </select>
      <select class="filter-select" id="filterType">
        <option value="">All Types</option>
        <option value="tv">TV</option><option value="movie">Movie</option>
        <option value="ova">OVA</option><option value="ona">ONA</option>
        <option value="special">Special</option>
      </select>
      <select class="filter-select" id="filterStatus">
        <option value="">All Status</option>
        <option value="airing">Airing</option>
        <option value="complete">Completed</option>
        <option value="upcoming">Upcoming</option>

      <select class="filter-select" id="filterSort">
        <option value="bypopularity">Popularity</option>
        <option value="score">Score</option>
        <option value="rank">Rank</option>
        <option value="title">Title</option>
      </select>
    </div>
    <div class="search-results" id="searchResults">
      <div class="search-label">Trending Now</div>
    </div>
  </div>
</div>

<!-- HERO SLIDER -->
<section class="hero" id="hero">
  <div class="hero-slides" id="heroSlides">
    <div class="hero-slide active"><div class="skeleton skeleton-slide"></div></div>
  </div>
  <button class="hero-arrow hero-prev" id="heroPrev" aria-label="Previous">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
  </button>
  <button class="hero-arrow hero-next" id="heroNext" aria-label="Next">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
  </button>
  <div class="hero-nav" id="heroDots"></div>
</section>

<!-- HOMEPAGE SECTIONS -->
<main id="mainContent">
  <!-- Sections will be injected by JS -->
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-logo">ANI<span style="color:var(--pink)">VERSE</span></div>
    <div class="footer-social">
      <a class="social-btn" href="#" aria-label="Discord">

      </a>
      <a class="social-btn" href="#" aria-label="Twitter/X">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <a class="social-btn" href="#" aria-label="Telegram">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      </a>
    </div>
    <p class="footer-disclaimer">This site does not store any files on its server. All contents are provided by non-affiliated third parties.</p>
    <p class="footer-copy">© 2025 AniVerse. Made with ♥ for anime fans.</p>
  </div>
</footer>

<script>
// ===== CONFIG =====
const JIKAN = 'https://api.jikan.moe/v4';
const CACHE_TTL = 5 * 60 * 1000;
const cache = new Map();

// ===== CACHE =====
function getCache(key) {
  const item = cache.get(key);
  if (!item) return null;
  if (Date.now() - item.time > CACHE_TTL) { cache.delete(key); return null; }
  return item.data;
}
function setCache(key, data) { cache.set(key, { data, time: Date.now() }); }

// ===== FETCH WITH RETRY =====
async function apiFetch(url, retries = 3, delay = 800) {
  const cached = getCache(url);
  if (cached) return cached;
  for (let i = 0; i < retries; i++) {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 12000);
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      setCache(url, json);
      return json;
    } catch (e) {
      if (i < retries - 1) await new Promise(r => setTimeout(r, delay * (i + 1)));
    }
  }
  return null;
}

// ===== HEADER SCROLL =====
const header = document.getElementById('header');
window.addEventListener('scroll', () => {
  header.classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

// ===== SIDEBAR =====
const hamburgerBtn = document.getElementById('hamburgerBtn');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
function openSidebar() { sidebar.classList.add('active'); sidebarOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeSidebar() { sidebar.classList.remove('active'); sidebarOverlay.classList.remove('active'); document.body.style.overflow = ''; }
hamburgerBtn.addEventListener('click', openSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

// ===== SEARCH OVERLAY =====
const searchBtn = document.getElementById('searchBtn');
const searchOverlay = document.getElementById('searchOverlay');
const searchClose = document.getElementById('searchClose');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

let searchDebounce = null;
searchBtn.addEventListener('click', () => { searchOverlay.classList.add('active'); searchInput.focus(); document.body.style.overflow = 'hidden'; });
searchClose.addEventListener('click', closeSearch);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });
function closeSearch() { searchOverlay.classList.remove('active'); document.body.style.overflow = ''; }

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();
  if (!q) { loadTrendingSearch(); return; }
  searchDebounce = setTimeout(() => performSearch(q), 400);
});

// Filters trigger search
['filterGenre','filterType','filterStatus','filterSort'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    const q = searchInput.value.trim();
    if (q) performSearch(q); else loadTrendingSearch();
  });
});

async function performSearch(q) {
  const genre = document.getElementById('filterGenre').value;
  const type = document.getElementById('filterType').value;
  const status = document.getElementById('filterStatus').value;
  const sort = document.getElementById('filterSort').value;
  let url = `${JIKAN}/anime?q=${encodeURIComponent(q)}&order_by=${sort}&sort=desc&limit=20`;
  if (genre) url += `&genres=${genre}`;
  if (type) url += `&type=${type}`;
  if (status) url += `&status=${status}`;
  renderSearchSkeleton();
  const data = await apiFetch(url);
  renderSearchResults(data?.data || [], q);
}

async function loadTrendingSearch() {
  const data = await apiFetch(`${JIKAN}/top/anime?filter=bypopularity&limit=20`);
  renderSearchResults(data?.data || [], '');
}

function renderSearchSkeleton() {
  searchResults.innerHTML = '<div class="search-label">Searching...</div>' +
    Array(8).fill('<div class="skeleton skeleton-card" style="width:clamp(100px,14vw,140px)"></div>').join('');
}

function renderSearchResults(items, q) {
  if (!items.length) {
    searchResults.innerHTML = `<div class="search-label">No results for "${q}"</div>`;
    return;
  }
  searchResults.innerHTML = `<div class="search-label">${q ? 'Results for "'+q+'"' : 'Trending Now'}</div>`;
  items.forEach(a => {
    const card = document.createElement('a');
    card.className = 'anime-card';
    card.href = `anime.html?id=${a.mal_id}`;
    card.onclick = closeSearch;
    card.style.width = 'clamp(100px,14vw,140px)';
    card.innerHTML = `
      <div class="anime-card-img">
        <img src="${a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || ''}" alt="${escHtml(a.title)}" loading="lazy">
        <div class="anime-card-overlay"></div>
        <div class="card-badges">
          ${a.score ? `<span class="card-badge cb-score">★ ${a.score}</span>` : '<span></span>'}
          <span class="card-badge cb-hd">HD</span>
        </div>
      </div>
      <div class="anime-card-info">
        <div class="anime-card-title">${escHtml(a.title)}</div>
        <div class="anime-card-sub">${a.type || 'TV'} • ${a.episodes ? a.episodes+' ep' : 'Ongoing'}</div>
      </div>`;
    searchResults.appendChild(card);
  });
}

// ===== HERO SLIDER =====
let heroSlides = [], heroCurrent = 0, heroAuto = null, heroIsTransitioning = false;
const heroSlidesEl = document.getElementById('heroSlides');
const heroDotsEl = document.getElementById('heroDots');

async function initHero() {
  const data = await apiFetch(`${JIKAN}/top/anime?filter=airing&limit=15`);
  if (!data?.data?.length) { retryHero(); return; }
  heroSlides = data.data.slice(0, 12);
  renderHeroSlides();
}

function retryHero() {
  setTimeout(initHero, 3000);
}

function renderHeroSlides() {
  if (!heroSlides.length) return;
  heroSlidesEl.innerHTML = '';
  heroDotsEl.innerHTML = '';
  heroSlides.forEach((a, i) => {
    const img = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
    const genres = (a.genres || []).slice(0, 3).map(g => `<span class="badge badge-genre">${g.name}</span>`).join('');
    const synopsis = a.synopsis ? a.synopsis.replace(/\[Written by.*?\]/g, '').trim() : '';
    const slide = document.createElement('div');
    slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `
      <div class="hero-bg" style="background-image:url('${img}')"></div>
      <div class="hero-gradient"></div>
      <div class="hero-content">
        <div class="hero-badges">
          ${a.score ? `<span class="badge badge-score">★ ${a.score}</span>` : ''}
          <span class="badge badge-type">${a.type || 'TV'}</span>
          ${genres}
        </div>
        <h1 class="hero-title">${escHtml(a.title)}</h1>
        <p class="hero-synopsis">${escHtml(synopsis)}</p>
        <div class="hero-actions">
          <a href="watch.html?id=${a.mal_id}&ep=1" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            Watch Now
          </a>
          <a href="anime.html?id=${a.mal_id}" class="btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Details
          </a>
        </div>
      </div>`;
    heroSlidesEl.appendChild(slide);
    const dot = document.createElement('button');
    dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', `Slide ${i+1}`);
    dot.addEventListener('click', () => goToSlide(i));
    heroDotsEl.appendChild(dot);
  });
  startHeroAuto();
  initHeroDrag();
}

function goToSlide(index) {
  if (heroIsTransitioning || heroSlides.length === 0) return;
  heroIsTransitioning = true;
  const slides = heroSlidesEl.querySelectorAll('.hero-slide');
  const dots = heroDotsEl.querySelectorAll('.hero-dot');
  if (slides[heroCurrent]) slides[heroCurrent].classList.remove('active');
  if (dots[heroCurrent]) dots[heroCurrent].classList.remove('active');
  heroCurrent = (index + heroSlides.length) % heroSlides.length;
  heroSlidesEl.style.transform = `translateX(-${heroCurrent * 100}%)`;
  if (slides[heroCurrent]) slides[heroCurrent].classList.add('active');
  if (dots[heroCurrent]) dots[heroCurrent].classList.add('active');
  setTimeout(() => { heroIsTransitioning = false; }, 750);
}

function startHeroAuto() {
  clearInterval(heroAuto);
  heroAuto = setInterval(() => goToSlide(heroCurrent + 1), 6000);
}

document.getElementById('heroPrev').addEventListener('click', () => { goToSlide(heroCurrent - 1); startHeroAuto(); });
document.getElementById('heroNext').addEventListener('click', () => { goToSlide(heroCurrent + 1); startHeroAuto(); });

function initHeroDrag() {
  let startX = 0, isDragging = false;
  const el = heroSlidesEl;
  el.addEventListener('mousedown', e => { startX = e.clientX; isDragging = true; });
  el.addEventListener('mousemove', e => { if (!isDragging) return; e.preventDefault(); });
  el.addEventListener('mouseup', e => {
    if (!isDragging) return;
    const diff = e.clientX - startX;
    if (Math.abs(diff) > 50) { diff < 0 ? goToSlide(heroCurrent + 1) : goToSlide(heroCurrent - 1); startHeroAuto(); }
    isDragging = false;
  });
  el.addEventListener('mouseleave', () => { isDragging = false; });
  let touchStartX = 0;
  el.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  el.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(diff) > 50) { diff < 0 ? goToSlide(heroCurrent + 1) : goToSlide(heroCurrent - 1); startHeroAuto(); }
  }, { passive: true });
}

// ===== SLIDER ENGINE =====
function initSliderDrag(track) {
  if (!track || track._sliderInit) return;
  track._sliderInit = true;
  let isDown = false, startX = 0, scrollLeft = 0;
  track.addEventListener('mousedown', e => { isDown = true; track.classList.add('grabbing'); startX = e.pageX - track.offsetLeft; scrollLeft = track.scrollLeft; });
  track.addEventListener('mouseleave', () => { isDown = false; track.classList.remove('grabbing'); });
  track.addEventListener('mouseup', () => { isDown = false; track.classList.remove('grabbing'); });
  track.addEventListener('mousemove', e => { if (!isDown) return; e.preventDefault(); const x = e.pageX - track.offsetLeft; track.scrollLeft = scrollLeft - (x - startX) * 1.5; });
  let touchStart = 0, touchScrollLeft = 0;
  track.addEventListener('touchstart', e => { touchStart = e.touches[0].pageX; touchScrollLeft = track.scrollLeft; }, { passive: true });
  track.addEventListener('touchmove', e => { const x = e.touches[0].pageX; track.scrollLeft = touchScrollLeft - (x - touchStart) * 1.2; }, { passive: true });
  track.addEventListener('wheel', e => { if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) { e.preventDefault(); track.scrollLeft += e.deltaY * 2; } }, { passive: false });
}

function createSliderSection(title, items) {
  if (!items?.length) return null;
  const section = document.createElement('section');
  section.className = 'section';
  const trackId = 'track_' + Math.random().toString(36).slice(2);
  section.innerHTML = `
    <div class="section-header">
      <h2 class="section-title">${title}</h2>
      <a href="search.html" class="section-link">View All →</a>
    </div>
    <div class="slider-container">
      <button class="slider-arrow slider-prev" aria-label="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg></button>
      <div class="slider-track" id="${trackId}">
        ${items.map(a => createCardHTML(a)).join('')}
      </div>
      <button class="slider-arrow slider-next" aria-label="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg></button>
    </div>`;
  // Arrow logic after appended
  requestAnimationFrame(() => {
    const track = document.getElementById(trackId);
    if (!track) return;
    initSliderDrag(track);
    const prev = section.querySelector('.slider-prev');
    const next = section.querySelector('.slider-next');
    const scrollAmt = () => track.clientWidth * 0.8;
    prev.addEventListener('click', () => track.scrollBy({ left: -scrollAmt(), behavior: 'smooth' }));
    next.addEventListener('click', () => track.scrollBy({ left: scrollAmt(), behavior: 'smooth' }));
  });
  return section;
}

function createCardHTML(a) {
  const img = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
  const score = a.score ? `<span class="card-badge cb-score">★ ${a.score}</span>` : '';
  const ep = a.episodes ? `<span class="card-badge cb-ep">${a.episodes}ep</span>` : '';
  return `<a class="anime-card" href="anime.html?id=${a.mal_id}">
    <div class="anime-card-img">
      <img src="${img}" alt="${escHtml(a.title)}" loading="lazy">
      <div class="anime-card-overlay"></div>
      <div class="card-badges">${score}<span class="card-badge cb-hd">HD</span></div>
      ${ep ? `<div class="card-type">${ep}</div>` : ''}
    </div>
    <div class="anime-card-info">
      <div class="anime-card-title">${escHtml(a.title)}</div>
      <div class="anime-card-sub">${a.type || 'TV'}${a.year ? ' • '+a.year : ''}</div>
    </div>
  </a>`;
}

function createSkeletonSection(title) {
  const section = document.createElement('section');
  section.className = 'section';
  section.innerHTML = `
    <div class="section-header"><h2 class="section-title">${title}</h2></div>
    <div style="display:flex;gap:12px;overflow:hidden">
      ${Array(8).fill('<div class="skeleton skeleton-card"></div>').join('')}
    </div>`;
  return section;
}

// ===== HOMEPAGE DATA =====
const SECTIONS = [
  { title: 'Recently Updated', url: `${JIKAN}/top/anime?filter=airing&limit=20`, key: 'recently' },
  { title: 'Trending Now', url: `${JIKAN}/top/anime?filter=bypopularity&limit=20`, key: 'trending' },
  { title: 'Top Airing', url: `${JIKAN}/top/anime?filter=airing&limit=20&page=2`, key: 'airing' },
  { title: 'Top Rated', url: `${JIKAN}/top/anime?limit=20`, key: 'rated' },
  { title: 'Latest Movies', url: `${JIKAN}/top/anime?type=movie&limit=20`, key: 'movies' },
  { title: 'Completed', url: `${JIKAN}/top/anime?filter=complete&limit=20`, key: 'completed' },
  { title: 'Upcoming', url: `${JIKAN}/top/anime?filter=upcoming&limit=20`, key: 'upcoming' },
];

async function loadHomeSections() {
  const main = document.getElementById('mainContent');
  // Show skeletons first
  const skeletons = SECTIONS.map(s => { const el = createSkeletonSection(s.title); main.appendChild(el); return el; });
  // Fetch in batches to avoid rate limit
  for (let i = 0; i < SECTIONS.length; i++) {
    const s = SECTIONS[i];
    const data = await apiFetch(s.url);
    if (data?.data?.length) {
      const newSection = createSliderSection(s.title, data.data);
      if (newSection && skeletons[i] && main.contains(skeletons[i])) {
        main.replaceChild(newSection, skeletons[i]);
      }
    }
    if (i < SECTIONS.length - 1) await new Promise(r => setTimeout(r, 350));
  }
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
(async () => {
  initHero();
  loadTrendingSearch();
  loadHomeSections();
})();
</script>
