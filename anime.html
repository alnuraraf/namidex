<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Anime details on MyAniDex. Watch episodes, view synopsis, characters, and recommendations.">
<title>Anime Details - MyAniDex</title>
<style>
  :root {
    --bg: #030305; --surface: rgba(20,20,30,0.6); --surface-solid: #12121a;
    --accent: #8b5cf6; --accent-glow: rgba(139,92,246,0.4); --accent-light: #a78bfa;
    --text: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
    --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
    --radius: 16px; --radius-sm: 10px; --transition: cubic-bezier(0.4,0,0.2,1);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { overflow-x:hidden; max-width:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; line-height:1.5; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(139,92,246,0.3); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(139,92,246,0.5); }

  .header {
    position:fixed; top:0; left:0; right:0; z-index:1000; height:64px; display:flex; align-items:center; justify-content:space-between;
    padding:0 clamp(16px,4vw,48px); background:rgba(3,3,5,0.8); backdrop-filter:blur(20px); border-bottom:1px solid rgba(139,92,246,0.1);
  }
  .header-left,.header-right { display:flex; align-items:center; gap:16px; }
  .hamburger { width:40px; height:40px; border-radius:var(--radius-sm); border:1px solid rgba(139,92,246,0.2); background:var(--surface); display:flex; flex-direction:column; justify-content:center; align-items:center; gap:5px; cursor:pointer; transition:all 0.3s; }
  .hamburger:hover { border-color:var(--accent); box-shadow:0 0 15px var(--accent-glow); }
  .hamburger span { width:20px; height:2px; background:var(--text); border-radius:2px; transition:all 0.3s; }
  .hamburger.active span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
  .hamburger.active span:nth-child(2) { opacity:0; }
  .hamburger.active span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }
  .logo { font-size:clamp(20px,3vw,28px); font-weight:800; letter-spacing:-0.5px; background:linear-gradient(135deg,var(--accent-light),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-decoration:none; display:flex; align-items:center; gap:8px; }
  .logo svg { width:32px; height:32px; fill:var(--accent); }
  .nav-desktop { display:none; }
  @media(min-width:768px){ .nav-desktop { display:flex; gap:8px; } .hamburger { display:none; } }
  .nav-desktop a { padding:8px 16px; border-radius:var(--radius-sm); color:var(--text-secondary); text-decoration:none; font-weight:500; font-size:14px; transition:all 0.3s; }
  .nav-desktop a:hover,.nav-desktop a.active { color:var(--text); background:rgba(139,92,246,0.1); }
  .search-btn { width:40px; height:40px; border-radius:50%; border:1px solid rgba(139,92,246,0.2); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text); transition:all 0.3s; }
  .search-btn:hover { background:var(--accent); border-color:var(--accent); box-shadow:0 0 20px var(--accent-glow); }
  .search-btn svg { width:18px; height:18px; }

  .sidebar-overlay { position:fixed; inset:0; z-index:999; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity 0.4s; }
  .sidebar-overlay.active { opacity:1; pointer-events:all; }
  .sidebar { position:fixed; top:0; left:0; bottom:0; width:min(320px,85vw); z-index:1001; background:linear-gradient(180deg,#0a0a12 0%,#07070d 100%); border-right:1px solid rgba(139,92,246,0.15); transform:translateX(-100%); transition:transform 0.4s; display:flex; flex-direction:column; padding:80px 24px 24px; gap:8px; }
  .sidebar.active { transform:translateX(0); }
  .sidebar a { padding:14px 16px; border-radius:var(--radius-sm); color:var(--text-secondary); text-decoration:none; font-weight:500; display:flex; align-items:center; gap:12px; transition:all 0.3s; }
  .sidebar a:hover,.sidebar a.active { background:rgba(139,92,246,0.1); color:var(--text); }
  .sidebar a svg { width:22px; height:22px; opacity:0.7; }

  .search-overlay { position:fixed; inset:0; z-index:2000; background:rgba(3,3,5,0.97); backdrop-filter:blur(30px); opacity:0; pointer-events:none; transition:opacity 0.4s; display:flex; flex-direction:column; padding:clamp(16px,4vw,48px); overflow:hidden; }
  .search-overlay.active { opacity:1; pointer-events:all; }
  .search-header { display:flex; align-items:center; gap:16px; margin-bottom:24px; flex-shrink:0; }
  .search-input-wrap { flex:1; position:relative; }
  .search-input { width:100%; padding:16px 24px 16px 52px; border-radius:var(--radius); border:1px solid rgba(139,92,246,0.2); background:var(--surface); color:var(--text); font-size:16px; outline:none; transition:all 0.3s; }
  .search-input:focus { border-color:var(--accent); box-shadow:0 0 20px rgba(139,92,246,0.15); }
  .search-input-wrap svg { position:absolute; left:18px; top:50%; transform:translateY(-50%); width:20px; height:20px; color:var(--text-muted); }
  .search-close { width:44px; height:44px; border-radius:50%; border:1px solid rgba(139,92,246,0.2); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text); transition:all 0.3s; flex-shrink:0; }
  .search-close:hover { background:var(--danger); border-color:var(--danger); }
  .search-results { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:16px; padding-bottom:24px; }

  /* Anime Banner */
  .anime-banner { position:relative; width:100%; height:clamp(300px,50vh,500px); margin-top:64px; overflow:hidden; }
  .anime-banner-bg { position:absolute; inset:0; background-size:cover; background-position:center 20%; filter:blur(30px) brightness(0.4); transform:scale(1.1); }
  .anime-banner-overlay { position:absolute; inset:0; background:linear-gradient(180deg, rgba(3,3,5,0.3) 0%, var(--bg) 100%); }
  .anime-banner-content { position:absolute; bottom:0; left:0; right:0; padding:clamp(24px,5vw,60px); display:flex; gap:clamp(20px,3vw,40px); align-items:flex-end; max-width:1200px; margin:0 auto; }
  .anime-poster { flex-shrink:0; width:clamp(140px,22vw,220px); aspect-ratio:2/3; border-radius:var(--radius); overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.6); border:2px solid rgba(139,92,246,0.2); position:relative; z-index:2; }
  .anime-poster img { width:100%; height:100%; object-fit:cover; }
  .anime-details { flex:1; min-width:0; padding-bottom:8px; }
  .anime-title { font-size:clamp(24px,4vw,42px); font-weight:800; line-height:1.1; margin-bottom:12px; }
  .anime-meta { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px; color:var(--text-secondary); font-size:14px; }
  .anime-meta .dot { width:4px; height:4px; border-radius:50%; background:var(--text-muted); }
  .anime-meta .score { color:var(--warning); font-weight:700; }
  .anime-actions { display:flex; gap:12px; flex-wrap:wrap; }
  .btn { padding:12px 28px; border-radius:var(--radius-sm); font-weight:700; font-size:14px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; text-decoration:none; transition:all 0.3s; border:none; }
  .btn-primary { background:var(--accent); color:white; box-shadow:0 4px 20px rgba(139,92,246,0.3); }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(139,92,246,0.5); }
  .btn-secondary { background:rgba(255,255,255,0.1); color:var(--text); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); }
  .btn-secondary:hover { background:rgba(255,255,255,0.15); }
  .btn-trailer { background:rgba(239,68,68,0.15); color:var(--danger); border:1px solid rgba(239,68,68,0.3); }
  .btn-trailer:hover { background:rgba(239,68,68,0.25); }

  @media(max-width:640px){
    .anime-banner-content { flex-direction:column; align-items:flex-start; }
    .anime-poster { width:120px; }
    .anime-details { width:100%; }
  }

  /* Tabs */
  .tabs { display:flex; gap:4px; border-bottom:1px solid rgba(139,92,246,0.1); margin-bottom:24px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { padding:12px 20px; border-radius:var(--radius-sm) var(--radius-sm) 0 0; color:var(--text-muted); font-weight:600; font-size:14px; cursor:pointer; transition:all 0.3s; white-space:nowrap; border:none; background:transparent; }
  .tab:hover { color:var(--text); background:rgba(139,92,246,0.05); }
  .tab.active { color:var(--accent); background:rgba(139,92,246,0.1); box-shadow:inset 0 -2px 0 var(--accent); }

  /* Content Sections */
  .section { padding:24px clamp(16px,4vw,48px); max-width:1200px; margin:0 auto; }
  .tab-panel { display:none; animation:fadeIn 0.4s; }
  .tab-panel.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .synopsis { font-size:15px; line-height:1.8; color:var(--text-secondary); max-width:800px; }
  .genres { display:flex; gap:8px; flex-wrap:wrap; margin-top:16px; }
  .genre-tag { padding:6px 14px; border-radius:20px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); color:var(--accent-light); font-size:13px; font-weight:500; }

  .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-top:24px; }
  .info-card { padding:16px; border-radius:var(--radius-sm); background:var(--surface); border:1px solid rgba(139,92,246,0.1); }
  .info-label { font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .info-value { font-size:14px; font-weight:600; }

  /* Episodes */
  .episodes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:10px; }
  .ep-btn { padding:12px; border-radius:var(--radius-sm); background:var(--surface); border:1px solid rgba(139,92,246,0.15); color:var(--text); font-weight:700; cursor:pointer; transition:all 0.3s; text-align:center; text-decoration:none; font-size:13px; }
  .ep-btn:hover { background:var(--accent); border-color:var(--accent); transform:translateY(-2px); }
  .ep-btn.watched { opacity:0.5; }

  /* Characters */
  .char-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:16px; }
  .char-card { text-align:center; }
  .char-img { width:100%; aspect-ratio:1; border-radius:50%; overflow:hidden; border:2px solid rgba(139,92,246,0.2); margin-bottom:8px; background:var(--surface-solid); }
  .char-img img { width:100%; height:100%; object-fit:cover; }
  .char-name { font-size:13px; font-weight:600; }
  .char-role { font-size:11px; color:var(--text-muted); margin-top:2px; }

  /* Recommendations */
  .rec-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:16px; }
  .rec-card { cursor:pointer; transition:transform 0.3s; }
  .rec-card:hover { transform:translateY(-4px); }
  .rec-img { aspect-ratio:2/3; border-radius:var(--radius-sm); overflow:hidden; background:var(--surface-solid); }
  .rec-img img { width:100%; height:100%; object-fit:cover; }
  .rec-title { font-size:13px; font-weight:600; margin-top:8px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  /* Relations */
  .rel-list { display:flex; flex-direction:column; gap:12px; }
  .rel-item { display:flex; gap:16px; align-items:center; padding:12px; border-radius:var(--radius-sm); background:var(--surface); border:1px solid rgba(139,92,246,0.1); transition:all 0.3s; cursor:pointer; }
  .rel-item:hover { border-color:rgba(139,92,246,0.3); transform:translateX(4px); }
  .rel-img { width:60px; height:80px; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--surface-solid); }
  .rel-img img { width:100%; height:100%; object-fit:cover; }
  .rel-info { flex:1; min-width:0; }
  .rel-type { font-size:11px; color:var(--accent-light); text-transform:uppercase; font-weight:700; margin-bottom:2px; }
  .rel-title { font-size:14px; font-weight:600; }

  /* Trailer Modal */
  .modal-overlay { position:fixed; inset:0; z-index:3000; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); display:none; align-items:center; justify-content:center; padding:24px; }
  .modal-overlay.active { display:flex; }
  .modal-box { width:100%; max-width:900px; aspect-ratio:16/9; background:#000; border-radius:var(--radius); overflow:hidden; position:relative; border:1px solid rgba(139,92,246,0.2); }
  .modal-box iframe { width:100%; height:100%; border:none; }
  .modal-close { position:absolute; top:-40px; right:0; width:36px; height:36px; border-radius:50%; background:var(--surface); border:1px solid rgba(139,92,246,0.2); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .modal-close:hover { background:var(--danger); border-color:var(--danger); }

  /* Skeleton */
  .skeleton { background:linear-gradient(90deg,#1a1a2e 25%,#252540 50%,#1a1a2e 75%); background-size:200% 100%; animation:skeleton 1.5s infinite; border-radius:var(--radius-sm); }
  @keyframes skeleton { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .toast-container { position:fixed; bottom:24px; right:24px; z-index:3000; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
  .toast { padding:12px 20px; border-radius:var(--radius-sm); background:var(--surface-solid); border:1px solid rgba(139,92,246,0.2); color:var(--text); font-size:13px; font-weight:500; box-shadow:0 10px 30px rgba(0,0,0,0.5); transform:translateX(120%); transition:transform 0.4s; pointer-events:all; max-width:320px; }
  .toast.show { transform:translateX(0); }
  .toast.error { border-color:rgba(239,68,68,0.4); }

  .footer { padding:40px clamp(16px,4vw,48px); border-top:1px solid rgba(139,92,246,0.1); text-align:center; color:var(--text-muted); font-size:13px; }
  .footer-links { display:flex; justify-content:center; gap:20px; margin-bottom:16px; flex-wrap:wrap; }
  .footer-links a { color:var(--text-secondary); text-decoration:none; transition:color 0.3s; }
  .footer-links a:hover { color:var(--accent); }
  .socials { display:flex; justify-content:center; gap:16px; margin-bottom:16px; }
  .socials a { width:36px; height:36px; border-radius:50%; border:1px solid rgba(139,92,246,0.2); display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:all 0.3s; }
  .socials a:hover { background:var(--accent); border-color:var(--accent); color:white; }

  @media(max-width:480px){ .section { padding:16px; } .info-grid { grid-template-columns:1fr; } .char-grid { grid-template-columns:repeat(3,1fr); } }
</style>

<div class="toast-container" id="toastContainer"></div>

<script>
(function(){
  'use strict';
  const API_BASE = 'https://api.jikan.moe/v4';
  const CACHE_TTL = 1000*60*15;
  const $ = (sel,el=document)=>el.querySelector(sel);
  const $$ = (sel,el=document)=>[...el.querySelectorAll(sel)];
  const wait = ms=>new Promise(r=>setTimeout(r,ms));

  function showToast(msg,type='info'){
    const container=$('#toastContainer');
    const toast=document.createElement('div');
    toast.className=`toast ${type}`; toast.textContent=msg;
    container.appendChild(toast);
    requestAnimationFrame(()=>toast.classList.add('show'));
    setTimeout(()=>{toast.classList.remove('show');setTimeout(()=>toast.remove(),400);},3000);
  }

  async function fetchWithRetry(url,retries=3,timeout=10000){
    const key='cache_'+btoa(url);
    const cached=localStorage.getItem(key);
    if(cached){const{data,ts}=JSON.parse(cached);if(Date.now()-ts<CACHE_TTL)return data;}
    for(let i=0;i<retries;i++){
      try{
        const controller=new AbortController();
        const id=setTimeout(()=>controller.abort(),timeout);
        const res=await fetch(url,{signal:controller.signal});
        clearTimeout(id);
        if(!res.ok) throw new Error('HTTP '+res.status);
        const data=await res.json();
        localStorage.setItem(key,JSON.stringify({data,ts:Date.now()}));
        return data;
      }catch(e){if(i===retries-1) throw e; await wait(1000*(i+1));}
    }
  }

  function escapeHtml(str){if(!str)return'';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  const urlParams = new URLSearchParams(window.location.search);
  const animeId = urlParams.get('id');
  if (!animeId) { window.location.href = 'index.html'; return; }

  let animeData = null;

  // Header scroll
  window.addEventListener('scroll',()=>{$('#header').classList.toggle('scrolled',window.scrollY>20);},{passive:true});

  // Sidebar
  const hamburger=$('#hamburger');
  function toggleSidebar(){
    const active=hamburger.classList.toggle('active');
    $('#sidebar').classList.toggle('active',active);
    $('#sidebarOverlay').classList.toggle('active',active);
    $('#sidebar').setAttribute('aria-hidden',!active);
  }
  hamburger.addEventListener('click',toggleSidebar);
  $('#sidebarOverlay').addEventListener('click',toggleSidebar);
  document.addEventListener('keydown',e=>{if(e.key==='Escape' && $('#sidebar').classList.contains('active')) toggleSidebar();});

  // Search
  function openSearch(){$('#searchOverlay').classList.add('active');document.body.style.overflow='hidden';setTimeout(()=>$('#searchInput').focus(),100);}
  function closeSearch(){$('#searchOverlay').classList.remove('active');document.body.style.overflow='';$('#searchInput').value='';$('#searchResults').innerHTML='';}
  $('#searchBtn').addEventListener('click',openSearch);
  $('#searchClose').addEventListener('click',closeSearch);
  document.addEventListener('keydown',e=>{if(e.key==='/' && !$('#searchOverlay').classList.contains('active')){e.preventDefault();openSearch();}if(e.key==='Escape' && $('#searchOverlay').classList.contains('active'))closeSearch();});

  let searchAbort=null;
  async function doSearch(query=''){
    $('#searchResults').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">Searching...</div>';
    try{
      let url=`${API_BASE}/anime?q=${encodeURIComponent(query)}&limit=24`;
      if(searchAbort) searchAbort.abort();
      searchAbort=new AbortController();
      const res=await fetch(url,{signal:searchAbort.signal});
      const data=await res.json();
      if(!data.data||!data.data.length){$('#searchResults').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">No results.</div>';return;}
      $('#searchResults').innerHTML=data.data.map(a=>{
        const img=a.images?.webp?.large_image_url||a.images?.jpg?.large_image_url||'';
        return `<div class="rec-card" onclick="location.href='anime.html?id=${a.mal_id}'"><div class="rec-img"><img src="${escapeHtml(img)}" alt="${escapeHtml(a.title)}" loading="lazy"></div><div class="rec-title">${escapeHtml(a.title)}</div></div>`;
      }).join('');
    }catch(e){if(e.name!=='AbortError'){$('#searchResults').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--danger);">Search failed.</div>';}}
  }
  const debounce=(fn,ms)=>{let t;return(...args)=>{clearTimeout(t);t=setTimeout(()=>fn(...args),ms);}};
  $('#searchInput').addEventListener('input',debounce(()=>doSearch($('#searchInput').value.trim()),400));

  // Tabs
  $$('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      $$('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      $$('.tab-panel').forEach(p=>p.classList.remove('active'));
      $(`#panel-${tab.dataset.tab}`).classList.add('active');
    });
  });

  // Trailer modal
  $('#modalClose').addEventListener('click',()=>{
    $('#trailerModal').classList.remove('active');
    $('#modalBox').innerHTML='';
  });
  $('#trailerModal').addEventListener('click',e=>{if(e.target===$('#trailerModal')){$('#trailerModal').classList.remove('active');$('#modalBox').innerHTML='';}});

  async function loadAnime() {
    try {
      const data = await fetchWithRetry(`${API_BASE}/anime/${animeId}/full`);
      animeData = data.data;
      renderAnime(animeData);
    } catch (e) {
      showToast('Failed to load anime details', 'error');
      $('#animeTitle').textContent = 'Error loading anime';
    }
  }

  function renderAnime(a) {
    const img = a.images?.webp?.large_image_url || a.images?.jpg?.large_image_url || '';
    $('#bannerBg').style.backgroundImage = `url('${escapeHtml(img)}')`;
    $('#animePoster').innerHTML = `<img src="${escapeHtml(img)}" alt="${escapeHtml(a.title)}">`;
    $('#animeTitle').textContent = a.title;

    const meta = [];
    if (a.score) meta.push(`<span class="score">★ ${a.score}</span>`);
    if (a.type) meta.push(a.type);
    if (a.episodes) meta.push(`${a.episodes} Episodes`);
    if (a.duration && a.duration !== 'Unknown') meta.push(a.duration);
    if (a.status) meta.push(a.status);
    if (a.rating) meta.push(a.rating);
    if (a.aired?.from) meta.push(new Date(a.aired.from).getFullYear());
    $('#animeMeta').innerHTML = meta.join('<span class="dot"></span>');

    const trailerUrl = a.trailer?.embed_url || a.trailer?.url || '';
    $('#animeActions').innerHTML = `
      <a href="watch.html?id=${a.mal_id}&ep=1" class="btn btn-primary"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Watch Now</a>
      ${trailerUrl ? `<button class="btn btn-trailer" id="trailerBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Trailer</button>` : ''}
      <a href="search.html?type=${a.type}" class="btn btn-secondary">${a.type || 'Anime'}</a>
    `;

    if (trailerUrl) {
      $('#trailerBtn').addEventListener('click', () => {
        $('#modalBox').innerHTML = `<iframe src="${escapeHtml(trailerUrl)}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        $('#trailerModal').classList.add('active');
      });
    }

    $('#synopsis').textContent = a.synopsis || 'No synopsis available.';
    $('#genres').innerHTML = (a.genres || []).map(g => `<span class="genre-tag">${escapeHtml(g.name)}</span>`).join('');

    const info = [
      {label:'Status', value:a.status},
      {label:'Aired', value:a.aired?.string || 'Unknown'},
      {label:'Season', value:a.season ? `${a.season.charAt(0).toUpperCase()+a.season.slice(1)} ${a.year||''}` : 'Unknown'},
      {label:'Studio', value:(a.studios||[]).map(s=>s.name).join(', ') || 'Unknown'},
      {label:'Source', value:a.source || 'Unknown'},
      {label:'Rating', value:a.rating || 'Unknown'},
      {label:'Rank', value:a.rank ? `#${a.rank}` : 'N/A'},
      {label:'Popularity', value:a.popularity ? `#${a.popularity}` : 'N/A'},
      {label:'Members', value:a.members ? a.members.toLocaleString() : 'N/A'},
      {label:'Favorites', value:a.favorites ? a.favorites.toLocaleString() : 'N/A'},
    ];
    $('#infoGrid').innerHTML = info.map(i=>`<div class="info-card"><div class="info-label">${i.label}</div><div class="info-value">${escapeHtml(i.value)}</div></div>`).join('');

    // Episodes
    const eps = a.episodes || 12;
    $('#episodesGrid').innerHTML = Array.from({length: Math.min(eps, 100)}, (_,i) => {
      const ep = i+1;
      return `<a href="watch.html?id=${a.mal_id}&ep=${ep}" class="ep-btn">EP ${ep}</a>`;
    }).join('');
  }

  async function loadCharacters() {
    try {
      const data = await fetchWithRetry(`${API_BASE}/anime/${animeId}/characters`);
      const chars = data.data || [];
      if (!chars.length) { $('#charGrid').innerHTML = '<div style="color:var(--text-muted);">No character data available.</div>'; return; }
      $('#charGrid').innerHTML = chars.slice(0, 24).map(c => {
        const ch = c.character;
        const img = ch.images?.webp?.image_url || ch.images?.jpg?.image_url || '';
        return `<div class="char-card"><div class="char-img"><img src="${escapeHtml(img)}" alt="${escapeHtml(ch.name)}" loading="lazy"></div><div class="char-name">${escapeHtml(ch.name)}</div><div class="char-role">${c.role}</div></div>`;
      }).join('');
    } catch (e) { $('#charGrid').innerHTML = '<div style="color:var(--text-muted);">Failed to load characters.</div>'; }
  }

  async function loadRelations() {
    try {
      const data = await fetchWithRetry(`${API_BASE}/anime/${animeId}/relations`);
      const rels = data.data || [];
      if (!rels.length) { $('#relList').innerHTML = '<div style="color:var(--text-muted);">No relations found.</div>'; return; }
      $('#relList').innerHTML = rels.map(r => {
        const entry = r.entry[0];
        if (!entry) return '';
        return `<div class="rel-item" onclick="location.href='anime.html?id=${entry.mal_id}'"><div class="rel-info"><div class="rel-type">${escapeHtml(r.relation)}</div><div class="rel-title">${escapeHtml(entry.name)}</div></div></div>`;
      }).join('');
    } catch (e) { $('#relList').innerHTML = '<div style="color:var(--text-muted);">Failed to load relations.</div>'; }
  }

  async function loadRecommendations() {
    try {
      const data = await fetchWithRetry(`${API_BASE}/anime/${animeId}/recommendations`);
      const recs = data.data || [];
      if (!recs.length) { $('#recGrid').innerHTML = '<div style="color:var(--text-muted);">No recommendations yet.</div>'; return; }
      $('#recGrid').innerHTML = recs.slice(0, 12).map(r => {
        const entry = r.entry;
        const img = entry.images?.webp?.large_image_url || entry.images?.jpg?.large_image_url || '';
        return `<div class="rec-card" onclick="location.href='anime.html?id=${entry.mal_id}'"><div class="rec-img"><img src="${escapeHtml(img)}" alt="${escapeHtml(entry.title)}" loading="lazy"></div><div class="rec-title">${escapeHtml(entry.title)}</div></div>`;
      }).join('');
    } catch (e) { $('#recGrid').innerHTML = '<div style="color:var(--text-muted);">Failed to load recommendations.</div>'; }
  }

  loadAnime().then(() => {
    loadCharacters();
    loadRelations();
    loadRecommendations();
  });

})();
</script>
