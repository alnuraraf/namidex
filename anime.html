<style>
:root{--bg:#05050a;--bg2:#0a0a14;--bg3:#0f0f1e;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--border2:rgba(150,100,255,0.25);--purple:#8b5cf6;--purple2:#a78bfa;--purple3:#c4b5fd;--pink:#ec4899;--cyan:#06b6d4;--text:#f8fafc;--text2:#94a3b8;--text3:#64748b;--gold:#fbbf24;--green:#22c55e;--red:#ef4444;--header-h:64px;--radius:12px;--radius2:8px;--shadow:0 8px 32px rgba(0,0,0,0.6);--glow:0 0 24px rgba(139,92,246,0.35);--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.6;scroll-behavior:smooth}
html{scrollbar-width:thin;scrollbar-color:var(--purple) var(--bg2)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px}
img{max-width:100%;height:auto;display:block}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(5,5,10,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:background var(--transition)}
#header.scrolled{background:rgba(5,5,10,0.97)}
.h-left,.h-right{display:flex;align-items:center;gap:12px;flex:1}
.h-right{justify-content:flex-end}
.h-center{flex:2;display:flex;justify-content:center;align-items:center}
.logo-img{height:38px;width:auto;object-fit:contain;filter:drop-shadow(0 0 12px rgba(139,92,246,0.5))}
.icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);transition:all var(--transition)}
.icon-btn:hover{background:var(--border2);border-color:var(--purple);box-shadow:var(--glow)}
.icon-btn svg{width:20px;height:20px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.desktop-nav{display:flex;align-items:center;gap:4px}
.desktop-nav a{padding:8px 16px;border-radius:var(--radius2);font-size:0.9rem;font-weight:500;color:var(--text2);transition:all var(--transition)}
.desktop-nav a:hover{color:var(--text);background:var(--surface2)}
@media(max-width:768px){.desktop-nav{display:none}}
/* SIDEBAR */
#sidebar-overlay{position:fixed;inset:0;z-index:1500;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity var(--transition)}
#sidebar-overlay.open{opacity:1;pointer-events:all}
#sidebar{position:fixed;top:0;left:0;bottom:0;z-index:1501;width:280px;background:var(--bg3);border-right:1px solid var(--border2);transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;display:flex;flex-direction:column}
#sidebar.open{transform:translateX(0)}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border)}
.sidebar-logo{height:32px}
.sidebar-close{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);transition:all var(--transition)}
.sidebar-close:hover{background:var(--red);color:#fff}
.sidebar-nav{padding:16px 12px;flex:1}
.sidebar-nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius2);color:var(--text2);transition:all var(--transition);font-size:0.95rem;margin-bottom:4px}
.sidebar-nav a:hover,.sidebar-nav a.active{color:var(--text);background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(139,92,246,0.05));border-left:2px solid var(--purple)}
.sidebar-nav a svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
/* SEARCH OVERLAY */
#search-overlay{position:fixed;inset:0;z-index:2000;background:rgba(5,5,10,0.97);backdrop-filter:blur(20px);display:none;flex-direction:column;opacity:0;transition:opacity var(--transition)}
#search-overlay.active{display:flex;opacity:1}
.search-header{display:flex;align-items:center;gap:16px;padding:20px 24px;border-bottom:1px solid var(--border)}
#search-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 20px;font-size:1.1rem;color:var(--text);outline:none;transition:all var(--transition)}
#search-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.15)}
#search-input::placeholder{color:var(--text3)}
.search-close{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);flex-shrink:0;transition:all var(--transition)}
.search-close:hover{background:var(--red);border-color:var(--red)}
#search-results{flex:1;overflow-y:auto;padding:20px 24px}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
.search-loading,.search-empty{text-align:center;padding:40px;color:var(--text3)}
/* BANNER */
.detail-banner{position:relative;height:420px;overflow:hidden;margin-top:var(--header-h)}
.banner-img{width:100%;height:100%;object-fit:cover;object-position:center top}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(5,5,10,0.95) 0%,rgba(5,5,10,0.7) 40%,rgba(5,5,10,0.3) 100%),linear-gradient(to top,var(--bg) 0%,transparent 40%)}
@media(max-width:768px){.detail-banner{height:260px}}
/* DETAIL LAYOUT */
.detail-container{max-width:1200px;margin:0 auto;padding:0 24px}
.detail-main{display:grid;grid-template-columns:220px 1fr;gap:32px;margin-top:-120px;position:relative;z-index:10}
@media(max-width:900px){.detail-main{grid-template-columns:160px 1fr;gap:20px;margin-top:-80px}}
@media(max-width:600px){.detail-main{grid-template-columns:1fr;margin-top:-40px}}
.detail-poster{border-radius:var(--radius);overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,0.7),var(--glow);flex-shrink:0;border:2px solid var(--border2)}
.detail-poster img{width:100%;aspect-ratio:2/3;object-fit:cover}
@media(max-width:600px){.detail-poster{width:140px;margin:0 auto}}
.detail-info{padding-top:20px}
.detail-title{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:800;line-height:1.2;margin-bottom:8px;text-shadow:0 2px 20px rgba(0,0,0,0.5)}
.detail-alt{font-size:0.95rem;color:var(--text2);margin-bottom:16px}
.detail-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.dbadge{padding:5px 12px;border-radius:20px;font-size:0.8rem;font-weight:600;border:1px solid}
.dbadge-format{background:rgba(139,92,246,0.2);border-color:rgba(139,92,246,0.4);color:var(--purple3)}
.dbadge-status-airing{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.4);color:#86efac}
.dbadge-status-finished{background:rgba(6,182,212,0.15);border-color:rgba(6,182,212,0.4);color:#67e8f9}
.dbadge-status-upcoming{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.4);color:var(--gold)}
.detail-stats{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:20px}
.stat{display:flex;flex-direction:column;gap:4px}
.stat-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.stat-value{font-size:1rem;font-weight:700;color:var(--text)}
.stat-value.gold{color:var(--gold)}
.stat-value.purple{color:var(--purple3)}
.detail-actions{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:var(--radius);font-weight:600;font-size:0.9rem;transition:all var(--transition);cursor:pointer;border:none;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--purple),#6d28d9);color:#fff;box-shadow:0 4px 20px rgba(139,92,246,0.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(139,92,246,0.55)}
.btn-secondary{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid rgba(255,255,255,0.15)}
.btn-secondary:hover{background:rgba(255,255,255,0.15);transform:translateY(-2px)}
.btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* TABS */
.detail-tabs{border-bottom:1px solid var(--border);display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;margin-bottom:28px;padding:0 24px}
.detail-tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:12px 20px;border-radius:var(--radius2) var(--radius2) 0 0;font-size:0.9rem;font-weight:600;color:var(--text2);transition:all var(--transition);white-space:nowrap;position:relative;background:none;border:none;cursor:pointer}
.tab-btn:hover{color:var(--text);background:var(--surface)}
.tab-btn.active{color:var(--purple3)}
.tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:2px 2px 0 0}
.tab-content{display:none;padding:0 24px}
.tab-content.active{display:block}
/* SYNOPSIS */
.synopsis{font-size:0.95rem;color:var(--text2);line-height:1.8;max-width:800px}
.synopsis a{color:var(--purple3)}
/* GENRES/TAGS */
.pill-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.pill{padding:6px 14px;border-radius:20px;font-size:0.82rem;font-weight:500;cursor:pointer;transition:all var(--transition);border:1px solid;text-decoration:none;display:inline-block}
.pill-genre{background:rgba(139,92,246,0.12);border-color:rgba(139,92,246,0.3);color:var(--purple3)}
.pill-genre:hover{background:rgba(139,92,246,0.25);border-color:var(--purple)}
.pill-tag{background:var(--surface);border-color:var(--border);color:var(--text2)}
.pill-tag:hover{background:var(--surface2);border-color:var(--border2)}
/* EPISODES */
.ep-controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.ep-info{font-size:0.9rem;color:var(--text2)}
.ep-search{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius2);padding:8px 14px;color:var(--text);font-size:0.9rem;outline:none;width:160px;transition:all var(--transition)}
.ep-search:focus{border-color:var(--purple)}
.ep-search::placeholder{color:var(--text3)}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:8px;max-height:360px;overflow-y:auto;padding-right:4px}
.ep-btn{padding:10px 8px;border-radius:var(--radius2);background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:0.85rem;font-weight:600;transition:all var(--transition);cursor:pointer;text-align:center}
.ep-btn:hover,.ep-btn:focus{background:rgba(139,92,246,0.2);border-color:var(--purple);color:var(--purple3)}
.ep-btn.current{background:linear-gradient(135deg,var(--purple),#6d28d9);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(139,92,246,0.4)}
/* CHARACTERS */
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.char-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all var(--transition)}
.char-card:hover{transform:translateY(-4px);border-color:var(--border2);box-shadow:var(--shadow)}
.char-img{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--bg3)}
.char-info{padding:10px}
.char-name{font-size:0.85rem;font-weight:600;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.char-role{font-size:0.75rem;color:var(--text3)}
/* STAFF */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.staff-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:10px;transition:all var(--transition)}
.staff-card:hover{background:var(--surface2);border-color:var(--border2)}
.staff-img{width:48px;height:48px;border-radius:50%;object-fit:cover;background:var(--bg3);flex-shrink:0}
.staff-info{min-width:0}
.staff-name{font-size:0.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.staff-role{font-size:0.75rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* RECOMMENDATIONS / RELATIONS */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
.rec-card{border-radius:var(--radius);overflow:hidden;background:var(--surface);border:1px solid var(--border);transition:all var(--transition);cursor:pointer;position:relative}
.rec-card:hover{transform:translateY(-5px);border-color:var(--border2);box-shadow:var(--shadow),var(--glow)}
.rec-poster{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bg3)}
.rec-overlay{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(5,5,10,0.95))}
.rec-info{position:absolute;bottom:0;left:0;right:0;padding:10px}
.rec-title{font-size:0.8rem;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rec-score{font-size:0.72rem;color:var(--gold);margin-top:2px}
/* TRAILER */
.trailer-wrap{position:relative;width:100%;max-width:720px;aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:var(--bg3);border:1px solid var(--border2)}
.trailer-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
/* STUDIOS */
.studios-list{display:flex;flex-wrap:wrap;gap:10px}
.studio-pill{padding:8px 16px;border-radius:var(--radius2);background:var(--surface2);border:1px solid var(--border);font-size:0.9rem;color:var(--purple3);transition:all var(--transition)}
.studio-pill:hover{background:rgba(139,92,246,0.2);border-color:var(--purple)}
/* RANKINGS */
.ranks-list{display:flex;flex-direction:column;gap:8px;max-width:400px}
.rank-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:10px 16px}
.rank-num{font-size:1.1rem;font-weight:800;color:var(--gold);width:32px;text-align:center}
.rank-text{font-size:0.85rem;color:var(--text2)}
/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius2)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-banner{height:420px;border-radius:0;margin-top:var(--header-h)}
/* CARD */
.card{flex:0 0 160px;border-radius:var(--radius);overflow:hidden;background:var(--surface);border:1px solid var(--border);transition:all var(--transition);cursor:pointer;position:relative}
.card:hover{transform:translateY(-6px) scale(1.02);border-color:var(--border2);box-shadow:0 16px 40px rgba(0,0,0,0.5),var(--glow)}
.card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bg3)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,10,0.95) 0%,transparent 50%);opacity:0;transition:opacity var(--transition)}
.card:hover .card-overlay{opacity:1}
.card-badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px}
.badge{padding:3px 7px;border-radius:4px;font-size:0.7rem;font-weight:700}
.badge-score{background:rgba(251,191,36,0.25);border:1px solid rgba(251,191,36,0.5);color:var(--gold)}
.card-label{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(5,5,10,0.95));text-align:center}
.card-label-text{font-size:0.8rem;font-weight:500;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.info-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:14px}
.info-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px}
.info-value{font-size:0.9rem;color:var(--text);font-weight:500}
/* FOOTER */
footer{background:var(--bg2);border-top:1px solid var(--border);padding:40px 24px 20px;margin-top:60px}
.footer-inner{max-width:1200px;margin:0 auto}
.footer-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.footer-logo{height:32px;filter:drop-shadow(0 0 8px rgba(139,92,246,0.4))}
.footer-socials{display:flex;gap:12px}
.social-link{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);color:var(--text2);transition:all var(--transition);font-size:1rem}
.social-link:hover{background:var(--border2);color:var(--purple2)}
.footer-bottom{padding-top:20px;text-align:center;color:var(--text3);font-size:0.82rem;line-height:1.7}
.footer-bottom a{color:var(--purple3)}
.footer-disclaimer{margin-top:8px;font-size:0.78rem;font-style:italic}
#loader{position:fixed;top:0;left:0;width:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--pink),var(--cyan));z-index:9999;transition:width 0.3s ease}
.section-pad{padding:0 24px 32px}
.section-title-sm{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title-sm::before{content:'';width:3px;height:16px;background:linear-gradient(180deg,var(--purple),var(--pink));border-radius:2px}
</style>
</head>

    <a href="discover.html"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Discover</a>
    <a href="schedule.html"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>

<script>
const ANILIST='https://graphql.anilist.co';
function cacheSet(k,d){try{localStorage.setItem(k,JSON.stringify({t:Date.now(),d}))}catch(e){}}
function cacheGet(k){try{const r=localStorage.getItem(k);if(!r)return null;const{t,d}=JSON.parse(r);if(Date.now()-t>300000){localStorage.removeItem(k);return null;}return d;}catch(e){return null;}}
async function gqlFetch(query,variables={},retries=3){
  const key='nt_'+btoa(JSON.stringify({query:query.slice(0,80),variables})).slice(0,40);
  const cached=cacheGet(key);if(cached)return cached;
  for(let i=0;i<retries;i++){
    const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),12000);
    try{
      const res=await fetch(ANILIST,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({query,variables}),signal:ctrl.signal});
      clearTimeout(timer);if(!res.ok)throw new Error('HTTP '+res.status);
      const json=await res.json();if(json.errors)throw new Error(json.errors[0].message);
      cacheSet(key,json.data);return json.data;
    }catch(e){clearTimeout(timer);if(i===retries-1)throw e;await new Promise(r=>setTimeout(r,800*(i+1)));}
  }
}
function setLoader(p){document.getElementById('loader').style.width=p+'%'}
function hideLoader(){const l=document.getElementById('loader');l.style.width='100%';setTimeout(()=>{l.style.opacity='0';setTimeout(()=>{l.style.width='0';l.style.opacity='1';},400);},200);}

const Q_DETAIL=`query($id:Int){Media(id:$id,type:ANIME){id title{romaji english native}description bannerImage coverImage{large extraLarge}format status episodes duration season seasonYear averageScore popularity favourites rankings{rank type context}genres tags{name}studios{nodes{name isAnimationStudio}}characters(sort:ROLE,perPage:20){edges{role node{id name{full}image{large}}}}staff(perPage:16){edges{role node{id name{full}image{large}}}}relations{edges{relationType node{id title{romaji english}coverImage{large}format status averageScore}}}recommendations(sort:RATING_DESC,perPage:12){nodes{rating mediaRecommendation{id title{romaji english}coverImage{large}averageScore format}}}trailer{id site}nextAiringEpisode{airingAt episode}}}`;

function statusClass(s){return s==='RELEASING'?'airing':s==='FINISHED'?'finished':'upcoming';}
function statusLabel(s){return s==='RELEASING'?'● Airing':s==='FINISHED'?'Finished':s==='NOT_YET_RELEASED'?'Upcoming':s||'';}
function formatScore(s){return s?(s/10).toFixed(1):null;}
function stripHtml(h){return(h||'').replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'');}

function renderDetail(a){
  const title=a.title?.english||a.title?.romaji||'Unknown';
  const altTitle=a.title?.romaji!==title?a.title?.romaji:'';
  const banner=a.bannerImage||a.coverImage?.extraLarge||a.coverImage?.large||'';
  const score=formatScore(a.averageScore);
  const desc=stripHtml(a.description);
  const genres=a.genres||[];
  const tags=(a.tags||[]).slice(0,16);
  const studios=(a.studios?.nodes||[]).filter(s=>s.isAnimationStudio);
  const chars=a.characters?.edges||[];
  const staff=a.staff?.edges||[];
  const relations=a.relations?.edges||[];
  const recs=a.recommendations?.nodes||[];
  const rankings=a.rankings||[];
  const trailerSite=a.trailer?.site;
  const trailerId=a.trailer?.id;
  const totalEps=a.episodes||0;
  const nextEp=a.nextAiringEpisode;
  const displayEps=nextEp?nextEp.episode-1:totalEps;
  document.title=`${title} – NamiTube`;
  const root=document.getElementById('detail-root');
  root.innerHTML=`
    <div class="detail-banner">
      ${banner?`<img class="banner-img" src="${banner}" alt="" loading="eager" onerror="this.style.display='none'"/>`:''}
      <div class="banner-overlay"></div>
    </div>
    <div class="detail-container">
      <div class="detail-main">
        <div class="detail-poster">
          <img src="${a.coverImage?.large||''}" alt="${title.replace(/"/g,'')}" loading="eager"/>
        </div>
        <div class="detail-info">
          <h1 class="detail-title">${title}</h1>
          ${altTitle?`<p class="detail-alt">${altTitle}</p>`:''}
          <div class="detail-badges">
            ${a.format?`<span class="dbadge dbadge-format">${a.format}</span>`:''}
            <span class="dbadge dbadge-status-${statusClass(a.status)}">${statusLabel(a.status)}</span>
            ${a.season?`<span class="dbadge dbadge-format">${a.season} ${a.seasonYear||''}</span>`:''}
          </div>
          <div class="detail-stats">
            ${score?`<div class="stat"><span class="stat-label">Score</span><span class="stat-value gold">★ ${score}</span></div>`:''}
            ${a.popularity?`<div class="stat"><span class="stat-label">Popularity</span><span class="stat-value purple">#${a.popularity.toLocaleString()}</span></div>`:''}
            ${a.favourites?`<div class="stat"><span class="stat-label">Favourites</span><span class="stat-value">${a.favourites.toLocaleString()}</span></div>`:''}
            ${displayEps?`<div class="stat"><span class="stat-label">Episodes</span><span class="stat-value">${displayEps}${totalEps&&totalEps!==displayEps?'/'+totalEps:''}</span></div>`:''}
            ${a.duration?`<div class="stat"><span class="stat-label">Duration</span><span class="stat-value">${a.duration} min</span></div>`:''}
          </div>
          <div class="detail-actions">
            <a href="watch.html?id=${a.id}&ep=1" class="btn btn-primary">
              <svg viewBox="0 0 24 24"><polygon fill="currentColor" points="5 3 19 12 5 21 5 3"/></svg>
              Watch Now
            </a>
            ${displayEps>1?`<a href="watch.html?id=${a.id}&ep=${displayEps}" class="btn btn-secondary">Latest Ep ${displayEps}</a>`:''}
          </div>
          <div class="pill-group">
            ${genres.map(g=>`<a href="discover.html?genre=${encodeURIComponent(g)}" class="pill pill-genre">${g}</a>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="detail-tabs" id="detail-tabs">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      ${displayEps?`<button class="tab-btn" data-tab="episodes">Episodes (${displayEps})</button>`:''}
      ${chars.length?`<button class="tab-btn" data-tab="characters">Characters</button>`:''}
      ${staff.length?`<button class="tab-btn" data-tab="staff">Staff</button>`:''}
      ${relations.length?`<button class="tab-btn" data-tab="relations">Relations</button>`:''}
      ${recs.length?`<button class="tab-btn" data-tab="recs">Recommendations</button>`:''}
    </div>
    <!-- OVERVIEW TAB -->
    <div class="tab-content active section-pad" id="tab-overview">
      <div class="section-title-sm">Synopsis</div>
      <p class="synopsis">${desc.replace(/\n/g,'<br/>')}</p>
      <br/>
      ${tags.length?`<div class="section-title-sm">Tags</div><div class="pill-group">${tags.map(t=>`<a href="discover.html?tag=${encodeURIComponent(t.name)}" class="pill pill-tag">${t.name}</a>`).join('')}</div>`:''}
      ${studios.length?`<div class="section-title-sm">Studios</div><div class="studios-list">${studios.map(s=>`<span class="studio-pill">${s.name}</span>`).join('')}</div><br/>`:''}
      <div class="section-title-sm">Information</div>
      <div class="info-grid">
        ${a.format?`<div class="info-item"><div class="info-label">Format</div><div class="info-value">${a.format}</div></div>`:''}
        ${a.status?`<div class="info-item"><div class="info-label">Status</div><div class="info-value">${statusLabel(a.status)}</div></div>`:''}
        ${totalEps?`<div class="info-item"><div class="info-label">Episodes</div><div class="info-value">${totalEps}</div></div>`:''}
        ${a.duration?`<div class="info-item"><div class="info-label">Duration</div><div class="info-value">${a.duration} min/ep</div></div>`:''}
        ${a.season?`<div class="info-item"><div class="info-label">Season</div><div class="info-value">${a.season} ${a.seasonYear||''}</div></div>`:''}
        ${a.averageScore?`<div class="info-item"><div class="info-label">Score</div><div class="info-value">★ ${score}/10</div></div>`:''}
        ${a.popularity?`<div class="info-item"><div class="info-label">Popularity</div><div class="info-value">#${a.popularity.toLocaleString()}</div></div>`:''}
        ${a.favourites?`<div class="info-item"><div class="info-label">Favourites</div><div class="info-value">${a.favourites.toLocaleString()}</div></div>`:''}
        ${nextEp?`<div class="info-item"><div class="info-label">Next Episode</div><div class="info-value">Ep ${nextEp.episode}</div></div>`:''}
      </div>
      ${rankings.length?`<div class="section-title-sm">Rankings</div><div class="ranks-list">${rankings.slice(0,5).map(r=>`<div class="rank-item"><span class="rank-num">#${r.rank}</span><span class="rank-text">${r.context||r.type}</span></div>`).join('')}</div><br/>`:''}
      ${trailerSite==='youtube'?`<div class="section-title-sm">Trailer</div><div class="trailer-wrap"><iframe src="https://www.youtube.com/embed/${trailerId}?autoplay=0&rel=0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" loading="lazy"></iframe></div>`:''}
    </div>
    <!-- EPISODES TAB -->
    ${displayEps?`<div class="tab-content section-pad" id="tab-episodes">
      <div class="ep-controls">
        <span class="ep-info">${displayEps} Episode${displayEps>1?'s':''} Available</span>
        <input type="text" class="ep-search" id="ep-search" placeholder="Jump to ep..."/>
      </div>
      <div class="ep-grid" id="ep-grid"></div>
    </div>`:''}
    <!-- CHARACTERS TAB -->
    ${chars.length?`<div class="tab-content section-pad" id="tab-characters">
      <div class="chars-grid">${chars.map(e=>`<div class="char-card"><img class="char-img" src="${e.node?.image?.large||''}" alt="${(e.node?.name?.full||'').replace(/"/g,'')}" loading="lazy" onerror="this.style.background='var(--bg3)'"/><div class="char-info"><div class="char-name">${e.node?.name?.full||''}</div><div class="char-role">${e.role||''}</div></div></div>`).join('')}</div>
    </div>`:''}
    <!-- STAFF TAB -->
    ${staff.length?`<div class="tab-content section-pad" id="tab-staff">
      <div class="staff-grid">${staff.map(e=>`<div class="staff-card"><img class="staff-img" src="${e.node?.image?.large||''}" alt="" loading="lazy" onerror="this.style.background='var(--bg3)'"/><div class="staff-info"><div class="staff-name">${e.node?.name?.full||''}</div><div class="staff-role">${e.role||''}</div></div></div>`).join('')}</div>
    </div>`:''}
    <!-- RELATIONS TAB -->
    ${relations.length?`<div class="tab-content section-pad" id="tab-relations">
      <div class="rec-grid">${relations.filter(e=>e.node).map(e=>{const n=e.node;const t=n.title?.english||n.title?.romaji||'';return`<div class="rec-card" onclick="location.href='anime.html?id=${n.id}'"><img class="rec-poster" src="${n.coverImage?.large||''}" alt="${t.replace(/"/g,'')}" loading="lazy"/><div class="rec-overlay"></div><div class="rec-info"><div class="rec-title">${t}</div><div class="rec-score">${e.relationType||''} ${n.format?'· '+n.format:''}</div></div></div>`;}).join('')}</div>
    </div>`:''}
    <!-- RECS TAB -->
    ${recs.length?`<div class="tab-content section-pad" id="tab-recs">
      <div class="rec-grid">${recs.filter(r=>r.mediaRecommendation).map(r=>{const n=r.mediaRecommendation;const t=n.title?.english||n.title?.romaji||'';return`<div class="rec-card" onclick="location.href='anime.html?id=${n.id}'"><img class="rec-poster" src="${n.coverImage?.large||''}" alt="${t.replace(/"/g,'')}" loading="lazy"/><div class="rec-overlay"></div><div class="rec-info"><div class="rec-title">${t}</div><div class="rec-score">${formatScore(n.averageScore)?'★ '+formatScore(n.averageScore):''} ${n.format?'· '+n.format:''}</div></div></div>`;}).join('')}</div>
    </div>`:''}
  `;
  // Build episode grid
  if(displayEps){
    const grid=document.getElementById('ep-grid');
    if(grid){
      const frag=document.createDocumentFragment();
      for(let i=1;i<=displayEps;i++){
        const btn=document.createElement('button');
        btn.className='ep-btn';btn.textContent=i;
        btn.addEventListener('click',()=>location.href=`watch.html?id=${a.id}&ep=${i}`);
        frag.appendChild(btn);
      }
      grid.appendChild(frag);
      const epSearch=document.getElementById('ep-search');
      if(epSearch){
        epSearch.addEventListener('input',()=>{
          const v=epSearch.value.trim();
          grid.querySelectorAll('.ep-btn').forEach(b=>{
            b.style.display=v===''||b.textContent.includes(v)?'':'none';
          });
        });
        epSearch.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=parseInt(epSearch.value);if(v>=1&&v<=displayEps)location.href=`watch.html?id=${a.id}&ep=${v}`;}});
      }
    }
  }
  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      btn.classList.add('active');
      const t=document.getElementById('tab-'+btn.dataset.tab);
      if(t)t.classList.add('active');
    });
  });
}

function showSkeleton(){
  document.getElementById('detail-root').innerHTML=`<div class="skel-banner skeleton"></div><div style="padding:24px"><div class="skeleton" style="height:24px;width:40%;border-radius:8px;margin-bottom:12px"></div><div class="skeleton" style="height:16px;width:60%;border-radius:6px"></div></div>`;
}

async function init(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){document.getElementById('detail-root').innerHTML='<div style="text-align:center;padding:80px;color:var(--text3)"><h2>No anime ID provided</h2><a href="index.html" style="color:var(--purple3)">← Back to Home</a></div>';return;}
  showSkeleton();setLoader(20);
  try{
    const data=await gqlFetch(Q_DETAIL,{id:parseInt(id)});
    setLoader(80);
    if(!data?.Media){throw new Error('Not found');}
    renderDetail(data.Media);
    setLoader(100);hideLoader();
  }catch(e){
    hideLoader();
    document.getElementById('detail-root').innerHTML=`<div style="text-align:center;padding:80px 24px;color:var(--text3)"><h2 style="margin-bottom:12px">Failed to load anime</h2><p>${e.message}</p><br/><a href="index.html" style="color:var(--purple3)">← Back to Home</a></div>`;
  }
}

// Search
let sd=null;
async function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  const res=document.getElementById('search-results');
  if(!q){res.innerHTML='<div class="search-empty">Search Anime</div>';return;}
  res.innerHTML='<div class="search-empty">Searching...</div>';
  try{
    const data=await gqlFetch(`query($s:String){Page(perPage:20){media(type:ANIME,search:$s,isAdult:false,sort:TRENDING_DESC){id title{romaji english}coverImage{large}averageScore episodes format status}}}`,{s:q});
    const m=data?.Page?.media||[];
    if(!m.length){res.innerHTML='<div class="search-empty">No results</div>';return;}
    res.innerHTML=`<div class="search-grid">${m.map(a=>`<div class="card" onclick="location.href='anime.html?id=${a.id}'" style="flex:none;width:100%"><img class="card-poster" src="${a.coverImage?.large||''}" loading="lazy" style="width:100%;aspect-ratio:2/3;object-fit:cover"/><div class="card-badges"><span class="badge badge-score">${a.averageScore?(a.averageScore/10).toFixed(1):''}</span></div><div class="card-label"><div class="card-label-text">${a.title?.english||a.title?.romaji||''}</div></div></div>`).join('')}</div>`;
  }catch(e){res.innerHTML='<div class="search-empty">Search failed</div>';}
}
document.getElementById('search-btn').addEventListener('click',()=>{document.getElementById('search-overlay').classList.add('active');setTimeout(()=>document.getElementById('search-input').focus(),100);document.body.style.overflow='hidden';});
document.getElementById('search-close').addEventListener('click',()=>{document.getElementById('search-overlay').classList.remove('active');document.body.style.overflow='';});
document.getElementById('search-input').addEventListener('input',()=>{clearTimeout(sd);sd=setTimeout(doSearch,400);});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('search-overlay').classList.remove('active');document.body.style.overflow='';}});
document.getElementById('hamburger').addEventListener('click',()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('open');document.body.style.overflow='hidden';});
document.getElementById('sidebar-close').addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');document.body.style.overflow='';});
document.getElementById('sidebar-overlay').addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');document.body.style.overflow='';});
window.addEventListener('scroll',()=>{document.getElementById('header').classList.toggle('scrolled',window.scrollY>20);},{passive:true});
window.addEventListener('DOMContentLoaded',init);
</script>
