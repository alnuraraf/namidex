<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anime Details - AniZone</title>
  <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
    <div class="header-center">
      <a href="index.html" class="logo"><span class="logo-icon">A</span>AniZone</a>
    </div>
    <div class="header-right">
      <button class="header-btn search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
      <button class="header-btn profile-btn" aria-label="Profile">
        <div class="profile-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
      </button>
    </div>
  </header>

  <div class="nav-overlay"></div>
  <nav class="nav-menu">
    <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>Home</a>
    <a href="index.html#trending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>Trending</a>
    <a href="schedule.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>Schedule</a>
    <a href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Profile</a>
  </nav>

  <div class="search-overlay">
    <div class="search-header">
      <div class="search-input-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="search-input" placeholder="Search anime..." autocomplete="off">
      </div>
      <button class="search-close" aria-label="Close search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="search-body"></div>
  </div>

  <div class="auth-overlay">
    <div class="auth-modal">
      <button class="auth-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account</p>
      <form class="auth-form">
        <div class="auth-input-group"><input type="text" name="username" class="auth-input" placeholder="Username" autocomplete="username" required></div>
        <div class="auth-input-group"><input type="password" name="password" class="auth-input" placeholder="Password" autocomplete="current-password" required></div>
        <div class="auth-input-group confirm-password-group" style="display:none;"><input type="password" name="confirmPassword" class="auth-input" placeholder="Confirm Password" autocomplete="new-password"></div>
        <p class="auth-error"></p>
        <button type="submit" class="auth-btn">Sign In</button>
      </form>
      <p class="auth-switch">Don't have an account? <a>Sign up</a></p>
    </div>
  </div>

  <main class="main-content">
    <div class="anime-banner">
      <div class="anime-banner-bg" id="anime-banner-bg"></div>
      <div class="anime-banner-overlay"></div>
    </div>

    <div class="anime-details-content" id="anime-details">
      <div class="anime-poster-wrap">
        <div class="anime-poster-main" id="anime-poster"><div class="skeleton" style="width:100%;height:100%;"></div></div>
        <div class="anime-actions-row">
          <a href="#" class="btn-primary" id="watch-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>Watch
          </a>
          <button class="btn-secondary" id="fav-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>Favorite
          </button>
          <button class="btn-secondary" id="bookmark-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>Bookmark
          </button>
        </div>
      </div>
      <div class="anime-info-main" id="anime-info">
        <div class="skeleton" style="width:70%;height:40px;margin-bottom:16px;"></div>
        <div class="skeleton" style="width:40%;height:24px;margin-bottom:20px;"></div>
        <div class="skeleton" style="width:100%;height:80px;margin-bottom:20px;"></div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
          <div class="skeleton" style="height:60px;"></div><div class="skeleton" style="height:60px;"></div>
          <div class="skeleton" style="height:60px;"></div><div class="skeleton" style="height:60px;"></div>
        </div>
      </div>
    </div>

    <div class="episodes-section" id="episodes-section" style="display:none;">
      <div class="section-header">
        <h2 class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg> Episodes</h2>
      </div>
      <div class="episodes-grid" id="episodes-grid"></div>
    </div>

    <div class="section" id="characters-section" style="display:none;">
      <div class="section-header">
        <h2 class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Characters</h2>
      </div>
      <div class="slider-container" id="characters-slider"><div class="slider-track" id="characters-track"></div></div>
    </div>

    <div class="section" id="recommendations-section" style="display:none;">
      <div class="section-header">
        <h2 class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg> Recommendations</h2>
        <div class="section-nav">
          <button class="section-nav-btn prev" aria-label="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
          <button class="section-nav-btn next" aria-label="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        </div>
      </div>
      <div class="slider-container" id="recommendations-slider"><div class="slider-track" id="recommendations-track"></div></div>
    </div>
  </main>

  <footer class="footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/slider.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
  <script>
  (async function() {
    const params = new URLSearchParams(window.location.search);
    const malId = params.get('id');
    if (!malId) { window.location.href = 'index.html'; return; }
    let animeData = null;
    try {
      animeData = await API.getAnimeDetails(malId);
      if (!animeData) throw new Error('Anime not found');
    } catch (err) {
      document.getElementById('anime-info').innerHTML = '<div class="empty-state" style="padding:40px 0;"><h3>Failed to load anime details</h3><p>Please try again later</p></div>';
      return;
    }
    const bannerBg = document.getElementById('anime-banner-bg');
    if (bannerBg && animeData.images?.jpg?.large_image_url) bannerBg.style.backgroundImage = `url('${animeData.images.jpg.large_image_url}')`;
    const posterEl = document.getElementById('anime-poster');
    if (posterEl && animeData.images?.jpg?.image_url) posterEl.innerHTML = `<img src="${animeData.images.jpg.image_url}" alt="${escapeHtml(animeData.title)}">`;
    const title = animeData.title_english || animeData.title;
    const infoEl = document.getElementById('anime-info');
    if (infoEl) {
      const score = animeData.score || 'N/A';
      const type = animeData.type || 'TV';
      const episodes = animeData.episodes || '?';
      const status = animeData.status || 'Unknown';
      const duration = animeData.duration || 'Unknown';
      const rating = animeData.rating || 'N/A';
      const studios = animeData.studios?.map(s => s.name).join(', ') || 'Unknown';
      const genres = animeData.genres || [];
      const synopsis = animeData.synopsis || 'No synopsis available.';
      infoEl.innerHTML = `<h1 class="anime-title-main">${escapeHtml(title)}</h1>
        <div class="anime-meta-main">
          <span class="score-main"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg> ${score}</span>
          <span>${type}</span><span>${episodes} EPS</span><span>${status}</span><span>${animeData.year || ''}</span>
        </div>
        <p class="anime-synopsis">${escapeHtml(synopsis)}</p>
        <div class="anime-stats-grid">
          <div class="stat-item"><div class="stat-label">Studio</div><div class="stat-value">${escapeHtml(studios)}</div></div>
          <div class="stat-item"><div class="stat-label">Duration</div><div class="stat-value">${escapeHtml(duration)}</div></div>
          <div class="stat-item"><div class="stat-label">Rating</div><div class="stat-value">${escapeHtml(rating)}</div></div>
          <div class="stat-item"><div class="stat-label">Rank</div><div class="stat-value">#${animeData.rank || 'N/A'}</div></div>
        </div>
        <div class="anime-genres">${genres.map(g => `<span class="genre-tag">${escapeHtml(g.name)}</span>`).join('')}</div>`;
    }
    const watchBtn = document.getElementById('watch-btn');
    if (watchBtn) watchBtn.href = `watch.html?id=${malId}&ep=1`;
    const favBtn = document.getElementById('fav-btn');
    const bookmarkBtn = document.getElementById('bookmark-btn');
    function updateButtons() {
      if (favBtn) favBtn.classList.toggle('active', Auth.isFavorite(parseInt(malId)));
      if (bookmarkBtn) bookmarkBtn.classList.toggle('active', Auth.isBookmarked(parseInt(malId)));
    }
    updateButtons();
    favBtn?.addEventListener('click', async () => {
      try { await Auth.toggleFavorite(parseInt(malId), animeData); updateButtons(); showToast(Auth.isFavorite(parseInt(malId)) ? 'Added to favorites' : 'Removed from favorites'); }
      catch (err) { showToast(err.message, 'error'); }
    });
    bookmarkBtn?.addEventListener('click', async () => {
      try { await Auth.toggleBookmark(parseInt(malId), animeData); updateButtons(); showToast(Auth.isBookmarked(parseInt(malId)) ? 'Bookmarked' : 'Removed bookmark'); }
      catch (err) { showToast(err.message, 'error'); }
    });
    try {
      const episodes = await API.getEpisodes(malId);
      const epSection = document.getElementById('episodes-section');
      const epGrid = document.getElementById('episodes-grid');
      if (episodes.length > 0 && epGrid) {
        epSection.style.display = 'block';
        epGrid.innerHTML = episodes.map((_, i) => `<a href="watch.html?id=${malId}&ep=${i+1}" class="episode-btn">${i+1}</a>`).join('');
      } else if (animeData.episodes) {
        epSection.style.display = 'block';
        epGrid.innerHTML = Array.from({length: animeData.episodes}, (_, i) => `<a href="watch.html?id=${malId}&ep=${i+1}" class="episode-btn">${i+1}</a>`).join('');
      }
    } catch (err) { console.error('Episodes load failed:', err); }
    try {
      const characters = await API.getCharacters(malId);
      const charSection = document.getElementById('characters-section');
      const charTrack = document.getElementById('characters-track');
      if (characters.length > 0 && charTrack) {
        charSection.style.display = 'block';
        charTrack.innerHTML = characters.slice(0, 12).map(c => `<div class="anime-card" style="width:140px;"><div class="anime-card-poster"><img src="${c.character?.images?.jpg?.image_url || 'https://via.placeholder.com/140x210'}" alt="${escapeHtml(c.character?.name || '')}" loading="lazy"></div><div class="anime-card-info"><h3 class="anime-card-title">${escapeHtml(c.character?.name || '')}</h3><div class="anime-card-meta">${c.role || ''}</div></div></div>`).join('');
        requestAnimationFrame(() => { new UniversalSlider('#characters-slider', { gap: 16 }); });
      }
    } catch (err) { console.error('Characters load failed:', err); }
    try {
      const recs = await API.getRecommendations(malId);
      const recSection = document.getElementById('recommendations-section');
      const recTrack = document.getElementById('recommendations-track');
      if (recs.length > 0 && recTrack) {
        recSection.style.display = 'block';
        recTrack.innerHTML = recs.slice(0, 12).map(r => createAnimeCard(r.entry)).join('');
        requestAnimationFrame(() => { new UniversalSlider('#recommendations-slider', { gap: 16 }); });
      }
    } catch (err) { console.error('Recommendations load failed:', err); }
  })();
  </script>
</body>
</html>
