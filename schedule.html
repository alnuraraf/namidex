<style>
:root {
  --bg: #0a0a0f; --bg-elevated: #12121a; --bg-card: #16161f; --bg-glass: rgba(22,22,31,0.85);
  --primary: #a855f7; --primary-light: #c084fc; --primary-dark: #7c3aed; --accent: #d946ef;
  --text: #f1f1f4; --text-secondary: #a1a1aa; --text-muted: #71717a;
  --border: rgba(168,85,247,0.15); --border-glow: rgba(168,85,247,0.3);
  --success: #22c55e; --warning: #f59e0b; --radius: 14px; --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4); --shadow-glow: 0 0 40px rgba(168,85,247,0.15);
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1); --header-h: 64px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100%; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 4px; }

.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(10,10,15,0.92); backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border); z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px); transition: var(--transition);
}
.header.scrolled { background: rgba(10,10,15,0.98); box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
.header-left { display: flex; align-items: center; gap: 16px; }
.hamburger {
  width: 40px; height: 40px; border: none; background: transparent; cursor: pointer;
  display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
  border-radius: var(--radius-sm); transition: var(--transition);
}
.hamburger span { display: block; width: 22px; height: 2.5px; background: var(--text); border-radius: 2px; transition: var(--transition); }
.hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
.logo-banner { height: 36px; width: auto; object-fit: contain; transition: var(--transition); }
.logo-banner:hover { filter: drop-shadow(0 0 8px var(--primary-light)); }
.desktop-nav { display: none; gap: 28px; }
.desktop-nav a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; position: relative; transition: var(--transition); }
.desktop-nav a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 1px; transition: var(--transition); }
.desktop-nav a:hover, .desktop-nav a.active { color: var(--text); }
.desktop-nav a:hover::after, .desktop-nav a.active::after { width: 100%; }
.header-right { display: flex; align-items: center; gap: 12px; }
.search-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
  background: rgba(168,85,247,0.08); color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: var(--transition);
}
.search-btn:hover { background: rgba(168,85,247,0.2); border-color: var(--primary-light); box-shadow: 0 0 15px rgba(168,85,247,0.2); }
.search-btn svg { width: 18px; height: 18px; }

.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: min(280px, 80vw);
  background: var(--bg-glass); backdrop-filter: blur(30px); border-right: 1px solid var(--border);
  z-index: 1001; transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; padding: 80px 24px 24px;
}
.sidebar.active { transform: translateX(0); }
.sidebar a { display: flex; align-items: center; gap: 14px; padding: 14px 16px; color: var(--text-secondary); text-decoration: none; font-size: 1rem; font-weight: 500; border-radius: var(--radius-sm); transition: var(--transition); margin-bottom: 4px; }
.sidebar a:hover, .sidebar a.active { background: rgba(168,85,247,0.12); color: var(--text); }
.sidebar a svg { width: 20px; height: 20px; opacity: 0.7; }
.sidebar a:hover svg, .sidebar a.active svg { opacity: 1; color: var(--primary-light); }

/* Schedule */
.schedule-page { margin-top: var(--header-h); padding: clamp(20px, 3vw, 32px) clamp(16px, 4vw, 48px); max-width: 1200px; margin-left: auto; margin-right: auto; }
.schedule-title {
  font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 800; margin-bottom: 24px;
  background: linear-gradient(135deg, #fff 0%, #e9d5ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.day-tabs {
  display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-btn {
  padding: 12px 20px; background: transparent; border: none; color: var(--text-muted);
  font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap;
  position: relative; transition: var(--transition); font-family: inherit; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
}
.day-btn:hover { color: var(--text); background: rgba(168,85,247,0.08); }
.day-btn.active { color: var(--text); background: rgba(168,85,247,0.12); }
.day-btn.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 1px;
}
.day-btn .day-date { font-size: 0.7rem; color: var(--text-muted); display: block; text-align: center; margin-top: 2px; }
.day-btn.active .day-date { color: var(--primary-light); }

.schedule-grid { display: grid; gap: 12px; }
.schedule-card {
  display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px 16px; transition: var(--transition); text-decoration: none; color: var(--text);
}
.schedule-card:hover { border-color: var(--border-glow); background: rgba(168,85,247,0.05); }
.schedule-img { width: 56px; height: 80px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; }
.schedule-info { min-width: 0; }
.schedule-title-small { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.schedule-meta { font-size: 0.8rem; color: var(--text-muted); }
.schedule-time {
  text-align: right; flex-shrink: 0;
}
.schedule-time-main { font-size: 1.1rem; font-weight: 700; color: var(--primary-light); }
.schedule-time-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
.schedule-countdown { font-size: 0.75rem; color: var(--success); margin-top: 4px; font-weight: 600; }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, #1f1f2e 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Footer */
.footer { border-top: 1px solid var(--border); padding: 40px clamp(16px, 4vw, 48px); background: var(--bg-elevated); margin-top: 40px; }
.footer-inner { max-width: 1200px; margin: 0 auto; text-align: center; }
.footer-logo { height: 32px; margin-bottom: 16px; opacity: 0.8; }
.footer-text { color: var(--text-muted); font-size: 0.85rem; line-height: 1.7; max-width: 600px; margin: 0 auto 20px; }
.footer-social { display: flex; justify-content: center; gap: 16px; margin-bottom: 20px; }
.footer-social a { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: var(--transition); text-decoration: none; }
.footer-social a:hover { border-color: var(--primary); color: var(--primary-light); background: rgba(168,85,247,0.1); }
.footer-copy { color: var(--text-muted); font-size: 0.8rem; }

@media (min-width: 768px) { .desktop-nav { display: flex; } .hamburger { display: none; } }
@media (max-width: 480px) {
  .schedule-card { grid-template-columns: auto 1fr; }
  .schedule-time { grid-column: 2; text-align: left; }
}
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>

<script>
(function() {
  'use strict';
  const API = 'https://graphql.anilist.co';
  const CACHE_TTL = 1000 * 60 * 10;
  const MAX_RETRIES = 3;
  const TIMEOUT = 8000;
  const $ = (s, c=document) => c.querySelector(s);
  const $$ = (s, c=document) => Array.from(c.querySelectorAll(s));
  const wait = ms => new Promise(r => setTimeout(r, ms));

  function cacheGet(key) {
    try { const item = JSON.parse(localStorage.getItem('nt_'+key)); if (item && Date.now()-item.t < CACHE_TTL) return item.d; } catch(e){}
    return null;
  }
  function cacheSet(key, data) {
    try { localStorage.setItem('nt_'+key, JSON.stringify({t:Date.now(),d:data})); } catch(e){}
  }
  async function gql(query, variables={}, retries=MAX_RETRIES) {
    const cacheKey = query.trim().slice(0,60)+JSON.stringify(variables);
    const cached = cacheGet(cacheKey); if (cached) return cached;
    for (let i=0; i<retries; i++) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT);
      try {
        const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body: JSON.stringify({query,variables}), signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const json = await res.json();
        if (json.errors) throw new Error(json.errors[0].message);
        cacheSet(cacheKey, json.data); return json.data;
      } catch(e) { clearTimeout(timer); if (i===retries-1) { console.error('GraphQL failed:', e.message); return null; } await wait(1000*(i+1)); }
    }
    return null;
  }
  function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  let activeDay = new Date().getDay();
  let scheduleData = {};

  function getWeekDates() {
    const today = new Date();
    const start = new Date(today);
    start.setDate(today.getDate() - today.getDay());
    return days.map((_,i) => {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      return d;
    });
  }

  function renderTabs() {
    const weekDates = getWeekDates();
    const tabs = $('#dayTabs');
    tabs.innerHTML = days.map((day,i) => {
      const date = weekDates[i];
      const dateStr = `${date.getMonth()+1}/${date.getDate()}`;
      return `<button class="day-btn ${i===activeDay?'active':''}" data-day="${i}">${day}<span class="day-date">${dateStr}</span></button>`;
    }).join('');
    $$('.day-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeDay = parseInt(btn.dataset.day);
        $$('.day-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.day)===activeDay));
        renderSchedule();
      });
    });
  }

  function formatTime(seconds) {
    const h = Math.floor(seconds / 3600) % 24;
    const m = Math.floor((seconds % 3600) / 60);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  function formatCountdown(seconds) {
    if (seconds <= 0) return 'Aired';
    const d = Math.floor(seconds / 86400);
    const h = Math.floor((seconds % 86400) / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    if (d > 0) return `${d}d ${h}h left`;
    if (h > 0) return `${h}h ${m}m left`;
    return `${m}m left`;
  }

  function renderSchedule() {
    const grid = $('#scheduleGrid');
    const items = scheduleData[activeDay] || [];
    if (!items.length) {
      grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">No airing anime for this day.</p>';
      return;
    }
    grid.innerHTML = items.map(item => {
      const media = item.media;
      const title = media.title?.english || media.title?.romaji || 'Unknown';
      const img = media.coverImage?.medium || '';
      const ep = item.episode || '?';
      const time = formatTime(item.airingAt);
      const countdown = formatCountdown(item.timeUntilAiring);
      return `<a href="anime.html?id=${media.id}" class="schedule-card">
        <img src="${esc(img)}" alt="${esc(title)}" class="schedule-img" loading="lazy">
        <div class="schedule-info">
          <div class="schedule-title-small">${esc(title)}</div>
          <div class="schedule-meta">Episode ${ep} · ${esc((media.format||'').replace(/_/g,' '))}</div>
        </div>
        <div class="schedule-time">
          <div class="schedule-time-main">${time}</div>
          <div class="schedule-time-sub">UTC</div>
          <div class="schedule-countdown">${esc(countdown)}</div>
        </div>
      </a>`;
    }).join('');
  }

  async function loadSchedule() {
    const grid = $('#scheduleGrid');
    grid.innerHTML = Array(6).fill(0).map(() => `<div class="schedule-card"><div class="skeleton" style="width:56px;height:80px;"></div><div style="flex:1;"><div class="skeleton" style="height:18px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:40%;"></div></div><div class="skeleton" style="width:60px;height:24px;"></div></div>`).join('');

    const weekDates = getWeekDates();
    const start = Math.floor(weekDates[0].getTime() / 1000);
    const end = Math.floor(weekDates[6].getTime() / 1000) + 86400;

    const data = await gql(`
      query($start:Int,$end:Int){
        Page(page:1,perPage:50){
          airingSchedule(airingAt_greater:$start,airingAt_lesser:$end,sort:TIME){
            id airingAt episode timeUntilAiring
            media{id title{english romaji} coverImage{medium} format}
          }
        }
      }`, {start, end});

    if (!data || !data.Page || !data.Page.airingSchedule) {
      // Fallback: try querying via media with airingSchedule
      const fallback = await gql(`
        query($start:Int,$end:Int){
          Page(page:1,perPage:50){
            media(type:ANIME,status:RELEASING,sort:POPULARITY_DESC){
              id title{english romaji} coverImage{medium} format
              airingSchedule(notYetAired:true,perPage:5){
                nodes{id airingAt episode timeUntilAiring}
              }
            }
          }
        }`);

      scheduleData = {};
      for (let i=0; i<7; i++) scheduleData[i] = [];

      if (fallback && fallback.Page && fallback.Page.media) {
        fallback.Page.media.forEach(media => {
          const nodes = media.airingSchedule?.nodes || [];
          nodes.forEach(node => {
            if (node.airingAt >= start && node.airingAt <= end) {
              const date = new Date(node.airingAt * 1000);
              const day = date.getDay();
              scheduleData[day].push({
                id: node.id,
                airingAt: node.airingAt,
                episode: node.episode,
                timeUntilAiring: node.timeUntilAiring,
                media: {
                  id: media.id,
                  title: media.title,
                  coverImage: media.coverImage,
                  format: media.format
                }
              });
            }
          });
        });
        // Sort each day by airing time
        for (let i=0; i<7; i++) {
          scheduleData[i].sort((a,b) => a.airingAt - b.airingAt);
        }
        renderSchedule();
        return;
      }

      grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">Failed to load schedule.</p>';
      return;
    }

    scheduleData = {};
    for (let i=0; i<7; i++) scheduleData[i] = [];

    data.Page.airingSchedule.forEach(item => {
      const date = new Date(item.airingAt * 1000);
      const day = date.getDay();
      scheduleData[day].push(item);
    });

    renderSchedule();
  }

  // Header scroll
  const header=$('#header');
  window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY>20), {passive:true});

  // Sidebar
  const hamburger=$('#hamburger'), sidebar=$('#sidebar'), sidebarOverlay=$('#sidebarOverlay');
  function toggleSidebar() { const active=sidebar.classList.toggle('active'); hamburger.classList.toggle('active',active); sidebarOverlay.classList.toggle('active',active); document.body.style.overflow=active?'hidden':''; }
  hamburger.addEventListener('click', toggleSidebar); sidebarOverlay.addEventListener('click', toggleSidebar);

  renderTabs();
  loadSchedule();

  // Update countdown every minute
  setInterval(() => {
    if (scheduleData[activeDay]) renderSchedule();
  }, 60000);
})();
</script>
</body>
