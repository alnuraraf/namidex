<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch - AniZone</title>
  <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
    <div class="header-center">
      <a href="index.html" class="logo"><span class="logo-icon">A</span>AniZone</a>
    </div>
    <div class="header-right">
      <button class="header-btn search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
      <button class="header-btn profile-btn" aria-label="Profile">
        <div class="profile-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
      </button>
    </div>
  </header>

  <div class="nav-overlay"></div>
  <nav class="nav-menu">
    <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>Home</a>
    <a href="index.html#trending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>Trending</a>
    <a href="schedule.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>Schedule</a>
    <a href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Profile</a>
  </nav>

  <div class="search-overlay">
    <div class="search-header">
      <div class="search-input-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="search-input" placeholder="Search anime..." autocomplete="off">
      </div>
      <button class="search-close" aria-label="Close search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="search-body"></div>
  </div>

  <div class="auth-overlay">
    <div class="auth-modal">
      <button class="auth-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account</p>
      <form class="auth-form">
        <div class="auth-input-group"><input type="text" name="username" class="auth-input" placeholder="Username" autocomplete="username" required></div>
        <div class="auth-input-group"><input type="password" name="password" class="auth-input" placeholder="Password" autocomplete="current-password" required></div>
        <div class="auth-input-group confirm-password-group" style="display:none;"><input type="password" name="confirmPassword" class="auth-input" placeholder="Confirm Password" autocomplete="new-password"></div>
        <p class="auth-error"></p>
        <button type="submit" class="auth-btn">Sign In</button>
      </form>
      <p class="auth-switch">Don't have an account? <a>Sign up</a></p>
    </div>
  </div>

  <main class="main-content">
    <div class="watch-container">
      <div class="player-wrapper" id="player-wrapper">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);">Loading player...</div>
      </div>

      <div class="player-controls-bar">
        <div class="server-tabs">
          <button class="server-tab active" data-type="sub">Sub</button>
          <button class="server-tab" data-type="dub">Dub</button>
        </div>
        <div class="watch-actions">
          <button class="watch-action-btn" id="fav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            Favorite
          </button>
          <button class="watch-action-btn" id="bookmark-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
            Bookmark
          </button>
          <a href="#" class="watch-action-btn" id="next-ep-btn" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
            Next Episode
          </a>
        </div>
      </div>

      <div style="margin-top:20px;">
        <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:12px;" id="anime-title">Loading...</h2>
        <p style="color:var(--text-muted);font-size:0.9rem;" id="anime-meta"></p>
      </div>

      <div class="episodes-section" style="margin-top:24px;">
        <div class="section-header">
          <h2 class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg> Episodes</h2>
        </div>
        <div class="episodes-grid" id="episodes-grid"></div>
      </div>
    </div>

    <div class="comments-section">
      <h3 class="comments-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;vertical-align:middle;margin-right:8px;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>Comments</h3>
      <div class="comment-form">
        <div class="comment-avatar" id="comment-avatar">?</div>
        <div class="comment-input-wrap">
          <textarea class="comment-input" id="comment-input" placeholder="Write a comment..."></textarea>
          <button class="comment-submit" id="comment-submit">Post Comment</button>
        </div>
      </div>
      <div id="comments-list"></div>
    </div>
  </main>

  <footer class="footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/slider.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
  <script>
  (async function() {
    const params = new URLSearchParams(window.location.search);
    const malId = params.get('id');
    const currentEp = parseInt(params.get('ep')) || 1;
    let currentType = params.get('type') || 'sub';
    if (!malId) { window.location.href = 'index.html'; return; }

    let animeData = null;
    try {
      animeData = await API.getAnimeDetails(malId);
      if (!animeData) throw new Error('Not found');
    } catch (err) {
      document.getElementById('player-wrapper').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--danger);">Failed to load anime</div>';
      return;
    }

    const title = animeData.title_english || animeData.title;
    document.getElementById('anime-title').textContent = `${title} - Episode ${currentEp}`;
    document.getElementById('anime-meta').textContent = `${animeData.type || 'TV'} • ${animeData.episodes || '?'} Episodes • ${animeData.status || ''}`;

    // Update avatar
    const user = Auth.getUser();
    const commentAvatar = document.getElementById('comment-avatar');
    if (commentAvatar) {
      if (user) commentAvatar.textContent = user.username.charAt(0).toUpperCase();
      else commentAvatar.textContent = '?';
    }

    // Load player
    function loadPlayer() {
      const playerWrapper = document.getElementById('player-wrapper');
      const url = Player.getStreamUrl(malId, currentEp, currentType);
      playerWrapper.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; fullscreen" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>`;
    }
    loadPlayer();

    // Server tabs
    document.querySelectorAll('.server-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.server-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentType = tab.dataset.type;
        loadPlayer();
        history.replaceState(null, '', `watch.html?id=${malId}&ep=${currentEp}&type=${currentType}`);
      });
    });

    // Episodes grid
    const epCount = animeData.episodes || 24;
    const epGrid = document.getElementById('episodes-grid');
    epGrid.innerHTML = Array.from({length: epCount}, (_, i) => {
      const ep = i + 1;
      return `<a href="watch.html?id=${malId}&ep=${ep}&type=${currentType}" class="episode-btn ${ep === currentEp ? 'active' : ''}">${ep}</a>`;
    }).join('');

    // Next episode button
    const nextEpBtn = document.getElementById('next-ep-btn');
    if (currentEp < epCount) {
      nextEpBtn.style.display = 'inline-flex';
      nextEpBtn.href = `watch.html?id=${malId}&ep=${currentEp + 1}&type=${currentType}`;
    }

    // Favorite/Bookmark
    const favBtn = document.getElementById('fav-btn');
    const bookmarkBtn = document.getElementById('bookmark-btn');
    function updateBtns() {
      favBtn.classList.toggle('active', Auth.isFavorite(parseInt(malId)));
      bookmarkBtn.classList.toggle('active', Auth.isBookmarked(parseInt(malId)));
    }
    updateBtns();
    favBtn.addEventListener('click', async () => {
      try { await Auth.toggleFavorite(parseInt(malId), animeData); updateBtns(); showToast(Auth.isFavorite(parseInt(malId)) ? 'Added to favorites' : 'Removed from favorites'); }
      catch (err) { showToast(err.message, 'error'); }
    });
    bookmarkBtn.addEventListener('click', async () => {
      try { await Auth.toggleBookmark(parseInt(malId), animeData); updateBtns(); showToast(Auth.isBookmarked(parseInt(malId)) ? 'Bookmarked' : 'Removed bookmark'); }
      catch (err) { showToast(err.message, 'error'); }
    });

    // Save history
    Auth.addToHistory(parseInt(malId), animeData, currentEp);
    Player.saveProgress(malId, currentEp);

    // Comments
    function renderComments() {
      const list = document.getElementById('comments-list');
      const comments = Auth.getComments(malId);
      if (comments.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:30px 0;"><h3>No comments yet</h3><p>Be the first to comment!</p></div>';
        return;
      }
      list.innerHTML = comments.map(c => `<div class="comment-item">
        <div class="comment-avatar">${c.username.charAt(0).toUpperCase()}</div>
        <div class="comment-body">
          <div class="comment-header"><span class="comment-username">${escapeHtml(c.username)}</span><span class="comment-time">${new Date(c.timestamp).toLocaleDateString()}</span></div>
          <p class="comment-text">${escapeHtml(c.text)}</p>
          <div class="comment-actions">
            <span class="comment-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>${c.likes}</span>
            <span class="comment-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"></polyline><path d="M20 18v-2a4 4 0 0 0-4-4H4"></path></svg>Reply</span>
          </div>
        </div>
      </div>`).join('');
    }
    renderComments();

    document.getElementById('comment-submit').addEventListener('click', async () => {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (!text) return;
      try {
        await Auth.addComment(malId, text);
        input.value = '';
        renderComments();
        showToast('Comment posted!');
      } catch (err) { showToast(err.message, 'error'); }
    });

    // Keyboard shortcuts
    Player.setupKeyboardShortcuts();
  })();
  </script>
</body>
</html>
