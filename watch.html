<title>Watch - NamiTube</title>
<style>
:root {
  --bg: #0a0a0f; --bg-elevated: #12121a; --bg-card: #16161f; --bg-glass: rgba(22,22,31,0.85);
  --primary: #a855f7; --primary-light: #c084fc; --primary-dark: #7c3aed; --accent: #d946ef;
  --text: #f1f1f4; --text-secondary: #a1a1aa; --text-muted: #71717a;
  --border: rgba(168,85,247,0.15); --border-glow: rgba(168,85,247,0.3);
  --success: #22c55e; --warning: #f59e0b; --radius: 14px; --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4); --shadow-glow: 0 0 40px rgba(168,85,247,0.15);
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1); --header-h: 64px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100%; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 4px; }

.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(10,10,15,0.92); backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border); z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px); transition: var(--transition);
}
.header.scrolled { background: rgba(10,10,15,0.98); box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
.header-left { display: flex; align-items: center; gap: 16px; }
.hamburger {
  width: 40px; height: 40px; border: none; background: transparent; cursor: pointer;
  display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
  border-radius: var(--radius-sm); transition: var(--transition);
}
.hamburger span { display: block; width: 22px; height: 2.5px; background: var(--text); border-radius: 2px; transition: var(--transition); }
.hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
.logo-banner { height: 36px; width: auto; object-fit: contain; transition: var(--transition); }
.logo-banner:hover { filter: drop-shadow(0 0 8px var(--primary-light)); }
.desktop-nav { display: none; gap: 28px; }
.desktop-nav a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; position: relative; transition: var(--transition); }
.desktop-nav a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 1px; transition: var(--transition); }
.desktop-nav a:hover, .desktop-nav a.active { color: var(--text); }
.desktop-nav a:hover::after, .desktop-nav a.active::after { width: 100%; }
.header-right { display: flex; align-items: center; gap: 12px; }
.search-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
  background: rgba(168,85,247,0.08); color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: var(--transition);
}
.search-btn:hover { background: rgba(168,85,247,0.2); border-color: var(--primary-light); box-shadow: 0 0 15px rgba(168,85,247,0.2); }
.search-btn svg { width: 18px; height: 18px; }

.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: min(280px, 80vw);
  background: var(--bg-glass); backdrop-filter: blur(30px); border-right: 1px solid var(--border);
  z-index: 1001; transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; padding: 80px 24px 24px;
}
.sidebar.active { transform: translateX(0); }
.sidebar a { display: flex; align-items: center; gap: 14px; padding: 14px 16px; color: var(--text-secondary); text-decoration: none; font-size: 1rem; font-weight: 500; border-radius: var(--radius-sm); transition: var(--transition); margin-bottom: 4px; }
.sidebar a:hover, .sidebar a.active { background: rgba(168,85,247,0.12); color: var(--text); }
.sidebar a svg { width: 20px; height: 20px; opacity: 0.7; }
.sidebar a:hover svg, .sidebar a.active svg { opacity: 1; color: var(--primary-light); }

/* Player */
.player-section { margin-top: var(--header-h); }
.player-wrap {
  position: relative; width: 100%; background: #000; aspect-ratio: 16/9;
  overflow: hidden; border-bottom: 1px solid var(--border);
}
.player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.player-wrap.theater { position: fixed; inset: 0; z-index: 2000; aspect-ratio: unset; border: none; }
.player-wrap.theater ~ * { display: none; }
.player-wrap.theater .player-controls { bottom: 20px; }

.player-controls {
  position: absolute; bottom: 12px; left: 12px; right: 12px;
  display: flex; gap: 8px; z-index: 10; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.player-wrap:hover .player-controls { opacity: 1; pointer-events: all; }
.player-btn {
  padding: 8px 14px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: var(--radius-sm);
  font-size: 0.8rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  transition: var(--transition); font-family: inherit;
}
.player-btn:hover { background: rgba(168,85,247,0.4); border-color: var(--primary-light); }
.player-btn.active { background: var(--primary-dark); border-color: var(--primary); }
.player-btn svg { width: 14px; height: 14px; }

/* Info */
.watch-info {
  padding: clamp(20px, 3vw, 32px) clamp(16px, 4vw, 48px);
  max-width: 1200px; margin: 0 auto;
}
.watch-title {
  font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: 700; margin-bottom: 4px;
  background: linear-gradient(135deg, #fff 0%, #e9d5ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.watch-ep { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px; }
.watch-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.watch-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px;
  font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
}
.watch-badge.score { color: var(--warning); }

/* Server selector */
.server-section { margin-bottom: 24px; }
.server-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.server-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.server-btn {
  padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); border-radius: var(--radius-sm); font-size: 0.85rem;
  font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit;
}
.server-btn:hover { border-color: var(--primary-light); color: var(--text); }
.server-btn.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-color: var(--primary); box-shadow: 0 4px 15px rgba(168,85,247,0.3); }

/* Lang toggle */
.lang-section { margin-bottom: 24px; }
.lang-btns { display: flex; gap: 8px; }
.lang-btn {
  padding: 8px 20px; background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); border-radius: var(--radius-sm); font-size: 0.85rem;
  font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit;
}
.lang-btn:hover { border-color: var(--primary-light); color: var(--text); }
.lang-btn.active { background: var(--primary-dark); color: white; border-color: var(--primary); }

/* Episode list */
.ep-section { margin-bottom: 32px; }
.ep-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.ep-title { font-size: 1.1rem; font-weight: 700; }
.ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
.ep-item {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); cursor: pointer;
  transition: var(--transition); text-decoration: none;
}
.ep-item:hover { border-color: var(--primary-light); color: var(--text); background: rgba(168,85,247,0.1); }
.ep-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-color: var(--primary); box-shadow: 0 4px 15px rgba(168,85,247,0.3); }

/* Related */
.related-section { margin-bottom: 32px; }
.related-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.related-title::before { content: ''; width: 4px; height: 20px; background: linear-gradient(180deg, var(--primary), var(--accent)); border-radius: 2px; }
.related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.related-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  overflow: hidden; text-decoration: none; color: var(--text); transition: var(--transition); display: block;
}
.related-card:hover { border-color: var(--border-glow); transform: translateY(-4px); }
.related-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
.related-info { padding: 10px 12px; }
.related-name { font-size: 0.85rem; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.related-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, #1f1f2e 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Footer */
.footer { border-top: 1px solid var(--border); padding: 40px clamp(16px, 4vw, 48px); background: var(--bg-elevated); margin-top: 40px; }
.footer-inner { max-width: 1200px; margin: 0 auto; text-align: center; }
.footer-logo { height: 32px; margin-bottom: 16px; opacity: 0.8; }
.footer-text { color: var(--text-muted); font-size: 0.85rem; line-height: 1.7; max-width: 600px; margin: 0 auto 20px; }
.footer-social { display: flex; justify-content: center; gap: 16px; margin-bottom: 20px; }
.footer-social a { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: var(--transition); text-decoration: none; }
.footer-social a:hover { border-color: var(--primary); color: var(--primary-light); background: rgba(168,85,247,0.1); }
.footer-copy { color: var(--text-muted); font-size: 0.8rem; }

/* Loading overlay */
.player-loading {
  position: absolute; inset: 0; background: var(--bg); display: flex;
  flex-direction: column; align-items: center; justify-content: center; z-index: 5;
}
.player-loading.hidden { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.spinner {
  width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.player-loading p { color: var(--text-muted); font-size: 0.9rem; }

@media (min-width: 768px) { .desktop-nav { display: flex; } .hamburger { display: none; } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>

<script>
(function() {
  'use strict';
  const API = 'https://graphql.anilist.co';
  const CACHE_TTL = 1000 * 60 * 15;
  const MAX_RETRIES = 3;
  const TIMEOUT = 8000;
  const $ = (s, c=document) => c.querySelector(s);
  const $$ = (s, c=document) => Array.from(c.querySelectorAll(s));
  const wait = ms => new Promise(r => setTimeout(r, ms));
  const params = new URLSearchParams(location.search);
  const animeId = parseInt(params.get('id')) || 1;
  let currentEp = parseInt(params.get('ep')) || 1;
  let currentServer = 'vidnest';
  let currentLang = params.get('lang') || 'sub';
  let totalEps = 12;
  let animeData = null;

  function cacheGet(key) {
    try { const item = JSON.parse(localStorage.getItem('nt_'+key)); if (item && Date.now()-item.t < CACHE_TTL) return item.d; } catch(e){}
    return null;
  }
  function cacheSet(key, data) {
    try { localStorage.setItem('nt_'+key, JSON.stringify({t:Date.now(),d:data})); } catch(e){}
  }
  async function gql(query, variables={}, retries=MAX_RETRIES) {
    const cacheKey = query.trim().slice(0,60)+JSON.stringify(variables);
    const cached = cacheGet(cacheKey); if (cached) return cached;
    for (let i=0; i<retries; i++) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT);
      try {
        const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body: JSON.stringify({query,variables}), signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const json = await res.json();
        if (json.errors) throw new Error(json.errors[0].message);
        cacheSet(cacheKey, json.data); return json.data;
      } catch(e) { clearTimeout(timer); if (i===retries-1) { console.error('GraphQL failed:', e.message); return null; } await wait(1000*(i+1)); }
    }
    return null;
  }
  function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

  function getStreamUrl(server, id, ep, lang) {
    if (server === 'vidnest') return `https://vidnest.fun/anime/${id}/${ep}/${lang}`;
    if (server === 'megaplay') return `https://megaplay.buzz/stream/ani/${id}/${ep}/${lang}`;
    return `https://vidnest.fun/anime/${id}/${ep}/${lang}`;
  }

  function loadPlayer() {
    const frame = $('#playerFrame');
    const loading = $('#playerLoading');
    loading.classList.remove('hidden');
    const url = getStreamUrl(currentServer, animeId, currentEp, currentLang);
    frame.src = 'about:blank';
    setTimeout(() => {
      frame.src = url;
      setTimeout(() => loading.classList.add('hidden'), 2000);
    }, 100);
  }

  function updateUrl() {
    const url = new URL(location.href);
    url.searchParams.set('ep', currentEp);
    url.searchParams.set('lang', currentLang);
    history.replaceState({}, '', url);
  }

  function renderEpisodes() {
    const grid = $('#epGrid');
    grid.innerHTML = '';
    for (let i=1; i<=totalEps; i++) {
      const a = document.createElement('a');
      a.className = 'ep-item' + (i===currentEp ? ' active' : '');
      a.href = `watch.html?id=${animeId}&ep=${i}&lang=${currentLang}`;
      a.textContent = i;
      a.addEventListener('click', e => { e.preventDefault(); currentEp=i; loadPlayer(); updateUrl(); renderEpisodes(); });
      grid.appendChild(a);
    }
  }

  // Header scroll
  const header=$('#header');
  window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY>20), {passive:true});

  // Sidebar
  const hamburger=$('#hamburger'), sidebar=$('#sidebar'), sidebarOverlay=$('#sidebarOverlay');
  function toggleSidebar() { const active=sidebar.classList.toggle('active'); hamburger.classList.toggle('active',active); sidebarOverlay.classList.toggle('active',active); document.body.style.overflow=active?'hidden':''; }
  hamburger.addEventListener('click', toggleSidebar); sidebarOverlay.addEventListener('click', toggleSidebar);

  // Server buttons
  $$('.server-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.server-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentServer = btn.dataset.server;
      loadPlayer();
    });
  });

  // Lang buttons
  $$('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      loadPlayer();
      updateUrl();
    });
  });

  // Theater mode
  $('#btnTheater').addEventListener('click', () => {
    $('#playerWrap').classList.toggle('theater');
  });

  // Fullscreen
  $('#btnFullscreen').addEventListener('click', () => {
    const wrap = $('#playerWrap');
    if (!document.fullscreenElement) {
      wrap.requestFullscreen?.() || wrap.webkitRequestFullscreen?.();
    } else {
      document.exitFullscreen?.() || document.webkitExitFullscreen?.();
    }
  });

  // Next episode
  $('#btnNext').addEventListener('click', () => {
    if (currentEp < totalEps) { currentEp++; loadPlayer(); updateUrl(); renderEpisodes(); }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    switch(e.key.toLowerCase()) {
      case 'f': $('#btnFullscreen').click(); break;
      case 't': $('#btnTheater').click(); break;
      case 'n': if (currentEp < totalEps) { currentEp++; loadPlayer(); updateUrl(); renderEpisodes(); } break;
      case 'arrowright': if (currentEp < totalEps) { currentEp++; loadPlayer(); updateUrl(); renderEpisodes(); } break;
      case 'arrowleft': if (currentEp > 1) { currentEp--; loadPlayer(); updateUrl(); renderEpisodes(); } break;
    }
  });

  // Auto next (detect when iframe loads - simplified)
  let loadTimeout;
  $('#playerFrame').addEventListener('load', () => {
    clearTimeout(loadTimeout);
    $('#playerLoading').classList.add('hidden');
  });

  async function loadAnime() {
    const data = await gql(`
      query($id:Int){
        Media(id:$id,type:ANIME){
          id title{english romaji native} coverImage{large medium}
          description averageScore format episodes status seasonYear
          relations{edges{relationType node{id type title{english romaji} coverImage{medium} format status}}}
          streamingEpisodes{title thumbnail url}
          nextAiringEpisode{episode timeUntilAiring}
        }
      }`, {id: animeId});
    if (!data || !data.Media) { $('#watchTitle').textContent = 'Anime not found'; return; }
    animeData = data.Media;
    totalEps = animeData.episodes || 12;
    if (currentEp > totalEps) currentEp = 1;

    const title = animeData.title?.english || animeData.title?.romaji || 'Unknown';
    $('#watchTitle').textContent = title;
    $('#watchEp').textContent = `Episode ${currentEp} of ${totalEps}`;

    const score = animeData.averageScore ? (animeData.averageScore/10).toFixed(1) : null;
    $('#watchMeta').innerHTML = `
      ${score?`<span class="watch-badge score"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> ${score}</span>`:''}
      <span class="watch-badge">${esc((animeData.format||'').replace(/_/g,' '))}</span>
      <span class="watch-badge">${esc((animeData.status||'').replace(/_/g,' '))}</span>
      ${animeData.seasonYear?`<span class="watch-badge">${animeData.seasonYear}</span>`:''}
    `;

    renderEpisodes();
    loadPlayer();

    // Related
    const rels = (animeData.relations?.edges||[]).filter(r => r.node?.type === 'ANIME').slice(0, 8);
    $('#relatedGrid').innerHTML = rels.length ? rels.map(r => {
      const node = r.node;
      const t = node.title?.english || node.title?.romaji || 'Unknown';
      const img = node.coverImage?.medium || '';
      return `<a href="anime.html?id=${node.id}" class="related-card"><img src="${esc(img)}" alt="${esc(t)}" loading="lazy"><div class="related-info"><div class="related-name">${esc(t)}</div><div class="related-meta">${esc((r.relationType||'').replace(/_/g,' '))}</div></div></a>`;
    }).join('') : '<p style="color:var(--text-muted);">No related anime.</p>';
  }

  // Set active lang button from URL
  $$('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));

  loadAnime();
})();
</script>
</body>
