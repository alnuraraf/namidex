<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="NamiTube - Watch Anime">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
    <title>Watch - NamiTube</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-elevated: #12121a;
            --bg-card: #16161f;
            --bg-glass: rgba(22, 22, 31, 0.85);
            --primary: #a855f7;
            --primary-light: #c084fc;
            --primary-dark: #7c3aed;
            --primary-glow: rgba(168, 85, 247, 0.35);
            --accent: #d946ef;
            --secondary: #c084fc;
            --text: #f1f1f4;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: rgba(168, 85, 247, 0.15);
            --border-glow: rgba(168, 85, 247, 0.3);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --surface: #0a0a0a;
            --surface-2: #111111;
            --surface-3: #1a1a1a;
            --success: #22c55e;
            --warning: #f59e0b;
            --radius: 14px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(168, 85, 247, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --header-h: 64px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            overflow-x: hidden;
            max-width: 100%;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
        }
        ul,
        ol {
            list-style: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-dark);
            border-radius: 4px;
        }

        /* ==================== HEADER ==================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(12px, 3vw, 32px);
            transition: var(--transition);
        }
        .header.scrolled {
            background: rgba(10, 10, 15, 0.98);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .hamburger {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .hamburger span {
            display: block;
            width: 22px;
            height: 2.5px;
            background: var(--text);
            border-radius: 2px;
            transition: var(--transition);
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        .logo-banner {
            height: 36px;
            width: auto;
            object-fit: contain;
            transition: var(--transition);
        }
        .logo-banner:hover {
            filter: drop-shadow(0 0 8px var(--primary-light));
        }
        .desktop-nav {
            display: none;
            gap: 28px;
        }
        .desktop-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            transition: var(--transition);
        }
        .desktop-nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 1px;
            transition: var(--transition);
        }
        .desktop-nav a:hover,
        .desktop-nav a.active {
            color: var(--text);
        }
        .desktop-nav a:hover::after,
        .desktop-nav a.active::after {
            width: 100%;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(168, 85, 247, 0.08);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .search-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--primary-light);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }
        .search-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ==================== SIDEBAR NAV ==================== */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: min(280px, 80vw);
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border);
            z-index: 1001;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 80px 24px 24px;
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            margin-bottom: 4px;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(168, 85, 247, 0.12);
            color: var(--text);
        }
        .sidebar a svg {
            width: 20px;
            height: 20px;
            opacity: 0.7;
        }
        .sidebar a:hover svg,
        .sidebar a.active svg {
            opacity: 1;
            color: var(--primary-light);
        }

        /* ==================== MAIN LAYOUT ==================== */
        .watch-main {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
            max-width: 1600px;
            margin: 80px auto 0;
            padding: 0 clamp(12px, 3vw, 32px);
        }
        @media (max-width: 1024px) {
            .watch-main {
                grid-template-columns: 1fr;
                margin-top: 72px;
            }
        }

        /* ==================== PLAYER ==================== */
        .player-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }
        .player-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
        }
        .player-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .player-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            z-index: 2;
            transition: opacity 0.3s ease;
        }
        .player-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--surface-3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .player-loading p {
            margin-top: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Theater mode */
        body.theater-mode .header,
        body.theater-mode .sidebar,
        body.theater-mode .sidebar-overlay,
        body.theater-mode .watch-sidebar,
        body.theater-mode .footer {
            display: none !important;
        }
        body.theater-mode .watch-main {
            grid-template-columns: 1fr;
            margin-top: 0;
            padding: 0;
            max-width: 100%;
        }
        body.theater-mode .player-wrap {
            border-radius: 0;
            height: 100vh;
            aspect-ratio: auto;
        }
        body.theater-mode .player-section {
            gap: 0;
        }
        body.theater-mode .player-controls,
        body.theater-mode .episode-section,
        body.theater-mode .comments-section {
            display: none !important;
        }

        /* Player controls bar */
        .player-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
        }
        .pctrl-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pctrl-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .pctrl-btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--surface-3);
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            transition: var(--transition);
            white-space: nowrap;
        }
        .pctrl-btn:hover {
            background: var(--surface);
            color: var(--text);
        }
        .pctrl-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }
        .pctrl-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--surface-3);
            border: 1px solid var(--border-subtle);
            transition: var(--transition);
        }
        .pctrl-icon:hover {
            background: var(--surface);
        }
        .pctrl-icon svg {
            width: 18px;
            height: 18px;
            stroke: var(--text);
        }
        .pctrl-spacer {
            flex: 1;
        }

        /* ==================== EPISODE SECTION ==================== */
        .episode-section {
            background: var(--surface-2);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px;
        }
        .episode-section h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .episode-section h3 svg {
            width: 20px;
            height: 20px;
            stroke: var(--primary);
        }
        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .episode-grid::-webkit-scrollbar {
            width: 6px;
        }
        .episode-grid::-webkit-scrollbar-thumb {
            background: var(--surface-3);
            border-radius: 3px;
        }
        .episode-btn {
            padding: 10px;
            border-radius: 8px;
            background: var(--surface-3);
            border: 1px solid var(--border-subtle);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: var(--transition);
            text-align: center;
        }
        .episode-btn:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: var(--primary);
            color: var(--text);
        }
        .episode-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        /* ==================== SIDEBAR INFO ==================== */
        .watch-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 0;
        }
        @media (max-width: 1024px) {
            .watch-sidebar {
                display: none;
            }
        }
        .sidebar-card {
            background: var(--surface-2);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px;
        }
        .sidebar-card h4 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text);
        }
        .anime-mini {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .anime-mini img {
            width: 80px;
            border-radius: 8px;
            aspect-ratio: 2/3;
            object-fit: cover;
            flex-shrink: 0;
        }
        .anime-mini-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .anime-mini-title {
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.3;
        }
        .anime-mini-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .related-track {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .related-track::-webkit-scrollbar {
            width: 6px;
        }
        .related-track::-webkit-scrollbar-thumb {
            background: var(--surface-3);
            border-radius: 3px;
        }
        .related-item {
            display: flex;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
            cursor: pointer;
        }
        .related-item:hover {
            background: var(--surface-3);
        }
        .related-item img {
            width: 50px;
            border-radius: 6px;
            aspect-ratio: 2/3;
            object-fit: cover;
            flex-shrink: 0;
        }
        .related-info {
            min-width: 0;
        }
        .related-title {
            font-size: 0.8rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 2px;
        }
        .related-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ==================== COMMENTS ==================== */
        .comments-section {
            background: var(--surface-2);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px;
        }
        .comments-section h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        #cusdis_thread {
            min-height: 200px;
            width: 100% !important;
            color-scheme: dark;
        }
        #cusdis_thread iframe {
            width: 100% !important;
            min-height: 400px !important;
            border: none !important;
            background: transparent !important;
            color-scheme: dark !important;
        }

        /* Cusdis dark theme overrides */
        .cusdis-widget,
        .cusdis-container,
        #cusdis_thread>div,
        #cusdis_thread [class*="cusdis"] {
            background: var(--surface-2) !important;
            color: var(--text) !important;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
        }
        .cusdis-widget *,
        .cusdis-container *,
        #cusdis_thread *,
        #cusdis_thread [class*="cusdis"] * {
            color: var(--text) !important;
        }
        .cusdis-widget h1,
        .cusdis-widget h2,
        .cusdis-widget h3,
        .cusdis-widget h4,
        .cusdis-widget h5,
        .cusdis-widget h6,
        #cusdis_thread h1,
        #cusdis_thread h2,
        #cusdis_thread h3,
        #cusdis_thread h4,
        #cusdis_thread h5,
        #cusdis_thread h6 {
            color: var(--text) !important;
            font-weight: 700 !important;
        }
        .cusdis-widget p,
        .cusdis-widget span,
        .cusdis-widget div,
        #cusdis_thread p,
        #cusdis_thread span,
        #cusdis_thread div {
            color: var(--text) !important;
        }
        .cusdis-widget [class*="muted"],
        .cusdis-widget [class*="secondary"],
        .cusdis-widget [class*="time"],
        .cusdis-widget [class*="date"],
        .cusdis-widget time,
        #cusdis_thread [class*="muted"],
        #cusdis_thread [class*="secondary"],
        #cusdis_thread [class*="time"],
        #cusdis_thread [class*="date"],
        #cusdis_thread time {
            color: var(--text-muted) !important;
        }
        .cusdis-widget a,
        #cusdis_thread a {
            color: var(--primary) !important;
            text-decoration: none !important;
            transition: var(--transition) !important;
        }
        .cusdis-widget a:hover,
        #cusdis_thread a:hover {
            color: var(--secondary) !important;
            text-decoration: underline !important;
        }
        .cusdis-widget label,
        .cusdis-widget [class*="label"],
        .cusdis-widget [class*="nickname"],
        .cusdis-widget [class*="email"],
        .cusdis-widget [class*="name-field"],
        .cusdis-widget [class*="field-label"],
        #cusdis_thread label,
        #cusdis_thread [class*="label"],
        #cusdis_thread [class*="nickname"],
        #cusdis_thread [class*="email"],
        #cusdis_thread [class*="name-field"],
        #cusdis_thread [class*="field-label"] {
            color: #ffffff !important;
            font-weight: 600 !important;
            font-size: 0.85rem !important;
            display: block !important;
            margin-bottom: 6px !important;
            opacity: 1 !important;
        }
        .cusdis-widget input[type="text"],
        .cusdis-widget input[type="email"],
        .cusdis-widget input[type="url"],
        .cusdis-widget textarea,
        #cusdis_thread input[type="text"],
        #cusdis_thread input[type="email"],
        #cusdis_thread input[type="url"],
        #cusdis_thread textarea {
            width: 100% !important;
            padding: 12px 16px !important;
            background: var(--surface-3) !important;
            border: 1px solid var(--border-subtle) !important;
            border-radius: var(--radius) !important;
            color: #ffffff !important;
            font-size: 0.9rem !important;
            font-family: inherit !important;
            outline: none !important;
            transition: var(--transition) !important;
            box-sizing: border-box !important;
        }
        .cusdis-widget input::placeholder,
        .cusdis-widget textarea::placeholder,
        #cusdis_thread input::placeholder,
        #cusdis_thread textarea::placeholder {
            color: #cccccc !important;
            opacity: 1 !important;
        }
        .cusdis-widget input:focus,
        .cusdis-widget textarea:focus,
        #cusdis_thread input:focus,
        #cusdis_thread textarea:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px var(--primary-glow) !important;
        }
        .cusdis-widget textarea,
        #cusdis_thread textarea {
            min-height: 120px !important;
            resize: vertical !important;
            line-height: 1.5 !important;
        }
        .cusdis-widget button,
        .cusdis-widget [type="submit"],
        .cusdis-widget [class*="btn"],
        #cusdis_thread button,
        #cusdis_thread [type="submit"],
        #cusdis_thread [class*="btn"] {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 8px !important;
            padding: 10px 24px !important;
            background: linear-gradient(135deg, var(--primary), #7c3aed) !important;
            color: #fff !important;
            border: none !important;
            border-radius: var(--radius) !important;
            font-size: 0.85rem !important;
            font-weight: 700 !important;
            font-family: inherit !important;
            cursor: pointer !important;
            transition: var(--transition) !important;
            box-shadow: 0 4px 20px var(--primary-glow) !important;
        }
        .cusdis-widget button:hover,
        .cusdis-widget [type="submit"]:hover,
        #cusdis_thread button:hover,
        #cusdis_thread [type="submit"]:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 30px var(--primary-glow) !important;
            filter: brightness(1.1) !important;
        }
        .cusdis-widget button:disabled,
        .cusdis-widget [type="submit"]:disabled,
        #cusdis_thread button:disabled,
        #cusdis_thread [type="submit"]:disabled {
            opacity: 0.5 !important;
            cursor: not-allowed !important;
            transform: none !important;
        }
        .cusdis-widget [class*="outline"],
        .cusdis-widget [class*="secondary"],
        #cusdis_thread [class*="outline"],
        #cusdis_thread [class*="secondary"] {
            background: transparent !important;
            border: 1px solid var(--border-subtle) !important;
            color: var(--text) !important;
            box-shadow: none !important;
        }
        .cusdis-widget [class*="outline"]:hover,
        #cusdis_thread [class*="outline"]:hover {
            background: rgba(168, 85, 247, 0.1) !important;
            border-color: var(--primary) !important;
        }
        .cusdis-widget [class*="comment"],
        .cusdis-widget [class*="message"],
        .cusdis-widget [class*="card"],
        #cusdis_thread [class*="comment"],
        #cusdis_thread [class*="message"],

<!-- ==================== SCRIPTS ==================== -->
<script>
    (function() {
        'use strict';

        const API_BASE = 'https://api.jikan.moe/v4';
        const CACHE_TTL = 5 * 60 * 1000;
        const RATE_DELAY = 400;

        const ApiEngine = {
            cache: {},
            lastRequest: 0,
            getCacheKey(url) { return 'cache_' + url; },
            getCached(url) {
                const key = this.getCacheKey(url);
                const item = this.cache[key];
                if (!item) {
                    try {
                        const raw = localStorage.getItem(key);
                        if (raw) {
                            const parsed = JSON.parse(raw);
                            if (Date.now() - parsed.time < CACHE_TTL) { this.cache[key] = parsed; return parsed
                                    .data; }
                        }
                    } catch (e) {}
                    return null;
                }
                if (Date.now() - item.time < CACHE_TTL) return item.data;
                return null;
            },
            setCache(url, data) {
                const key = this.getCacheKey(url);
                const payload = { data, time: Date.now() };
                this.cache[key] = payload;
                try { localStorage.setItem(key, JSON.stringify(payload)); } catch (e) {}
            },
            async fetchWithTimeout(url, timeout = 10000) {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                try {
                    const response = await fetch(url, { signal: controller.signal });
                    clearTimeout(id);
                    return response;
                } catch (e) { clearTimeout(id);
                    throw e; }
            },
            async fetch(url, retries = 3) {
                const cached = this.getCached(url);
                if (cached) return cached;
                const now = Date.now();
                const wait = Math.max(0, this.lastRequest + RATE_DELAY - now);
                if (wait > 0) await new Promise(r => setTimeout(r, wait));
                this.lastRequest = Date.now();
                let lastError;
                for (let i = 0; i < retries; i++) {
                    try {
                        if (i > 0) await new Promise(r => setTimeout(r, 1200 * i));
                        const response = await this.fetchWithTimeout(url);
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        const json = await response.json();
                        if (!json || !json.data) throw new Error('Invalid response');
                        this.setCache(url, json);
                        return json;
                    } catch (e) { lastError = e; }
                }
                throw lastError;
            },
            async fetchSafe(url, fallbackData = null) {
                try { return await this.fetch(url); } catch (e) { console.warn('API fetch failed:', url, e
                    .message); return { data: fallbackData }; }
            }
        };

        function getParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function sanitize(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getTitle(anime) {
            return sanitize(anime.title_english || anime.title || 'Unknown');
        }

        function getImage(anime) {
            if (!anime.images || !anime.images.jpg) return '';
            return anime.images.jpg.large_image_url || anime.images.jpg.image_url || '';
        }

        function getPoster(anime) {
            if (!anime.images || !anime.images.jpg) return '';
            return anime.images.jpg.image_url || anime.images.jpg.small_image_url || '';
        }

        // ==================== STATE ====================
        const state = {
            malId: getParam('id') || '1',
            currentEp: parseInt(getParam('ep') || '1', 10) || 1,
            totalEps: 12,
            isSub: true,
            isTheater: false,
            animeData: null
        };

        // ==================== PLAYER ====================
        function getStreamUrl() {
            const type = state.isSub ? 'sub' : 'dub';
            return `https://megaplay.buzz/stream/mal/${state.malId}/${state.currentEp}/${type}`;
        }

        function loadPlayer() {
            const frame = document.getElementById('playerFrame');
            const loading = document.getElementById('playerLoading');
            if (!frame) return;
            if (loading) loading.classList.remove('hidden');
            frame.src = getStreamUrl();
            frame.onload = () => {
                if (loading) loading.classList.add('hidden');
            };
            frame.onerror = () => {
                if (loading) {
                    loading.innerHTML =
                        '<p style="color:#ef4444;">Failed to load video. Try another server or episode.</p>';
                }
            };
            setTimeout(() => { if (loading) loading.classList.add('hidden'); }, 5000);
        }

        // ==================== EPISODES ====================
        const EP_CHUNK_SIZE = 150;
        let renderedEpCount = 0;
        let epRenderQueue = [];
        let epRenderTimer = null;

        function renderEpisodes() {
            const grid = document.getElementById('episodeGrid');
            if (!grid) return;
            grid.innerHTML = '';
            renderedEpCount = 0;
            epRenderQueue = [];
            if (epRenderTimer) { clearTimeout(epRenderTimer);
                epRenderTimer = null; }

            const firstChunkEnd = Math.min(EP_CHUNK_SIZE, state.totalEps);
            renderEpisodeChunk(1, firstChunkEnd);

            if (state.totalEps > EP_CHUNK_SIZE) {
                scheduleChunkRender(EP_CHUNK_SIZE + 1);
            }
        }

        function renderEpisodeChunk(start, end) {
            const grid = document.getElementById('episodeGrid');
            if (!grid) return;
            const fragment = document.createDocumentFragment();
            const actualEnd = Math.min(end, state.totalEps);
            for (let i = start; i <= actualEnd; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-btn' + (i === state.currentEp ? ' active' : '');
                btn.textContent = i;
                btn.dataset.ep = i;
                btn.addEventListener('click', () => switchEpisode(i));
                fragment.appendChild(btn);
            }
            grid.appendChild(fragment);
            renderedEpCount = actualEnd;
        }

        function scheduleChunkRender(start) {
            if (start > state.totalEps) return;
            const schedule = window.requestIdleCallback || window.requestAnimationFrame || function(cb) { setTimeout(
                    cb, 0); };
            schedule(() => {
                const end = Math.min(start + EP_CHUNK_SIZE - 1, state.totalEps);
                renderEpisodeChunk(start, end);
                if (end < state.totalEps) {
                    setTimeout(() => scheduleChunkRender(end + 1), 5);
                }
            });
        }

        function switchEpisode(ep) {
            if (ep < 1 || ep > state.totalEps) return;
            state.currentEp = ep;
            const url = new URL(window.location.href);
            url.searchParams.set('ep', ep);
            window.history.replaceState({}, '', url);
            loadPlayer();
            updateSidebarInfo();
            updateCusdis();
            const grid = document.getElementById('episodeGrid');
            if (grid) {
                grid.querySelectorAll('.episode-btn.active').forEach(b => b.classList.remove('active'));
                const target = grid.querySelector(`.episode-btn[data-ep="${ep}"]`);
                if (target) {
                    target.classList.add('active');
                    target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    ensureEpisodeVisible(ep);
                }
            }
        }

        function ensureEpisodeVisible(ep) {
            const grid = document.getElementById('episodeGrid');
            if (!grid) return;
            if (grid.querySelector(`.episode-btn[data-ep="${ep}"]`)) return;
            const chunkStart = Math.floor((ep - 1) / EP_CHUNK_SIZE) * EP_CHUNK_SIZE + 1;
            const chunkEnd = Math.min(chunkStart + EP_CHUNK_SIZE - 1, state.totalEps);
            renderEpisodeChunk(chunkStart, chunkEnd);
            const target = grid.querySelector(`.episode-btn[data-ep="${ep}"]`);
            if (target) {
                target.classList.add('active');
                target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function nextEpisode() { switchEpisode(state.currentEp + 1); }

        function prevEpisode() { switchEpisode(state.currentEp - 1); }

        // ==================== CONTROLS ====================
        document.getElementById('btnSub').addEventListener('click', function() {
            state.isSub = true;
            document.getElementById('btnSub').classList.add('active');
            document.getElementById('btnDub').classList.remove('active');
            loadPlayer();
        });
        document.getElementById('btnDub').addEventListener('click', function() {
            state.isSub = false;
            document.getElementById('btnDub').classList.add('active');
            document.getElementById('btnSub').classList.remove('active');
            loadPlayer();
        });
        document.getElementById('btnNext').addEventListener('click', nextEpisode);
        document.getElementById('btnPrev').addEventListener('click', prevEpisode);

        document.getElementById('btnTheater').addEventListener('click', () => {
            state.isTheater = !state.isTheater;
            document.body.classList.toggle('theater-mode', state.isTheater);
        });

        document.getElementById('btnFullscreen').addEventListener('click', () => {
            const player = document.getElementById('playerWrap');
            if (!document.fullscreenElement) {
                player.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key) {
                case 'ArrowRight':
                    e.preventDefault();
                    nextEpisode();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    prevEpisode();
                    break;
                case 'f':
                case 'F':
                    const player = document.getElementById('playerWrap');
                    if (!document.fullscreenElement) player.requestFullscreen().catch(() => {});
                    else document.exitFullscreen().catch(() => {});
                    break;
                case 't':
                case 'T':
                    state.isTheater = !state.isTheater;
                    document.body.classList.toggle('theater-mode', state.isTheater);
                    break;
                case ' ':
                    document.getElementById('playerFrame').focus();
                    break;
            }
        });

        // ==================== LOAD ANIME DATA ====================
        async function loadAnimeData() {
            try {
                const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${state.malId}/full`);
                const anime = (res && res.data) ? res.data : null;
                if (!anime) return;
                state.animeData = anime;
                await fetchEpisodeCount();
                updateSidebarInfo();
                loadRelated(state.malId);
                renderEpisodes();
                loadPlayer();
                updateCusdis();
            } catch (e) {
                console.error(e);
                state.totalEps = state.animeData && state.animeData.episodes ? state.animeData.episodes : 12;
                renderEpisodes();
                loadPlayer();
                updateCusdis();
            }
        }

        async function fetchEpisodeCount() {
            let total = 0;
            let page = 1;
            let hasMore = true;
            const maxPages = 30;
            while (hasMore && page <= maxPages) {
                try {
                    const res = await ApiEngine.fetchSafe(
                        `${API_BASE}/anime/${state.malId}/episodes?page=${page}`);
                    const data = (res && res.data) ? res.data : [];
                    const pagination = (res && res.pagination) ? res.pagination : {};
                    if (!data.length) { hasMore = false; break; }
                    total += data.length;
                    hasMore = pagination.has_next_page === true;
                    page++;
                } catch (e) { hasMore = false; }
            }
            if (total === 0 && state.animeData && state.animeData.episodes) { total = state.animeData.episodes; }
            if (total === 0) total = 12;
            state.totalEps = total;
        }

        function updateSidebarInfo() {
            const mini = document.getElementById('animeMini');
            if (!mini || !state.animeData) return;
            const anime = state.animeData;
            const title = getTitle(anime);
            const img = getPoster(anime);
            const type = sanitize(anime.type || 'TV');
            const score = anime.score ? anime.score.toFixed(1) : 'N/A';
            mini.innerHTML = `
            <img src="${img}" alt="${title}">
            <div class="anime-mini-info">
              <div class="anime-mini-title">${title}</div>
              <div class="anime-mini-meta">EP ${state.currentEp} / ${state.totalEps} &bull; ${type} &bull; ${score}</div>
            </div>
          `;
        }

        async function loadRelated(malId) {
            const track = document.getElementById('relatedTrack');
            if (!track) return;
            try {
                const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/recommendations`);
                const data = (res && res.data) ? res.data.slice(0, 8) : [];
                if (!data.length) {
                    track.innerHTML =
                        '<div style="color:var(--text-muted);font-size:0.8rem;">No related anime found.</div>';
                    return;
                }
                const enriched = await Promise.allSettled(data.map(async (rec) => {
                    try {
                        const detail = await ApiEngine.fetchSafe(
                        `${API_BASE}/anime/${rec.entry.mal_id}`);
                        return detail.data || rec.entry;
                    } catch (e) { return rec.entry; }
                }));
                const results = enriched.map(r => r.status === 'fulfilled' ? r.value : null).filter(Boolean);
                track.innerHTML = results.map(anime => {
                    const img = getPoster(anime) || '';
                    const title = getTitle(anime);
                    const type = sanitize(anime.type || 'TV');
                    return `
                <a href="watch.html?id=${anime.mal_id}&ep=1" class="related-item">
                  <img src="${img}" alt="${title}" loading="lazy">
                  <div class="related-info">
                    <div class="related-title">${title}</div>
                    <div class="related-meta">${type}</div>
                  </div>
                </a>
              `;
                }).join('');
            } catch (e) {
                track.innerHTML =
                    '<div style="color:var(--text-muted);font-size:0.8rem;">Failed to load related anime.</div>';
            }
        }

        // ==================== CUSDIS COMMENTS ====================
        function updateCusdis() {
            const thread = document.getElementById('cusdis_thread');
            if (!thread || !state.animeData) return;
            const malId = state.malId;
            const ep = state.currentEp;
            const title = getTitle(state.animeData);
            const pageId = `anime-${malId}-ep-${ep}`;
            const pageUrl = window.location.href;
            const pageTitle = `${title} - Episode ${ep}`;
            thread.setAttribute('data-page-id', pageId);
            thread.setAttribute('data-page-url', pageUrl);
            thread.setAttribute('data-page-title', pageTitle);
            if (window.CUSDIS && window.CUSDIS.renderTo) {
                window.CUSDIS.renderTo(thread);
            }
        }

        // ==================== HEADER SCROLL ====================
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            header.classList.toggle('scrolled', window.scrollY > 20);
        }, { passive: true });

        // ==================== SIDEBAR TOGGLE ====================
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            const active = sidebar.classList.toggle('active');
            hamburger.classList.toggle('active', active);
            sidebarOverlay.classList.toggle('active', active);
            document.body.style.overflow = active ? 'hidden' : '';
        }
        hamburger.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // ==================== APP INIT ====================
        async function initApp() {
            await loadAnimeData();
        }

        if (!window.__appInitialized) {
            window.__appInitialized = true;
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApp);
            } else {
                initApp();
            }
        }
    })();
</script>
</body>
</html>
