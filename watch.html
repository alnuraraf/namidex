<style>
/* ==================== VARIABLES & RESET ==================== */
:root {
  --bg: #050505;
  --surface: #0a0a0a;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --primary: #8b5cf6;
  --primary-glow: rgba(139,92,246,0.35);
  --secondary: #a78bfa;
  --text: #f3f4f6;
  --text-muted: #9ca3af;
  --border: rgba(255,255,255,0.08);
  --radius: 12px;
  --radius-lg: 16px;
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  overflow-x: hidden;
  max-width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
ul, ol { list-style: none; }

/* ==================== UTILITIES ==================== */
.glass {
  background: rgba(17,17,17,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
}
.skeleton {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: var(--radius);
}
@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }
.text-gradient {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ==================== HEADER ==================== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px);
  transition: var(--transition);
}
.header.scrolled {
  background: rgba(5,5,5,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.menu-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.menu-btn:hover { background: var(--surface-2); }
.menu-btn svg { width: 22px; height: 22px; stroke: var(--text); }

.logo-link {
  display: flex;
  align-items: center;
  text-decoration: none;
  flex-shrink: 0;
}
.header-banner {
  height: 38px;
  width: auto;
  object-fit: contain;
  display: block;
  border-radius: 6px;
}
@media (max-width: 480px) {
  .header-banner { height: 28px; }
}

.back-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.back-btn:hover { background: var(--surface-2); }
.back-btn svg { width: 20px; height: 20px; stroke: var(--text); }

/* ==================== SIDEBAR ==================== */
.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(280px, 80vw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 1101;
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  padding: 20px;
}
.sidebar.active { transform: translateX(0); }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.sidebar-banner {
  height: 30px;
  width: auto;
  object-fit: contain;
  border-radius: 4px;
}
.sidebar-close {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.sidebar-close:hover { background: var(--surface-2); }
.sidebar-close svg { width: 20px; height: 20px; stroke: var(--text); }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-muted);
  transition: var(--transition);
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  background: rgba(139,92,246,0.12);
  color: var(--primary);
}
.sidebar-nav a svg { width: 20px; height: 20px; stroke: currentColor; flex-shrink: 0; }

/* ==================== MAIN LAYOUT ==================== */
.watch-main {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 24px;
  max-width: 1600px;
  margin: 80px auto 0;
  padding: 0 clamp(12px, 3vw, 32px);
}
@media (max-width: 1024px) {
  .watch-main {
    grid-template-columns: 1fr;
    margin-top: 72px;
  }
}

/* ==================== PLAYER ==================== */
.player-section {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}
.player-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
}
.player-wrap iframe {
  width: 100%; height: 100%;
  border: none;
}
.player-loading {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  z-index: 2;
  transition: opacity 0.3s ease;
}
.player-loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--surface-3);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.player-loading p {
  margin-top: 12px;
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Theater mode */
body.theater-mode .header,
body.theater-mode .sidebar,
body.theater-mode .sidebar-overlay,
body.theater-mode .watch-sidebar,
body.theater-mode .footer {
  display: none !important;
}
body.theater-mode .watch-main {
  grid-template-columns: 1fr;
  margin-top: 0;
  padding: 0;
  max-width: 100%;
}
body.theater-mode .player-wrap {
  border-radius: 0;
  height: 100vh;
  aspect-ratio: auto;
}
body.theater-mode .player-section { gap: 0; }
body.theater-mode .player-controls,
body.theater-mode .episode-section { display: none !important; }

/* Player controls bar */
.player-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.pctrl-group {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.pctrl-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 700;
  letter-spacing: 0.5px;
}
.pctrl-btn {
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text-muted);
  transition: var(--transition);
  white-space: nowrap;
}
.pctrl-btn:hover { background: var(--surface); color: var(--text); }
.pctrl-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 0 12px var(--primary-glow);
}
.pctrl-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.pctrl-icon:hover { background: var(--surface); }
.pctrl-icon svg { width: 18px; height: 18px; stroke: var(--text); }
.pctrl-spacer { flex: 1; }

/* ==================== EPISODE SECTION ==================== */
.episode-section {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.episode-section h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.episode-section h3 svg { width: 20px; height: 20px; stroke: var(--primary); }
.episode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 10px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}
.episode-grid::-webkit-scrollbar { width: 6px; }
.episode-grid::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
.episode-btn {
  padding: 10px;
  border-radius: 8px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-muted);
  transition: var(--transition);
  text-align: center;
}
.episode-btn:hover {
  background: rgba(139,92,246,0.15);
  border-color: var(--primary);
  color: var(--text);
}
.episode-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 0 12px var(--primary-glow);
}

/* ==================== SIDEBAR INFO ==================== */
.watch-sidebar {
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 0;
}
@media (max-width: 1024px) {
  .watch-sidebar { display: none; }
}
.sidebar-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.sidebar-card h4 {
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--text);
}
.anime-mini {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}
.anime-mini img {
  width: 80px;
  border-radius: 8px;
  aspect-ratio: 2/3;
  object-fit: cover;
  flex-shrink: 0;
}
.anime-mini-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.anime-mini-title {
  font-size: 0.9rem;
  font-weight: 700;
  line-height: 1.3;
}
.anime-mini-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* Related slider in sidebar */
.related-track {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 400px;
  overflow-y: auto;
  padding-right: 4px;
}
.related-track::-webkit-scrollbar { width: 6px; }
.related-track::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
.related-item {
  display: flex;
  gap: 10px;
  padding: 8px;
  border-radius: 8px;
  transition: var(--transition);
  cursor: pointer;
}
.related-item:hover { background: var(--surface-3); }
.related-item img {
  width: 50px;
  border-radius: 6px;
  aspect-ratio: 2/3;
  object-fit: cover;
  flex-shrink: 0;
}
.related-info { min-width: 0; }
.related-title {
  font-size: 0.8rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 2px;
}
.related-meta {
  font-size: 0.7rem;
  color: var(--text-muted);
}

/* ==================== FOOTER ==================== */
.footer {
  border-top: 1px solid var(--border);
  padding: clamp(24px, 4vw, 40px) clamp(16px, 3vw, 32px);
  text-align: center;
  margin-top: 40px;
}
.footer-text {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.footer-social {
  display: flex; justify-content: center; gap: 16px;
}
.footer-social a {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.footer-social a:hover {
  background: var(--primary);
  border-color: var(--primary);
  transform: translateY(-2px);
}
.footer-social a svg { width: 16px; height: 16px; stroke: var(--text-muted); }
.footer-social a:hover svg { stroke: #fff; }

/* ==================== RESPONSIVE ==================== */
@media (max-width: 640px) {
  .player-controls { gap: 8px; padding: 10px; }
  .pctrl-group { gap: 6px; }
  .pctrl-btn { padding: 6px 10px; font-size: 0.75rem; }
  .episode-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

      </div>

<!-- ==================== SCRIPTS ==================== -->
<script>
(function() {
  'use strict';

  const API = 'https://graphql.anilist.co';
  const CACHE_TTL = 1000 * 60 * 15;
  const MAX_RETRIES = 3;
  const TIMEOUT = 8000;
  const EP_CHUNK_SIZE = 150;

  const $ = (s, c=document) => c.querySelector(s);
  const $$ = (s, c=document) => Array.from(c.querySelectorAll(s));
  const wait = ms => new Promise(r => setTimeout(r, ms));
  const params = new URLSearchParams(location.search);
  const animeId = parseInt(params.get('id')) || 1;

  let currentEp = parseInt(params.get('ep')) || 1;
  let currentServer = 'vidnest';
  let currentLang = params.get('lang') || 'sub';
  let totalEps = 12;
  let animeData = null;
  let renderedEpCount = 0;
  let epRenderTimer = null;

  function cacheGet(key) {
    try { const item = JSON.parse(localStorage.getItem('nt_'+key)); if (item && Date.now()-item.t < CACHE_TTL) return item.d; } catch(e){}
    return null;
  }
  function cacheSet(key, data) {
    try { localStorage.setItem('nt_'+key, JSON.stringify({t:Date.now(),d:data})); } catch(e){}
  }
  async function gql(query, variables={}, retries=MAX_RETRIES) {
    const cacheKey = query.trim().slice(0,60)+JSON.stringify(variables);
    const cached = cacheGet(cacheKey); if (cached) return cached;
    for (let i=0; i<retries; i++) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT);
      try {
        const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body: JSON.stringify({query,variables}), signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const json = await res.json();
        if (json.errors) throw new Error(json.errors[0].message);
        cacheSet(cacheKey, json.data); return json.data;
      } catch(e) { clearTimeout(timer); if (i===retries-1) { console.error('GraphQL failed:', e.message); return null; } await wait(1000*(i+1)); }
    }
    return null;
  }
  function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

  function getStreamUrl() {
    if (currentServer === 'megaplay') return `https://megaplay.buzz/stream/ani/${animeId}/${currentEp}/${currentLang}`;
    return `https://vidnest.fun/anime/${animeId}/${currentEp}/${currentLang}`;
  }

  function loadPlayer() {
    const frame = $('#playerFrame');
    const loading = $('#playerLoading');
    if (!frame) return;
    loading.classList.remove('hidden');
    frame.src = 'about:blank';
    setTimeout(() => {
      frame.src = getStreamUrl();
      setTimeout(() => loading.classList.add('hidden'), 2000);
    }, 100);
  }

  function updateUrl() {
    const url = new URL(location.href);
    url.searchParams.set('ep', currentEp);
    url.searchParams.set('lang', currentLang);
    history.replaceState({}, '', url);
  }

  // ==================== EPISODES (Chunked Rendering) ====================
  function renderEpisodes() {
    const grid = $('#episodeGrid');
    if (!grid) return;
    grid.innerHTML = '';
    renderedEpCount = 0;
    if (epRenderTimer) { clearTimeout(epRenderTimer); epRenderTimer = null; }

    const firstChunkEnd = Math.min(EP_CHUNK_SIZE, totalEps);
    renderEpisodeChunk(1, firstChunkEnd);
    if (totalEps > EP_CHUNK_SIZE) scheduleChunkRender(EP_CHUNK_SIZE + 1);
  }

  function renderEpisodeChunk(start, end) {
    const grid = $('#episodeGrid');
    if (!grid) return;
    const fragment = document.createDocumentFragment();
    const actualEnd = Math.min(end, totalEps);
    for (let i = start; i <= actualEnd; i++) {
      const btn = document.createElement('button');
      btn.className = 'episode-btn' + (i === currentEp ? ' active' : '');
      btn.textContent = i;
      btn.dataset.ep = i;
      btn.addEventListener('click', () => switchEpisode(i));
      fragment.appendChild(btn);
    }
    grid.appendChild(fragment);
    renderedEpCount = actualEnd;
  }

  function scheduleChunkRender(start) {
    if (start > totalEps) return;
    const schedule = window.requestIdleCallback || window.requestAnimationFrame || function(cb) { setTimeout(cb, 0); };
    schedule(() => {
      const end = Math.min(start + EP_CHUNK_SIZE - 1, totalEps);
      renderEpisodeChunk(start, end);
      if (end < totalEps) setTimeout(() => scheduleChunkRender(end + 1), 5);
    });
  }

  function ensureEpisodeVisible(ep) {
    const grid = $('#episodeGrid');
    if (!grid) return;
    if (grid.querySelector(`.episode-btn[data-ep="${ep}"]`)) return;
    const chunkStart = Math.floor((ep - 1) / EP_CHUNK_SIZE) * EP_CHUNK_SIZE + 1;
    const chunkEnd = Math.min(chunkStart + EP_CHUNK_SIZE - 1, totalEps);
    renderEpisodeChunk(chunkStart, chunkEnd);
    const target = grid.querySelector(`.episode-btn[data-ep="${ep}"]`);
    if (target) {
      target.classList.add('active');
      target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  }

  function switchEpisode(ep) {
    if (ep < 1 || ep > totalEps) return;
    currentEp = ep;
    updateUrl();
    loadPlayer();
    updateSidebarInfo();
    const grid = $('#episodeGrid');
    if (grid) {
      grid.querySelectorAll('.episode-btn.active').forEach(b => b.classList.remove('active'));
      const target = grid.querySelector(`.episode-btn[data-ep="${ep}"]`);
      if (target) {
        target.classList.add('active');
        target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      } else {
        ensureEpisodeVisible(ep);
      }
    }
  }

  function nextEpisode() { switchEpisode(currentEp + 1); }
  function prevEpisode() { switchEpisode(currentEp - 1); }

  // ==================== CONTROLS ====================
  $('#serverVidnest').addEventListener('click', function() {
    currentServer = 'vidnest';
    $('#serverVidnest').classList.add('active');
    $('#serverMega').classList.remove('active');
    loadPlayer();
  });
  $('#serverMega').addEventListener('click', function() {
    currentServer = 'megaplay';
    $('#serverMega').classList.add('active');
    $('#serverVidnest').classList.remove('active');
    loadPlayer();
  });
  $('#btnSub').addEventListener('click', function() {
    currentLang = 'sub';
    $('#btnSub').classList.add('active');
    $('#btnDub').classList.remove('active');
    loadPlayer();
    updateUrl();
  });
  $('#btnDub').addEventListener('click', function() {
    currentLang = 'dub';
    $('#btnDub').classList.add('active');
    $('#btnSub').classList.remove('active');
    loadPlayer();
    updateUrl();
  });
  $('#btnNext').addEventListener('click', nextEpisode);
  $('#btnPrev').addEventListener('click', prevEpisode);

  $('#btnTheater').addEventListener('click', () => {
    document.body.classList.toggle('theater-mode');
  });
  $('#btnFullscreen').addEventListener('click', () => {
    const wrap = $('#playerWrap');
    if (!document.fullscreenElement) {
      wrap.requestFullscreen?.() || wrap.webkitRequestFullscreen?.();
    } else {
      document.exitFullscreen?.() || document.webkitExitFullscreen?.();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
      case 'ArrowRight': e.preventDefault(); nextEpisode(); break;
      case 'ArrowLeft': e.preventDefault(); prevEpisode(); break;
      case 'f': case 'F':
        const wrap = $('#playerWrap');
        if (!document.fullscreenElement) wrap.requestFullscreen?.catch(()=>{});
        else document.exitFullscreen?.catch(()=>{});
        break;
      case 't': case 'T': document.body.classList.toggle('theater-mode'); break;
    }
  });

  // ==================== LOAD ANIME DATA ====================
  async function loadAnimeData() {
    const data = await gql(`
      query($id:Int){
        Media(id:$id,type:ANIME){
          id title{english romaji native}
          description averageScore format episodes status seasonYear
          coverImage{large medium}
          relations{edges{relationType node{id type title{english romaji} coverImage{medium} format status}}}
          streamingEpisodes{title thumbnail url}
          nextAiringEpisode{episode timeUntilAiring}
        }
      }`, {id: animeId});

    if (!data || !data.Media) {
      $('#animeMini').innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">Failed to load anime.</p>';
      return;
    }
    animeData = data.Media;
    totalEps = animeData.episodes || 12;
    if (currentEp > totalEps) currentEp = 1;

    const backBtn = $('#backBtn');
    if (backBtn) backBtn.href = `anime.html?id=${animeId}`;

    updateSidebarInfo();
    loadRelated();
    renderEpisodes();
    loadPlayer();
  }

  function updateSidebarInfo() {
    const mini = $('#animeMini');
    if (!mini || !animeData) return;
    const title = animeData.title?.english || animeData.title?.romaji || 'Unknown';
    const img = animeData.coverImage?.medium || '';
    const type = esc(animeData.format?.replace(/_/g,' ') || 'TV');
    const score = animeData.averageScore ? (animeData.averageScore/10).toFixed(1) : 'N/A';
    mini.innerHTML = `
      <img src="${esc(img)}" alt="${esc(title)}" loading="lazy">
      <div class="anime-mini-info">
        <div class="anime-mini-title">${esc(title)}</div>
        <div class="anime-mini-meta">EP ${currentEp} / ${totalEps} &bull; ${type} &bull; ${score}</div>
      </div>
    `;
  }

  async function loadRelated() {
    const track = $('#relatedTrack');
    if (!track || !animeData) return;
    const rels = (animeData.relations?.edges||[]).filter(r => r.node?.type === 'ANIME').slice(0, 8);
    if (!rels.length) {
      track.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;">No related anime found.</div>';
      return;
    }
    track.innerHTML = rels.map(r => {
      const node = r.node;
      const t = node.title?.english || node.title?.romaji || 'Unknown';
      const img = node.coverImage?.medium || '';
      const type = esc((node.format||'').replace(/_/g,' '));
      return `<a href="watch.html?id=${node.id}&ep=1" class="related-item">
        <img src="${esc(img)}" alt="${esc(t)}" loading="lazy">
        <div class="related-info">
          <div class="related-title">${esc(t)}</div>
          <div class="related-meta">${type}</div>
        </div>
      </a>`;
    }).join('');
  }

  // ==================== MOBILE NAV ====================
  const MobileNav = {
    sidebar: $('#sidebar'),
    overlay: $('#sidebarOverlay'),
    open() { this.sidebar.classList.add('active'); this.overlay.classList.add('active'); document.body.style.overflow = 'hidden'; },
    close() { this.sidebar.classList.remove('active'); this.overlay.classList.remove('active'); document.body.style.overflow = ''; },
    init() {
      $('#menuBtn').addEventListener('click', () => this.open());
      $('#sidebarClose').addEventListener('click', () => this.close());
      this.overlay.addEventListener('click', () => this.close());
    }
  };

  function initHeaderScroll() {
    const header = $('#header');
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { header.classList.toggle('scrolled', window.scrollY > 40); ticking = false; });
        ticking = true;
      }
    }, { passive: true });
  }

  // ==================== APP INIT ====================
  async function initApp() {
    initHeaderScroll();
    MobileNav.init();
    // Set active lang button from URL
    if (currentLang === 'dub') {
      $('#btnDub').classList.add('active');
      $('#btnSub').classList.remove('active');
    }
    await loadAnimeData();
  }

  if (!window.__appInitialized) {
    window.__appInitialized = true;
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  }
})();
</script>
